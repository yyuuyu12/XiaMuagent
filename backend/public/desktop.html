<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>爆款文案工坊 · 桌面版</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   CSS · 公共 reset
   ============================================================ */
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  height:100%; min-height:100vh;
  font-family:'Noto Sans SC',-apple-system,'PingFang SC',sans-serif;
  background:#F0EDE8; color:#1A1614; font-size:14px;
}

/* ============================================================
   CSS · 桌面端布局
   ============================================================ */
.d-shell { display:flex; height:100vh; overflow:hidden; }

/* 侧边栏 */
.d-sidebar {
  width:200px; flex-shrink:0;
  background:#fff; border-right:1px solid rgba(0,0,0,0.06);
  display:flex; flex-direction:column;
}
.d-logo {
  height:54px; padding:0 20px;
  display:flex; align-items:center; gap:9px;
  border-bottom:1px solid rgba(0,0,0,0.05); flex-shrink:0;
}
.d-logo-icon {
  width:28px; height:28px; border-radius:8px;
  background:linear-gradient(135deg,#FF8040,#F5602A);
  display:flex; align-items:center; justify-content:center;
}
.d-logo-text { font-size:14px; font-weight:700; color:#1A1614; letter-spacing:-0.3px; }

.d-nav-section { padding:14px 10px 4px; }
.d-nav-label {
  font-size:10px; color:#B0AA9F; font-weight:600;
  letter-spacing:0.5px; padding:0 8px; margin-bottom:6px;
}
.d-nav-item {
  display:flex; align-items:center; gap:9px;
  padding:9px 10px; border-radius:10px;
  font-size:13px; font-weight:500; color:#6E6860;
  cursor:pointer; transition:all 0.15s; margin-bottom:2px;
  user-select:none;
}
.d-nav-item:hover { background:#F7F5F1; color:#1A1614; }
.d-nav-item.active { background:#FFF3E8; color:#F5762A; font-weight:600; }

.d-sidebar-bottom {
  margin-top:auto; padding:0 10px 16px;
  border-top:1px solid rgba(0,0,0,0.05); padding-top:12px;
}
.d-user-chip {
  display:flex; align-items:center; gap:10px;
  padding:10px 8px; border-radius:12px;
  background:#F7F5F1; cursor:pointer; transition:background 0.15s;
}
.d-user-chip:hover { background:#EDE9E3; }
.d-avatar-circle {
  width:32px; height:32px; border-radius:50%; flex-shrink:0;
  background:linear-gradient(135deg,#FF8040,#E84D1C);
  display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:700; color:#fff;
}

/* 主内容区 */
.d-main { flex:1; display:flex; flex-direction:column; overflow:hidden; background:#F7F5F1; }
.d-content { flex:1; overflow-y:auto; overflow-x:hidden; padding:20px 24px 32px; }
.d-content::-webkit-scrollbar { width:6px; }
.d-content::-webkit-scrollbar-track { background:transparent; }
.d-content::-webkit-scrollbar-thumb { background:#E0DCD6; border-radius:4px; }

/* ============================================================
   CSS · 通用卡片 & 组件
   ============================================================ */
.d-card {
  background:#fff; border-radius:16px;
  border:1px solid rgba(0,0,0,0.04);
  box-shadow:0 2px 12px rgba(0,0,0,0.05);
}
.d-card.active-card {
  border-color:rgba(245,118,42,0.25);
  box-shadow:0 2px 20px rgba(245,96,42,0.1);
}
.d-card-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:13px 18px; border-bottom:1px solid #F7F5F1;
}
.d-card-header.active-header {
  background:linear-gradient(135deg,rgba(255,128,64,0.04),rgba(245,96,42,0.06));
  border-radius:16px 16px 0 0;
}
.d-card-title-row { display:flex; align-items:center; gap:8px; }
.d-step-num {
  width:22px; height:22px; border-radius:7px;
  display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:700; flex-shrink:0;
}
.d-step-num.done { background:#F5762A; color:#fff; }
.d-step-num.active { background:linear-gradient(135deg,#FF8040,#F5602A); color:#fff; box-shadow:0 3px 10px rgba(245,96,42,0.4); }
.d-step-num.idle { background:#F0EDE8; color:#B0AA9F; }
.d-card-title { font-size:14px; font-weight:700; color:#1A1614; }
.d-step-badge {
  font-size:11px; font-weight:600; padding:3px 10px; border-radius:20px;
}
.d-step-badge.done { background:#F0FDF4; color:#22C55E; }
.d-step-badge.active { background:#FFF3E8; color:#F5762A; }
.d-step-badge.idle { background:#F7F5F1; color:#B0AA9F; }
.d-card-body { padding:16px 18px; }

/* 步骤进度条 */
.d-step-bar {
  background:#fff; border-radius:16px; padding:14px 24px;
  border:1px solid rgba(0,0,0,0.04);
  box-shadow:0 2px 12px rgba(0,0,0,0.05);
  margin-bottom:16px;
  display:flex; align-items:center;
}
.d-step-item { display:flex; flex-direction:column; align-items:center; gap:5px; }
.d-step-circle {
  width:32px; height:32px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:700; transition:all 0.3s;
}
.d-step-circle.done { background:#F5762A; color:#fff; }
.d-step-circle.active { background:linear-gradient(135deg,#FF8040,#F5602A); color:#fff; box-shadow:0 4px 14px rgba(245,96,42,0.4); }
.d-step-circle.idle { background:#F0EDE8; color:#B0AA9F; }
.d-step-label { font-size:11px; color:#9E9890; font-weight:500; }
.d-step-label.active { color:#F5762A; font-weight:700; }
.d-step-line { flex:1; height:2px; background:#F0EDE8; margin:0 6px; margin-bottom:16px; }
.d-step-line.done { background:#F5762A; }

/* 输入控件 */
.d-label { font-size:12px; color:#9E9890; font-weight:500; margin-bottom:5px; }
.d-input {
  background:#F7F5F1; border:1.5px solid #EDE9E3;
  border-radius:10px; padding:9px 12px;
  font-size:13px; color:#1A1614; font-family:inherit;
  width:100%; outline:none; transition:all 0.2s;
}
.d-input:focus { border-color:#F5762A; background:#fff; box-shadow:0 0 0 3px rgba(245,96,42,0.1); }
.d-textarea {
  background:#F7F5F1; border:1.5px solid #EDE9E3;
  border-radius:10px; padding:10px 12px;
  font-size:12px; color:#1A1614; font-family:inherit;
  width:100%; outline:none; resize:none; line-height:1.65;
  transition:all 0.2s;
}
.d-textarea:focus { border-color:#F5762A; background:#fff; box-shadow:0 0 0 3px rgba(245,96,42,0.1); }
.d-select {
  background:#F7F5F1; border:1.5px solid #EDE9E3;
  border-radius:10px; padding:8px 32px 8px 12px;
  font-size:13px; color:#1A1614; font-family:inherit;
  width:100%; outline:none; appearance:none;
  background-image:url("data:image/svg+xml,%3Csvg width='12' height='12' viewBox='0 0 24 24' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M6 9L12 15L18 9' stroke='%23B0AA9F' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat:no-repeat; background-position:right 12px center;
  cursor:pointer; transition:border-color 0.2s;
}
.d-select:focus { border-color:#F5762A; }

/* 按钮 */
.d-btn {
  padding:8px 16px; border-radius:9px; border:none;
  font-size:13px; font-weight:600; font-family:inherit;
  cursor:pointer; transition:all 0.15s;
  display:inline-flex; align-items:center; justify-content:center; gap:5px;
}
.d-btn:active { transform:scale(0.97); }
.d-btn-ghost { background:#F7F5F1; color:#6E6860; border:1px solid #EDE9E3; }
.d-btn-ghost:hover { background:#EDE9E3; }
.d-btn-primary {
  background:linear-gradient(135deg,#FF8040,#F5602A); color:#fff;
  box-shadow:0 3px 10px rgba(245,96,42,0.35);
}
.d-btn-primary:hover { box-shadow:0 5px 16px rgba(245,96,42,0.45); transform:translateY(-1px); }
.d-btn-primary:disabled { background:#E8E4DF; color:#B0AA9F; box-shadow:none; transform:none; cursor:not-allowed; }
.d-btn-lg {
  width:100%; padding:11px; border-radius:12px; border:none;
  background:linear-gradient(135deg,#FF8040,#F5602A); color:#fff;
  font-size:13px; font-weight:700; font-family:inherit;
  cursor:pointer; box-shadow:0 4px 16px rgba(245,96,42,0.4);
  transition:all 0.15s; display:flex; align-items:center; justify-content:center; gap:6px;
}
.d-btn-lg:hover { box-shadow:0 6px 22px rgba(245,96,42,0.5); transform:translateY(-1px); }
.d-btn-lg:disabled { background:#E8E4DF; color:#B0AA9F; box-shadow:none; transform:none; cursor:not-allowed; }
.d-btn-danger { background:#FFF0EF; color:#E5534B; border:1px solid #F5C0BA; }
.d-btn-danger:hover { background:#FFE4E2; }

/* 滑块 */
.d-slider-wrap { position:relative; height:18px; display:flex; align-items:center; }
.d-slider-track { position:absolute; left:0; right:0; height:3px; background:#F0EDE8; border-radius:3px; }
.d-slider-fill { position:absolute; left:0; height:3px; background:linear-gradient(90deg,#FF8040,#F5602A); border-radius:3px; }
.d-slider-thumb { position:absolute; width:16px; height:16px; border-radius:50%; background:#fff; border:2px solid #F5762A; box-shadow:0 2px 8px rgba(245,96,42,0.35); transform:translateX(-50%); pointer-events:none; }
.d-slider-input { position:absolute; width:100%; opacity:0; cursor:pointer; height:18px; margin:0; }

/* Toast */
.d-toast {
  position:fixed; top:24px; left:50%; transform:translateX(-50%);
  background:rgba(26,22,20,0.92); color:#fff;
  padding:10px 20px; border-radius:24px; font-size:13px; font-weight:500;
  z-index:9999; pointer-events:none;
  opacity:0; transition:opacity 0.25s;
  white-space:nowrap;
}
.d-toast.show { opacity:1; }

/* 错误提示 */
.d-err { font-size:12px; color:#E5534B; padding:8px 12px; background:#FFF0EF; border-radius:8px; }

/* 任务表格 */
.d-table { width:100%; border-collapse:collapse; }
.d-table th {
  font-size:12px; font-weight:600; color:#9E9890;
  text-align:left; padding:10px 16px;
  border-bottom:1px solid #F0EDE8;
}
.d-table td { padding:13px 16px; border-bottom:1px solid #F7F5F1; vertical-align:middle; }
.d-table tr:last-child td { border-bottom:none; }
.d-table tr:hover td { background:#FDFCFB; }

/* 步骤点（任务列表用） */
.d-dots { display:flex; align-items:center; gap:2px; }
.d-dot {
  width:22px; height:22px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:8px; font-weight:700; flex-shrink:0;
}
.d-dot.done { background:#F5762A; color:#fff; }
.d-dot.active { background:#FFF3E8; color:#F5762A; border:1.5px solid #F5762A; }
.d-dot.idle { background:#F0EDE8; color:#C8C3BC; }
.d-dot-line { width:8px; height:1.5px; background:#F0EDE8; }
.d-dot-line.done { background:#F5762A; }

/* 进度条（数字人生成） */
.d-progress-bar { height:6px; background:#F0EDE8; border-radius:4px; overflow:hidden; }
.d-progress-fill { height:100%; background:linear-gradient(90deg,#FF8040,#F5602A); border-radius:4px; transition:width 0.4s; }

/* ============================================================
   CSS · 登录弹窗
   ============================================================ */
.d-modal-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.45);
  display:flex; align-items:center; justify-content:center;
  z-index:1000; backdrop-filter:blur(4px);
}
.d-modal {
  background:#fff; border-radius:20px;
  padding:32px 36px; width:400px;
  box-shadow:0 20px 60px rgba(0,0,0,0.25);
}
.d-modal-title { font-size:20px; font-weight:700; color:#1A1614; margin-bottom:6px; }
.d-modal-sub { font-size:13px; color:#9E9890; margin-bottom:24px; }
.d-auth-tabs { display:flex; gap:4px; background:#F7F5F1; border-radius:10px; padding:3px; margin-bottom:20px; }
.d-auth-tab {
  flex:1; padding:8px; border-radius:8px; text-align:center;
  font-size:13px; font-weight:600; cursor:pointer; transition:all 0.15s;
  color:#9E9890;
}
.d-auth-tab.active { background:#fff; color:#F5762A; box-shadow:0 1px 6px rgba(0,0,0,0.08); }
.d-field { margin-bottom:14px; }
.d-sms-row { display:flex; gap:8px; }
.d-sms-row .d-input { flex:1; }

/* ============================================================
   CSS · 平台标签
   ============================================================ */
.d-platform-tab {
  padding:5px 14px; border-radius:8px;
  font-size:12px; font-weight:600; cursor:pointer;
  transition:all 0.15s; border:1.5px solid transparent;
}
.d-platform-tab.active { background:#FFF3E8; color:#F5762A; border-color:#FFD4B8; }
.d-platform-tab.inactive { background:#F7F5F1; color:#9E9890; }

/* 情绪标签 */
.d-emotion {
  padding:4px 10px; border-radius:6px;
  font-size:11px; font-weight:500; cursor:pointer; transition:all 0.15s;
  border:1px solid transparent;
}
.d-emotion.active { background:#F5762A; color:#fff; }
.d-emotion.inactive { background:#F7F5F1; color:#9E9890; }
.d-emotion.inactive:hover { background:#EDE9E3; }

/* 开关 */
.d-toggle {
  width:34px; height:18px; border-radius:9px; position:relative;
  cursor:pointer; transition:background 0.2s; flex-shrink:0;
}
.d-toggle.on { background:#F5762A; }
.d-toggle.off { background:#E8E4DF; }
.d-toggle-ball {
  position:absolute; top:2px; width:14px; height:14px;
  border-radius:50%; background:#fff; box-shadow:0 1px 4px rgba(0,0,0,0.2);
  transition:left 0.2s;
}
.d-toggle.on .d-toggle-ball { left:18px; }
.d-toggle.off .d-toggle-ball { left:2px; }
</style>
</head>
<body>

<!-- Toast -->
<div class="d-toast" id="dToast"></div>

<!-- Login Modal -->
<div class="d-modal-overlay" id="dLoginModal" style="display:none">
  <div class="d-modal">
    <div class="d-modal-title">欢迎使用</div>
    <div class="d-modal-sub">爆款文案工坊 · 桌面版</div>
    <div class="d-auth-tabs">
      <div class="d-auth-tab active" id="dTabSms" onclick="dSwitchAuth('sms')">验证码登录</div>
      <div class="d-auth-tab" id="dTabPwd" onclick="dSwitchAuth('pwd')">密码登录</div>
    </div>
    <!-- SMS -->
    <div id="dAuthSms">
      <div class="d-field">
        <div class="d-label">手机号</div>
        <input class="d-input" id="dPhone" placeholder="请输入手机号" maxlength="11" oninput="dS.phone=this.value">
      </div>
      <div class="d-field">
        <div class="d-label">验证码</div>
        <div class="d-sms-row">
          <input class="d-input" id="dSmsCode" placeholder="6 位验证码" maxlength="6" oninput="dS.smsCode=this.value">
          <button class="d-btn d-btn-ghost" id="dSendSmsBtn" onclick="dSendSms()" style="flex-shrink:0;white-space:nowrap">获取验证码</button>
        </div>
      </div>
      <div id="dAuthErr" style="display:none" class="d-err"></div>
      <button class="d-btn-lg" onclick="dLoginSms()" style="margin-top:8px">登录 / 注册</button>
    </div>
    <!-- PWD -->
    <div id="dAuthPwd" style="display:none">
      <div class="d-field">
        <div class="d-label">手机号</div>
        <input class="d-input" id="dPwdPhone" placeholder="请输入手机号" maxlength="11" oninput="dS.phone=this.value">
      </div>
      <div class="d-field">
        <div class="d-label">密码</div>
        <input class="d-input" type="password" id="dPwdInput" placeholder="请输入密码" oninput="dS.password=this.value">
      </div>
      <div id="dPwdErr" style="display:none" class="d-err"></div>
      <button class="d-btn-lg" onclick="dLoginPwd()" style="margin-top:8px">登录</button>
    </div>
  </div>
</div>

<!-- Main App Shell -->
<div class="d-shell" id="dApp" style="display:none">
  <!-- 侧边栏 -->
  <div class="d-sidebar">
    <div class="d-logo">
      <div class="d-logo-icon">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M12 2L14.5 9.5H22L16.5 14L18.5 21L12 17L5.5 21L7.5 14L2 9.5H9.5L12 2Z" fill="white"/></svg>
      </div>
      <span class="d-logo-text">爆款文案工坊</span>
    </div>
    <div class="d-nav-section">
      <div class="d-nav-label">主要功能</div>
      <div class="d-nav-item active" id="dNavHome" onclick="dGoPage('home')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M5 12L12 5L19 12V20C19 20.55 18.55 21 18 21H15V16H9V21H6C5.45 21 5 20.55 5 20V12Z" fill="#F5762A" stroke="#F5762A" stroke-width="1.5" stroke-linejoin="round"/></svg>
        <span>克隆流程</span>
      </div>
      <div class="d-nav-item" id="dNavTasks" onclick="dGoPage('tasks')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><rect x="5" y="3" width="14" height="18" rx="2.5" stroke="#9E9890" stroke-width="1.8"/><path d="M9 8H15M9 12H15M9 16H12" stroke="#9E9890" stroke-width="1.6" stroke-linecap="round"/></svg>
        <span>我的任务</span>
      </div>
    </div>
    <div class="d-nav-section">
      <div class="d-nav-label">资源管理</div>
      <div class="d-nav-item" id="dNavVoices" onclick="dGoPage('voices')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M12 3C10.34 3 9 4.34 9 6V12C9 13.66 10.34 15 12 15C13.66 15 15 13.66 15 12V6C15 4.34 13.66 3 12 3Z" stroke="#9E9890" stroke-width="1.8"/><path d="M5 11C5 14.87 8.13 18 12 18C15.87 18 19 14.87 19 11" stroke="#9E9890" stroke-width="1.8" stroke-linecap="round"/><path d="M12 18V21M9 21H15" stroke="#9E9890" stroke-width="1.8" stroke-linecap="round"/></svg>
        <span>声音管理</span>
      </div>
      <div class="d-nav-item" id="dNavAvatars" onclick="dGoPage('avatars')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="#9E9890" stroke-width="1.8"/><path d="M4 20C4 16.69 7.58 14 12 14C16.42 14 20 16.69 20 20" stroke="#9E9890" stroke-width="1.8" stroke-linecap="round"/></svg>
        <span>数字人管理</span>
      </div>
    </div>
    <div class="d-sidebar-bottom">
      <div class="d-nav-label" style="padding:0 0 6px">账号</div>
      <div class="d-user-chip" onclick="dGoPage('profile')">
        <div class="d-avatar-circle" id="dSideAvatar">我</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;font-weight:600;color:#1A1614;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" id="dSideName">创作者</div>
          <div style="font-size:10px;color:#B0AA9F;margin-top:1px">个人资料</div>
        </div>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M9 18L15 12L9 6" stroke="#C8C3BC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </div>
  </div>

  <!-- 主内容区 -->
  <div class="d-main">
    <div class="d-content" id="dMainContent">
      <!-- 由 JS 动态渲染 -->
    </div>
  </div>
</div>

<script>
/* ============================================================
   JS · 公共工具
   ============================================================ */
const API_BASE = `${location.origin}/api`;
function dGetToken() { return localStorage.getItem('wf_token') || ''; }
function dSetToken(t) { localStorage.setItem('wf_token', t); }
function dClearAuth() { localStorage.removeItem('wf_token'); localStorage.removeItem('wf_user'); }
function dGetUser() { try { return JSON.parse(localStorage.getItem('wf_user') || 'null'); } catch { return null; } }
function dSetUser(u) { localStorage.setItem('wf_user', JSON.stringify(u)); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function dApi(method, path, data) {
  const token = dGetToken();
  const opts = {
    method,
    headers: { 'Content-Type':'application/json', ...(token ? {'Authorization':`Bearer ${token}`} : {}) }
  };
  if (data) opts.body = JSON.stringify(data);
  try {
    const res = await fetch(API_BASE + path, opts);
    const raw = await res.text();
    if (!raw.trim()) return { code: res.status || 500, msg: '服务器无响应' };
    return JSON.parse(raw);
  } catch (e) {
    return { code: 500, msg: e.message };
  }
}
const dHttp = {
  get: (p) => dApi('GET', p),
  post: (p, d) => dApi('POST', p, d),
  put: (p, d) => dApi('PUT', p, d),
};

let _dToastTimer = null;
function dToast(msg, dur=2500) {
  const el = document.getElementById('dToast');
  el.textContent = msg; el.classList.add('show');
  if (_dToastTimer) clearTimeout(_dToastTimer);
  _dToastTimer = setTimeout(() => el.classList.remove('show'), dur);
}

/* ============================================================
   JS · 渲染入口
   ============================================================ */
function dRender() {
  const el = document.getElementById('dMainContent');
  if (!el) return;
  switch (dS.page) {
    case 'home':    el.innerHTML = dRenderHome(); dBindHome(); break;
    case 'tasks':   el.innerHTML = dRenderTasks(); dBindTasks(); break;
    case 'voices':  el.innerHTML = dRenderVoices(); break;
    case 'avatars': el.innerHTML = dRenderAvatars(); break;
    case 'profile': el.innerHTML = dRenderProfile(); dBindProfile(); break;
    default:        el.innerHTML = dRenderHome(); dBindHome();
  }
}

function dGoPage(page) {
  dS.page = page;
  document.querySelectorAll('.d-nav-item').forEach(el => el.classList.remove('active'));
  const navMap = { home:'dNavHome', tasks:'dNavTasks', voices:'dNavVoices', avatars:'dNavAvatars', profile:'' };
  if (navMap[page]) document.getElementById(navMap[page])?.classList.add('active');
  dRender();
}

/* ============================================================
   JS · 登录 / Auth
   ============================================================ */
function dSwitchAuth(mode) {
  dS.authMode = mode;
  document.getElementById('dAuthSms').style.display = mode==='sms' ? '' : 'none';
  document.getElementById('dAuthPwd').style.display = mode==='pwd' ? '' : 'none';
  document.getElementById('dTabSms').className = 'd-auth-tab' + (mode==='sms' ? ' active' : '');
  document.getElementById('dTabPwd').className = 'd-auth-tab' + (mode==='pwd' ? ' active' : '');
}

let _smsTimer = null;
async function dSendSms() {
  const phone = document.getElementById('dPhone')?.value?.trim() || dS.phone;
  if (!/^1\d{10}$/.test(phone)) { dToast('请输入正确的手机号'); return; }
  dS.phone = phone;
  const btn = document.getElementById('dSendSmsBtn');
  btn.disabled = true;
  const r = await dHttp.post('/auth/send-sms', { phone });
  if (r.code !== 200) { dToast(r.msg || '发送失败'); btn.disabled = false; return; }
  dToast('验证码已发送');
  dS.smsCountdown = 60;
  _smsTimer = setInterval(() => {
    dS.smsCountdown--;
    btn.textContent = dS.smsCountdown > 0 ? `${dS.smsCountdown}s` : '重新发送';
    if (dS.smsCountdown <= 0) { clearInterval(_smsTimer); btn.disabled = false; }
  }, 1000);
}

async function dLoginSms() {
  const phone = document.getElementById('dPhone')?.value?.trim() || dS.phone;
  const code  = document.getElementById('dSmsCode')?.value?.trim() || dS.smsCode;
  if (!phone || !code) { dShowAuthErr('请填写手机号和验证码'); return; }
  const r = await dHttp.post('/auth/sms-login', { phone, code });
  if (r.code !== 200) { dShowAuthErr(r.msg || '登录失败'); return; }
  dSetToken(r.data.token); dSetUser(r.data.user);
  dS.userInfo = r.data.user;
  dInitApp();
}

async function dLoginPwd() {
  const phone = document.getElementById('dPwdPhone')?.value?.trim() || dS.phone;
  const password = document.getElementById('dPwdInput')?.value || dS.password;
  if (!phone || !password) { dShowPwdErr('请填写手机号和密码'); return; }
  const r = await dHttp.post('/auth/login', { phone, password });
  if (r.code !== 200) { dShowPwdErr(r.msg || '登录失败'); return; }
  dSetToken(r.data.token); dSetUser(r.data.user);
  dS.userInfo = r.data.user;
  dInitApp();
}

function dShowAuthErr(msg) {
  const el = document.getElementById('dAuthErr');
  if (el) { el.textContent = msg; el.style.display = ''; }
}
function dShowPwdErr(msg) {
  const el = document.getElementById('dPwdErr');
  if (el) { el.textContent = msg; el.style.display = ''; }
}

/* ============================================================
   JS · 初始化
   ============================================================ */
async function dInitApp() {
  document.getElementById('dLoginModal').style.display = 'none';
  document.getElementById('dApp').style.display = 'flex';
  // 拉取用户信息
  const r = await dHttp.get('/auth/me');
  if (r.code === 200) {
    dS.userInfo = r.data;
    dSetUser(r.data);
  } else if (r.code === 401) {
    dClearAuth(); dShowLogin(); return;
  }
  // 更新侧边栏用户信息，然后渲染
  dUpdateSideUser();
  dRender();
}

function dUpdateSideUser() {
  const u = dS.userInfo;
  if (!u) return;
  const name = u.nickname || u.phone?.replace(/(\d{3})\d{4}(\d{4})/, '$1****$2') || '创作者';
  const el = document.getElementById('dSideName');
  const av = document.getElementById('dSideAvatar');
  if (el) el.textContent = name;
  if (av) av.textContent = name.charAt(0);
}

function dShowLogin() {
  document.getElementById('dLoginModal').style.display = 'flex';
  document.getElementById('dApp').style.display = 'none';
}

window.addEventListener('DOMContentLoaded', () => {
  if (dGetToken()) {
    document.getElementById('dApp').style.display = 'flex';
    document.getElementById('dLoginModal').style.display = 'none';
    dInitApp();
  } else {
    dShowLogin();
  }
});

/* ============================================================
   JS · 桌面端 · 克隆流程页 (dRenderHome)
   ============================================================ */
function dStepCircle(step, current) {
  const cls = step < current ? 'done' : step === current ? 'active' : 'idle';
  const icon = step < current
    ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M5 12L10 17L19 8" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>'
    : step + 1;
  return `<div class="d-step-circle ${cls}">${icon}</div>`;
}

function dRenderHome() {
  const cur = dCurrentStep();
  const steps = ['提取','改写','语音','数字人','后期'];
  const stepBar = `
  <div class="d-step-bar">
    ${steps.map((s,i) => `
      <div class="d-step-item">
        ${dStepCircle(i, cur)}
        <div class="d-step-label ${i===cur?'active':''}">${s}</div>
      </div>
      ${i < steps.length-1 ? `<div class="d-step-line ${i < cur ? 'done' : ''}"></div>` : ''}
    `).join('')}
  </div>`;

  return `
  <div>
    <!-- 顶部信息栏 -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div style="font-size:18px;font-weight:700;color:#1A1614">克隆流程</div>
      <button class="d-btn d-btn-ghost" onclick="dResetFlow()" style="font-size:12px">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M3 12C3 7.03 7.03 3 12 3C15.4 3 18.35 4.85 20 7.6M21 12C21 16.97 16.97 21 12 21C8.6 21 5.65 19.15 4 16.4" stroke="#6E6860" stroke-width="2" stroke-linecap="round"/><path d="M20 3V8H15" stroke="#6E6860" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 21V16H9" stroke="#6E6860" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        清空流程
      </button>
    </div>

    ${stepBar}

    <!-- 第一行：提取 + 改写 + 语音（3列） -->
    <div style="display:grid;grid-template-columns:1fr 1fr 1.1fr;gap:14px;margin-bottom:14px">
      ${dCardExtract()}
      ${dCardRewrite()}
      ${dCardTTS()}
    </div>

    <!-- 第二行：数字人 + 后期（2列） -->
    <div style="display:grid;grid-template-columns:1.1fr 1fr;gap:14px">
      ${dCardAvatar()}
      ${dCardPostProcess()}
    </div>
  </div>`;
}

function dCurrentStep() {
  if (dS.extractStep === 0) return 0;
  if (dS.extractStep === 1) return 1;
  if (dS.extractStep === 2) return 2;
  if (dS.extractStep === 3 || dS.extractStep === 'tts_gen') return 3;
  if (dS.extractStep === 4 || dS.extractStep === 'avatar_gen') return 4;
  if (dS.extractStep === 5) return 4;
  return 0;
}

function dStepState(stepIdx) {
  const cur = dCurrentStep();
  if (stepIdx < cur) return 'done';
  if (stepIdx === cur) return 'active';
  return 'idle';
}

/* 步骤徽章图标 */
function dCheckIcon() {
  return '<svg width="11" height="11" viewBox="0 0 24 24" fill="none"><path d="M5 12L10 17L19 8" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
}

/* ① 提取 */
async function dHandleExtract() {
  const url = document.getElementById('dVideoUrl')?.value?.trim() || dS.videoUrl;
  if (!url) { dToast('请输入视频链接'); return; }
  dS.videoUrl = url;
  dS.extractLoading = true; dS.extractErr = '';
  dRender();
  const r = await dHttp.post('/ai/extract', { url });
  dS.extractLoading = false;
  if (r.code !== 200) {
    dS.extractErr = r.msg || '提取失败'; dRender(); return;
  }
  dS.extractedScript = r.data?.script || r.data?.text || '';
  dS.cloneTaskId = r.data?.taskId || null;
  dS.extractStep = 1;
  dRender();
}

/* ② 改写 */
async function dHandleRewrite() {
  const script = document.getElementById('dExtractedScript')?.value || dS.extractedScript;
  if (!script) { dToast('没有文案可改写'); return; }
  dS.extractedScript = script;
  dS.rewriteLoading = true; dS.rewriteErr = '';
  dRender();
  const style = document.getElementById('dRewriteStyle')?.value || dS.rewriteStyle;
  const r = await dHttp.post('/ai/rewrite', {
    script, style,
    ...(dS.cloneTaskId ? { taskId: dS.cloneTaskId } : {})
  });
  dS.rewriteLoading = false;
  if (r.code !== 200) {
    dS.rewriteErr = r.msg || '改写失败'; dRender(); return;
  }
  dS.rewrittenScript = r.data?.rewritten || r.data?.script || '';
  dS.extractStep = 2;
  dRender();
}

/* ③ TTS */
async function dHandleTTS() {
  const voiceId = document.getElementById('dTtsVoice')?.value || dS.ttsVoiceId;
  if (!voiceId) { dToast('请选择声音'); return; }
  const text = dS.rewrittenScript || dS.extractedScript;
  if (!text) { dToast('没有文案'); return; }
  dS.ttsLoading = true; dS.ttsErr = ''; dS.ttsVoiceId = voiceId;
  dRender();
  const r = await dHttp.post('/ai/tts', {
    text, voice_id: voiceId,
    speed: dS.ttsSpeed, volume: dS.ttsVolume,
    emotion: dS.ttsEmotion,
  });
  dS.ttsLoading = false;
  if (r.code !== 200) {
    dS.ttsErr = r.msg || '语音合成失败'; dRender(); return;
  }
  // 后端返回 audio_b64 或 audio_url
  if (r.data?.audio_b64) {
    const b64 = r.data.audio_b64;
    dS.ttsAudioB64 = b64;
    const raw = atob(b64); const buf = new Uint8Array(raw.length);
    for (let i = 0; i < raw.length; i++) buf[i] = raw.charCodeAt(i);
    dS.ttsAudioUrl = URL.createObjectURL(new Blob([buf], { type:'audio/mp3' }));
  } else if (r.data?.audio_url) {
    dS.ttsAudioUrl = r.data.audio_url;
  }
  dS.extractStep = 3;
  dRender();
}

/* ④ 数字人 · 提交生成 */
let _dAvatarPoller = null;
let _dAvatarRunSeq = 0;

async function dHandleAvatarGenerate() {
  if (!dS.avatarSrcVideoB64) { dToast('请先上传参考视频'); return; }
  if (!dS.ttsAudioB64) { dToast('请先完成语音合成（步骤③）'); return; }
  dS.avatarGenerating = true; dS.avatarErr = '';
  dS.avatarProgressMsg = '正在提交任务...'; dS.avatarProgressPct = 10;
  dS.extractStep = 'avatar_gen';
  dRender();

  const body = {
    video_b64: dS.avatarSrcVideoB64,
    video_fmt: dS.avatarSrcVideoFmt || 'mp4',
    audio_b64: dS.ttsAudioB64,
    audio_fmt: 'mp3',
    enhancer: dS.avatarBeauty,
  };

  const r = await dHttp.post('/ai/video/generate', body);
  if (r.code !== 200) {
    dS.avatarGenerating = false; dS.avatarErr = r.msg || '提交失败';
    dS.extractStep = 3; dRender(); return;
  }
  const taskId = r.data?.task_id;
  dS.avatarTaskId = taskId;
  dS.avatarProgressMsg = '任务已提交，等待 GPU 渲染...';
  dS.avatarProgressPct = 20;
  dRender();
  _dAvatarRunSeq++;
  _dStartAvatarPoller(taskId, _dAvatarRunSeq);
}

function _dStartAvatarPoller(taskId, runSeq) {
  if (_dAvatarPoller) clearInterval(_dAvatarPoller);
  let elapsed = 0;
  let inFlight = false;
  _dAvatarPoller = setInterval(async () => {
    if (runSeq !== _dAvatarRunSeq) { clearInterval(_dAvatarPoller); return; }
    if (inFlight) return;
    inFlight = true; elapsed += 10;
    try {
      const r = await dHttp.get(`/ai/video/task/${taskId}`);
      if (r.code !== 200) { inFlight = false; return; }
      const t = r.data;
      const pct = Math.min(90, 20 + elapsed * 0.5);
      dS.avatarProgressPct = pct;
      dS.avatarProgressMsg = t.msg || '处理中...';
      _dUpdateAvatarProgress();
      if (t.status === 'done' && t.video_direct_url) {
        clearInterval(_dAvatarPoller); _dAvatarPoller = null;
        dS.avatarProgressMsg = '生成完成，正在加载视频...'; dS.avatarProgressPct = 95;
        _dUpdateAvatarProgress();
        try {
          const streamUrl = `/ai/video/stream/${taskId}?t=${encodeURIComponent(dGetToken())}`;
          const resp = await fetch(streamUrl);
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          const blob = await resp.blob();
          const mp4Blob = blob.type === 'video/mp4' ? blob : new Blob([blob], { type:'video/mp4' });
          dS.avatarVideoUrl = URL.createObjectURL(mp4Blob);
        } catch (e) {
          dS.avatarErr = `视频加载失败: ${e.message}`;
        }
        dS.avatarGenerating = false; dS.extractStep = 4;
        dRender();
      } else if (t.status === 'error') {
        clearInterval(_dAvatarPoller);
        dS.avatarGenerating = false; dS.avatarErr = t.error || '生成失败';
        dS.extractStep = 3; dRender();
      }
    } catch(e) {
      console.error('[d-avatar]', e);
    } finally { inFlight = false; }
  }, 10000);
}

function _dUpdateAvatarProgress() {
  const msgEl = document.querySelector('#dMainContent .d-progress-fill');
  const txtEl = document.querySelector('#dMainContent .d-card-body div[style*="text-align:center"] div:first-child');
  if (msgEl) msgEl.style.width = dS.avatarProgressPct + '%';
  if (txtEl) txtEl.textContent = dS.avatarProgressMsg;
}

function dTaskSteps(t) {
  // 根据任务数据推断各步骤状态
  const has = field => t[field] != null && t[field] !== '';
  return [
    has('videoTitle') || has('script') ? 'done' : 'idle',
    has('rewritten') ? 'done' : 'idle',
    has('audioUrl') || has('ttsAudio') ? 'done' : 'idle',
    has('videoUrl') || has('avatarVideo') ? 'done' : 'idle',
    has('finalVideo') ? 'done' : 'idle',
    'idle',
  ];
}

function dFmtTime(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  if (isNaN(d)) return ts;
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

   JS · 声音管理页 (dRenderVoices)
   ============================================================ */
function dRenderVoices() {
  const voices = dS.myVoices;
  const voiceCards = voices.length === 0
    ? `<div style="text-align:center;padding:60px 20px;color:#B0AA9F">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" style="margin-bottom:12px;opacity:0.35"><path d="M12 3C10.34 3 9 4.34 9 6V12C9 13.66 10.34 15 12 15C13.66 15 15 13.66 15 12V6C15 4.34 13.66 3 12 3Z" stroke="#B0AA9F" stroke-width="1.5"/><path d="M5 11C5 14.87 8.13 18 12 18C15.87 18 19 14.87 19 11" stroke="#B0AA9F" stroke-width="1.5" stroke-linecap="round"/><path d="M12 18V21M9 21H15" stroke="#B0AA9F" stroke-width="1.5" stroke-linecap="round"/></svg>
        <div style="font-size:14px;font-weight:600;margin-bottom:6px">还没有克隆声音</div>
        <div style="font-size:12px">上传音频样本，克隆专属声音</div>
      </div>`
    : `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px">
        ${voices.map((v, i) => `
          <div class="d-card" style="padding:16px;display:flex;flex-direction:column;gap:10px">
            <div style="display:flex;align-items:center;gap:10px">
              <div style="width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,#FF8040,#F5602A);display:flex;align-items:center;justify-content:center;flex-shrink:0">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 3C10.34 3 9 4.34 9 6V12C9 13.66 10.34 15 12 15C13.66 15 15 13.66 15 12V6C15 4.34 13.66 3 12 3Z" fill="white"/><path d="M5 11C5 14.87 8.13 18 12 18C15.87 18 19 14.87 19 11" stroke="white" stroke-width="1.8" stroke-linecap="round"/></svg>
              </div>
              <div style="flex:1;min-width:0">
                <div style="font-size:13px;font-weight:600;color:#1A1614;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(v.name || '未命名声音')}</div>
                <div style="font-size:11px;color:#B0AA9F;margin-top:2px">${v.createdAt ? dFmtTime(v.createdAt) : '—'}</div>
              </div>
            </div>
            <div style="font-size:11px;background:#F7F5F1;border-radius:8px;padding:6px 10px;color:#9E9890;word-break:break-all">
              ID: ${esc((v.voiceId || v.id || '').slice(0, 24))}...
            </div>
            <div style="display:flex;gap:7px">
              <button class="d-btn d-btn-ghost" style="flex:1;font-size:11px;padding:6px"
                onclick="dUseVoiceInClone('${esc(v.voiceId || v.id)}', '${esc(v.name || '')}')">
                在克隆流程中使用
              </button>
              <button class="d-btn d-btn-danger" style="font-size:11px;padding:6px 10px"
                onclick="dDeleteVoice(${i})">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M3 6H21M8 6V4H16V6M19 6L18.1 19.1C18 20.15 17.1 21 16.05 21H7.95C6.9 21 6 20.15 5.9 19.1L5 6" stroke="#E5534B" stroke-width="1.8" stroke-linecap="round"/></svg>
              </button>
            </div>
          </div>
        `).join('')}
      </div>`;

  return `
  <div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <div>
        <div style="font-size:18px;font-weight:700;color:#1A1614">声音管理</div>
        <div style="font-size:12px;color:#B0AA9F;margin-top:3px">共 ${voices.length} 个克隆声音</div>
      </div>
    </div>

    <!-- 克隆新声音 -->
    <div class="d-card" style="margin-bottom:20px;padding:20px">
      <div style="font-size:14px;font-weight:700;color:#1A1614;margin-bottom:14px;display:flex;align-items:center;gap:8px">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 5V19M5 12H19" stroke="#F5762A" stroke-width="2.5" stroke-linecap="round"/></svg>
        克隆新声音
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr auto;gap:12px;align-items:end">
        <div>
          <div class="d-label">声音名称</div>
          <input class="d-input" id="dVoiceCloneName" placeholder="给声音起个名字..." value="${esc(dS.voiceCloneName)}" oninput="dS.voiceCloneName=this.value">
        </div>
        <div>
          <div class="d-label">音频样本（MP3/WAV，建议30秒+）</div>
          <div style="display:flex;gap:8px">
            <label style="flex:1;display:flex;align-items:center;gap:8px;padding:8px 12px;background:#F7F5F1;border:1.5px dashed #D4D0C8;border-radius:10px;cursor:pointer;font-size:12px;color:#9E9890;transition:border-color 0.15s"
              onmouseenter="this.style.borderColor='#F5762A'" onmouseleave="this.style.borderColor='#D4D0C8'">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 5V19M5 12H19" stroke="#C4C0B8" stroke-width="2" stroke-linecap="round"/></svg>
              <span id="dVoiceFileLabel">选择音频文件</span>
              <input type="file" id="dVoiceFileInput" accept="audio/*" style="display:none" onchange="dOnVoiceFileSelect(event)">
            </label>
          </div>
        </div>
        <button class="d-btn d-btn-primary" onclick="dHandleVoiceClone()" ${dS.voiceCloneLoading?'disabled':''} style="white-space:nowrap;padding:9px 18px">
          ${dS.voiceCloneLoading?'克隆中...':'开始克隆'}
        </button>
      </div>
      ${dS.voiceCloneErr?`<div class="d-err" style="margin-top:10px">${esc(dS.voiceCloneErr)}</div>`:''}
      <div style="font-size:11px;color:#B0AA9F;margin-top:10px;line-height:1.7">
        💡 音频样本越清晰、越长，克隆效果越好。支持 MP3 / WAV / M4A 等格式，最佳时长 30~120 秒。需要管理员配置 Fish Audio API Key。
      </div>
    </div>

    <!-- 声音列表 -->
    ${voiceCards}
  </div>`;
}

let _dVoiceFileB64 = null;
let _dVoiceFileName = '';

function dOnVoiceFileSelect(event) {
  const file = event.target.files[0];
  if (!file) return;
  _dVoiceFileName = file.name;
  document.getElementById('dVoiceFileLabel').textContent = file.name;
  const reader = new FileReader();
  reader.onload = e => { _dVoiceFileB64 = e.target.result.split(',')[1]; };
  reader.readAsDataURL(file);
}

async function dHandleVoiceClone() {
  const name = document.getElementById('dVoiceCloneName')?.value?.trim() || dS.voiceCloneName;
  if (!name) { dToast('请先输入声音名称'); return; }
  if (!_dVoiceFileB64) { dToast('请先选择音频文件'); return; }
  dS.voiceCloneLoading = true; dS.voiceCloneErr = ''; dS.voiceCloneName = name;
  dRender();
  const r = await dHttp.post('/ai/tts/clone', { audio: _dVoiceFileB64, audioName: name });
  dS.voiceCloneLoading = false;
  if (r.code !== 200) {
    dS.voiceCloneErr = r.msg || '克隆失败';
    dRender(); return;
  }
  const voiceId = r.data?.voice_id;
  const newVoice = { id: voiceId, voiceId, name, createdAt: new Date().toISOString() };
  dS.myVoices = [...dS.myVoices, newVoice];
  localStorage.setItem('myVoices', JSON.stringify(dS.myVoices));
  dS.voiceCloneName = ''; _dVoiceFileB64 = null; _dVoiceFileName = '';
  dToast('声音克隆成功！');
  dRender();
}

function dDeleteVoice(idx) {
  if (!confirm('确认删除这个克隆声音？')) return;
  dS.myVoices = dS.myVoices.filter((_, i) => i !== idx);
  localStorage.setItem('myVoices', JSON.stringify(dS.myVoices));
  dRender();
}

function dUseVoiceInClone(voiceId, name) {
  dS.ttsVoiceId = voiceId;
  dToast(`已选择声音「${name}」，前往克隆流程使用`);
  dGoPage('home');
}

/* ============================================================
   JS · 数字人管理页 (dRenderAvatars)
   ============================================================ */
function dRenderAvatars() {
  const avatars = dS.myAvatars;
  const avatarCards = avatars.length === 0
    ? `<div style="text-align:center;padding:60px 20px;color:#B0AA9F">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" style="margin-bottom:12px;opacity:0.35"><circle cx="12" cy="8" r="4" stroke="#B0AA9F" stroke-width="1.5"/><path d="M4 20C4 16.69 7.58 14 12 14C16.42 14 20 16.69 20 20" stroke="#B0AA9F" stroke-width="1.5" stroke-linecap="round"/></svg>
        <div style="font-size:14px;font-weight:600;margin-bottom:6px">还没有保存数字人形象</div>
        <div style="font-size:12px">添加常用人脸图片，快速发起生成</div>
      </div>`
    : `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px">
        ${avatars.map((a, i) => `
          <div class="d-card" style="padding:14px;display:flex;flex-direction:column;gap:10px">
            <div style="border-radius:10px;overflow:hidden;background:#2A2620;aspect-ratio:9/16;max-height:180px;display:flex;align-items:center;justify-content:center">
              <div style="text-align:center;padding:12px">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" style="opacity:0.5"><rect x="2" y="5" width="20" height="14" rx="3" stroke="white" stroke-width="1.8"/><polygon points="9,9 17,12 9,15" fill="white"/></svg>
                <div style="font-size:11px;color:rgba(255,255,255,0.5);margin-top:6px">${esc(a.name)}</div>
              </div>
            </div>
            <div>
              <div style="font-size:13px;font-weight:600;color:#1A1614;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(a.name || '未命名形象')}</div>
              <div style="font-size:11px;color:#B0AA9F;margin-top:2px">${a.createdAt ? dFmtTime(a.createdAt) : '—'}</div>
            </div>
            <div style="display:flex;gap:7px">
              <button class="d-btn d-btn-ghost" style="flex:1;font-size:11px;padding:6px"
                onclick="dUseAvatarInClone(${i})">
                使用此形象
              </button>
              <button class="d-btn d-btn-danger" style="font-size:11px;padding:6px 10px"
                onclick="dDeleteAvatar(${i})">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M3 6H21M8 6V4H16V6M19 6L18.1 19.1C18 20.15 17.1 21 16.05 21H7.95C6.9 21 6 20.15 5.9 19.1L5 6" stroke="#E5534B" stroke-width="1.8" stroke-linecap="round"/></svg>
              </button>
            </div>
          </div>
        `).join('')}
      </div>`;

  return `
  <div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <div>
        <div style="font-size:18px;font-weight:700;color:#1A1614">数字人管理</div>
        <div style="font-size:12px;color:#B0AA9F;margin-top:3px">共 ${avatars.length} 个形象</div>
      </div>
    </div>

    <!-- 添加新形象 -->
    <div class="d-card" style="margin-bottom:20px;padding:20px">
      <div style="font-size:14px;font-weight:700;color:#1A1614;margin-bottom:14px;display:flex;align-items:center;gap:8px">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 5V19M5 12H19" stroke="#F5762A" stroke-width="2.5" stroke-linecap="round"/></svg>
        保存常用形象
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start">
        <!-- 左：文件上传 + 名称 -->
        <div style="display:flex;flex-direction:column;gap:10px">
          <div>
            <div class="d-label">形象名称</div>
            <input class="d-input" id="dAvatarAddName" placeholder="给这个形象起个名字..." value="${esc(dS.avatarAddName)}" oninput="dS.avatarAddName=this.value">
          </div>
          <div>
            <div class="d-label">参考视频（说话短视频，MP4，建议 5~30 秒）</div>
            <label style="display:flex;align-items:center;gap:8px;padding:10px 14px;background:#F7F5F1;border:1.5px dashed #D4D0C8;border-radius:10px;cursor:pointer;font-size:12px;color:#9E9890;transition:border-color 0.15s"
              onmouseenter="this.style.borderColor='#F5762A'" onmouseleave="this.style.borderColor='#D4D0C8'">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><rect x="2" y="5" width="20" height="14" rx="3" stroke="#C4C0B8" stroke-width="1.8"/><polygon points="9,9 17,12 9,15" fill="#C4C0B8"/></svg>
              <span id="dAvatarAddVideoLabel">选择参考视频</span>
              <input type="file" id="dAvatarAddInput" accept="video/*" style="display:none" onchange="dOnAvatarAddSelect(event)">
            </label>
          </div>
          <button class="d-btn d-btn-primary" onclick="dHandleAvatarAdd()" style="width:100%;padding:9px 18px">
            保存形象
          </button>
        </div>
        <!-- 右：提示 -->
        <div style="background:#F7F5F1;border-radius:12px;padding:14px;font-size:11px;color:#9E9890;line-height:1.8">
          <div style="font-weight:600;color:#6E6860;margin-bottom:6px">💡 参考视频说明</div>
          <div>• 人物正脸、光线均匀的视频</div>
          <div>• 5~30 秒真人说话视频效果最佳</div>
          <div>• 建议分辨率 720p 以上</div>
          <div>• 视频会保存在本地浏览器中</div>
          <div style="color:#F5762A;margin-top:6px">⚠ 视频较大时可能占用较多存储空间</div>
        </div>
      </div>
    </div>

    <!-- 形象列表 -->
    ${avatarCards}
  </div>`;
}

let _dAddAvatarB64 = null;
let _dAddAvatarFmt = 'mp4';
let _dAddAvatarName = '';

function dOnAvatarAddSelect(event) {
  const file = event.target.files[0];
  if (!file) return;
  _dAddAvatarFmt = (file.name.split('.').pop() || 'mp4').toLowerCase();
  _dAddAvatarName = file.name;
  const label = document.getElementById('dAvatarAddVideoLabel');
  if (label) label.textContent = file.name;
  const reader = new FileReader();
  reader.onload = e => { _dAddAvatarB64 = e.target.result.split(',')[1]; };
  reader.readAsDataURL(file);
}

function dHandleAvatarAdd() {
  const name = document.getElementById('dAvatarAddName')?.value?.trim() || dS.avatarAddName;
  if (!name) { dToast('请填写形象名称'); return; }
  if (!_dAddAvatarB64) { dToast('请先选择参考视频'); return; }
  const newAvatar = {
    id: Date.now().toString(),
    name,
    videoB64: _dAddAvatarB64,
    fmt: _dAddAvatarFmt,
    fileName: _dAddAvatarName,
    createdAt: new Date().toISOString(),
  };
  dS.myAvatars = [...dS.myAvatars, newAvatar];
  localStorage.setItem('myAvatars', JSON.stringify(dS.myAvatars));
  _dAddAvatarB64 = null; _dAddAvatarName = ''; dS.avatarAddName = '';
  dToast('形象已保存！');
  dRender();
}

function dDeleteAvatar(idx) {
  if (!confirm('确认删除这个数字人形象？')) return;
  dS.myAvatars = dS.myAvatars.filter((_, i) => i !== idx);
  localStorage.setItem('myAvatars', JSON.stringify(dS.myAvatars));
  dRender();
}

function dUseAvatarInClone(idx) {
  const a = dS.myAvatars[idx];
  if (!a) return;
  dS.avatarSrcVideoB64 = a.videoB64;
  dS.avatarSrcVideoFmt = a.fmt || 'mp4';
  dS.avatarSrcVideoName = a.name;
  dToast(`已选择形象「${a.name}」，前往克隆流程使用`);
  dGoPage('home');
}

async function dSubmitAuthCode() {
  const code = document.getElementById('dAuthCodeInput')?.value?.trim();
  if (!code) { dToast('请输入授权码'); return; }
  const r = await dHttp.post('/auth/auth-code', { code });
  const msgEl = document.getElementById('dAuthCodeMsg');
  if (r.code === 200) {
    if (msgEl) { msgEl.textContent = '授权成功！'; msgEl.style.display = ''; msgEl.style.color = '#22C55E'; }
    dToast('授权成功');
    // 刷新用户信息
    const mr = await dHttp.get('/auth/me');
    if (mr.code === 200) { dS.userInfo = mr.data; dRender(); }
  } else {
    if (msgEl) { msgEl.textContent = r.msg || '授权失败'; msgEl.style.display = ''; msgEl.style.color = '#E5534B'; }
  }
}

function dLogout() {
  if (!confirm('确认退出登录？')) return;
  dClearAuth();
  dS.userInfo = null;
  dShowLogin();
}
</script>
