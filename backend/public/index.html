<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>爆款文案工坊</title>
  <style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #F7F5F1; }
body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif; -webkit-font-smoothing: antialiased; }
input, button, textarea { -webkit-appearance: none; appearance: none; font-family: inherit; border: none; outline: none; background: none; }
::-webkit-scrollbar { width: 0; height: 0; }

/* === APP WRAP === */
#app { width: 100%; height: 100%; }
.app-wrap {
  display: flex; flex-direction: column;
  height: 100vh; background: #F7F5F1; overflow: hidden;
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  max-width: 480px; margin: 0 auto;
}

/* === TOP BAR === */
.top-bar {
  display: flex; flex-direction: row; align-items: center;
  padding: calc(env(safe-area-inset-top, 0px) + 16px) 16px 10px;
  background: #F7F5F1; flex-shrink: 0;
}
.app-name { font-size: 17px; font-weight: 700; color: #1A1814; letter-spacing: .5px; }
.top-bar-login { font-size: 14px; font-weight: 600; color: #F97316; padding: 6px 4px; cursor: pointer; user-select: none; flex-shrink: 0; }
.top-bar-sub { justify-content: space-between; align-items: center; }
.back-btn { border: none; background: transparent; padding: 6px 0; margin: 0; font-size: 15px; font-weight: 500; color: #1A1814; cursor: pointer; user-select: none; display: inline-flex; align-items: center; line-height: 1.25; min-width: 56px; font-family: inherit; }
.sub-page-title { font-size: 16px; font-weight: 600; color: #1A1814; text-align: center; flex: 1; }

/* === CONTENT === */
.page-content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; min-height: 0; }
.tab-page { padding: 12px 16px 100px; }

/* === BUTTONS === */
.btn-primary {
  background: #FF6B35; color: #FFFFFF; border-radius: 50px;
  height: 46px; line-height: 46px; text-align: center;
  font-size: 15px; font-weight: 600; cursor: pointer; user-select: none; display: block; width: 100%;
}
.btn-secondary {
  background: #FFFFFF; color: #1A1814; border: 1px solid #E4E2DA;
  border-radius: 50px; height: 46px; line-height: 46px;
  text-align: center; font-size: 15px; flex: 1; margin-right: 8px; cursor: pointer; user-select: none;
}
.btn-disabled { opacity: .5; pointer-events: none; }
.action-row { display: flex; flex-direction: row; align-items: center; margin-top: 10px; }
.action-row .btn-primary { flex: 1.5; }

/* === HOME === */
.welcome-banner { background: linear-gradient(135deg,#FF6B35 0%,#FF8C5A 100%); border-radius: 12px; padding: 20px 18px; margin-bottom: 14px; }
.welcome-hi { display: block; font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 4px; }
.welcome-sub { display: block; font-size: 13px; color: rgba(255,255,255,.85); margin-bottom: 10px; }
.usage-bar { display: inline-flex; flex-direction: row; align-items: center; background: rgba(255,255,255,.2); border-radius: 50px; padding: 5px 10px; }
.usage-text { font-size: 12px; color: #fff; }
.usage-sep { font-size: 12px; color: rgba(255,255,255,.6); margin: 0 4px; }
.usage-empty { color: #FFD4C5; }
.feature-cards { margin-bottom: 14px; }
.feature-card { background: #fff; border-radius: 10px; padding: 14px 16px; margin-bottom: 12px; display: flex; flex-direction: row; align-items: center; box-shadow: 0 1px 8px rgba(0,0,0,.05); cursor: pointer; user-select: none; }
.feature-icon-wrap { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-right: 12px; flex-shrink: 0; }
.feature-icon-blue { background: rgba(245,118,42,.12); }
.feature-icon-orange { background: rgba(255,107,53,.12); }
.feature-icon { display: flex; align-items: center; justify-content: center; }
.feature-info { flex: 1; }
.feature-title { display: block; font-size: 15px; font-weight: 600; color: #1A1814; margin-bottom: 3px; }
.feature-desc { display: block; font-size: 12px; color: #A8A49C; line-height: 1.5; }
.feature-arrow { font-size: 22px; color: #CCCCCC; margin-left: 4px; }
.stats-row { display: flex; flex-direction: row; justify-content: space-around; background: #F5F4F1; border-radius: 10px; padding: 14px 8px; }
.stat-pill { display: flex; flex-direction: column; align-items: center; }
.stat-pill-num { font-size: 20px; font-weight: 700; color: #FF6B35; margin-bottom: 2px; }
.stat-pill-label { font-size: 11px; color: #A8A49C; }

/* === EXTRACT === */
.input-card { background: #fff; border-radius: 10px; padding: 16px; margin-bottom: 10px; }
.input-label { display: block; font-size: 12px; color: #A8A49C; margin-bottom: 8px; font-weight: 500; }
.url-textarea { background: #F7F6F2; border: 1px solid #E4E2DA; border-radius: 8px; padding: 12px 14px; font-size: 14px; color: #1A1814; width: 100%; min-height: 60px; margin-bottom: 12px; line-height: 1.6; resize: none; display: block; }
.url-textarea::placeholder { color: #C4C0B8; }
.err-text { display: block; color: #B83060; font-size: 12px; text-align: center; padding: 6px 0; }
.tip-card { background: rgba(245,118,42,.06); border-radius: 8px; padding: 14px 16px; }
.tip-title { display: block; font-size: 13px; font-weight: 600; color: #F5762A; margin-bottom: 8px; }
.tip-line { display: block; font-size: 12px; color: #9A6A40; margin-bottom: 5px; line-height: 1.6; }
.result-card { background: #fff; border-radius: 10px; padding: 14px; margin-bottom: 8px; }
.result-muted { opacity: .7; }
.result-highlight { border: 1px solid #FF6B35; }
.rewrite-source-compact { background: #FBFAF7; border: 1px solid #EEE9E2; border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; }
.rewrite-source-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.rewrite-source-title { font-size: 12px; color: #9E9890; font-weight: 600; }
.rewrite-source-toggle { flex-shrink: 0; font-size: 12px; color: #F5762A; background: #FFF3EA; border-radius: 999px; padding: 5px 10px; cursor: pointer; }
.rewrite-source-preview { margin-top: 8px; color: #8A857D; font-size: 13px; line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.rewrite-source-compact .editable-script-textarea { margin-top: 10px; min-height: 112px; max-height: 26vh; background: #FFFDF9; }
.result-header-row { display: flex; flex-direction: row; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.result-label { font-size: 14px; font-weight: 600; color: #1A1814; }
.result-label-sm { display: block; font-size: 11px; color: #A8A49C; margin-bottom: 6px; }
.copy-btn { background: rgba(245,118,42,.1); color: #F5762A; border-radius: 50px; padding: 4px 12px; font-size: 12px; cursor: pointer; user-select: none; flex-shrink: 0; }
.copy-btn-strong { background: #F5762A; color: #fff; }
.thin-divider { height: 1px; background: #ECEAE2; margin-bottom: 10px; }
.script-text { display: block; font-size: 14px; color: #1A1814; line-height: 1.8; white-space: pre-wrap; word-break: break-all; }
.script-text-sm { display: block; font-size: 12px; color: #A8A49C; line-height: 1.7; white-space: pre-wrap; word-break: break-all; }
.editable-script-textarea { width: 100%; min-height: 180px; max-height: 45vh; overflow-y: auto; -webkit-overflow-scrolling: touch; background: #F7F6F2; border: 1px solid #E4E2DA; border-radius: 10px; padding: 12px; font-size: 14px; color: #1A1814; line-height: 1.8; resize: vertical; transition: background .2s ease, color .2s ease; }
.editable-script-textarea:focus { border-color: #F97316; outline: none; }
.editable-script-textarea.editable-disabled { background: #EEEEEA; color: #A8A49C; cursor: not-allowed; }
.result-card.rewrite-generating { position: relative; overflow: hidden; }
.result-card.rewrite-generating::before,
.result-card.rewrite-generating::after {
  content: ''; position: absolute; left: -40%; width: 40%; height: 3px;
  background: linear-gradient(90deg, rgba(249,115,22,0), rgba(249,115,22,.65), rgba(249,115,22,0));
  animation: rewriteWave 1.15s linear infinite;
}
.result-card.rewrite-generating::before { top: 0; }
.result-card.rewrite-generating::after { bottom: 0; animation-delay: .35s; }
@keyframes rewriteWave {
  0% { left: -40%; }
  100% { left: 100%; }
}

/* === INSPIRE === */
.section-card { background: #fff; border-radius: 10px; padding: 14px; margin-bottom: 8px; }
.section-label { display: block; font-size: 13px; font-weight: 600; color: #1A1814; margin-bottom: 10px; }
.industry-grid { display: flex; flex-direction: row; flex-wrap: wrap; }
.industry-item { background: #F7F6F2; color: #1A1814; border: 1px solid #E4E2DA; border-radius: 50px; padding: 6px 14px; font-size: 13px; margin-right: 8px; margin-bottom: 8px; cursor: pointer; user-select: none; }
.industry-active { background: #F5762A; color: #fff; border-color: #F5762A; }
.field-input { background: #F7F6F2; border: 1px solid #E4E2DA; border-radius: 8px; height: 44px; padding: 0 14px; font-size: 14px; color: #1A1814; width: 100%; display: block; }
.field-input::placeholder { color: #C4C0B8; }
.inspire-action-row { display: flex; flex-direction: row; align-items: center; margin-bottom: 8px; }
.inspire-generate-btn { flex: 1; }
.stop-btn { background: #fff; color: #B83060; border: 1px solid #B83060; border-radius: 50px; height: 46px; line-height: 46px; text-align: center; font-size: 14px; padding: 0 18px; margin-left: 8px; flex-shrink: 0; cursor: pointer; user-select: none; }
.section-title-row { display: flex; flex-direction: row; align-items: center; justify-content: space-between; margin-bottom: 8px; margin-top: 4px; }
.section-title-text { font-size: 14px; font-weight: 600; color: #1A1814; }
.matched-tag { font-size: 11px; color: #F5762A; background: rgba(245,118,42,.1); border-radius: 50px; padding: 3px 9px; }
.inspire-card { background: #fff; border-radius: 10px; padding: 14px; margin-bottom: 8px; cursor: pointer; }
.inspire-seq { display: inline-block; background: #F5762A; color: #fff; border-radius: 50%; width: 20px; height: 20px; line-height: 20px; text-align: center; font-size: 11px; font-weight: 600; margin-bottom: 6px; }
.inspire-hook { display: block; font-size: 15px; font-weight: 600; color: #1A1814; line-height: 1.6; margin-bottom: 6px; }
.inspire-tags-row { display: flex; flex-direction: row; flex-wrap: wrap; margin-bottom: 4px; }
.tag { background: rgba(245,118,42,.1); color: #F5762A; border-radius: 50px; padding: 3px 9px; font-size: 11px; margin-right: 6px; margin-bottom: 4px; }
.inspire-expand { margin-top: 2px; }
.inspire-full { display: block; font-size: 13.5px; color: #3A3A3A; line-height: 1.8; white-space: pre-wrap; margin-bottom: 10px; word-break: break-all; }
.inspire-btns { display: flex; flex-direction: row; align-items: center; justify-content: flex-end; }
.expand-btn { background: #FF6B35; color: #fff; border-radius: 50px; padding: 5px 14px; font-size: 12px; margin-left: 8px; cursor: pointer; user-select: none; }
.toggle-hint { display: block; font-size: 11px; color: #A8A49C; text-align: right; margin-top: 6px; }
.history-header-row { display: flex; flex-direction: row; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.history-toggle { color: #A8A49C; font-size: 13px; padding: 8px 0; cursor: pointer; user-select: none; }
.clear-btn { color: #B83060; font-size: 12px; padding: 6px 10px; border: 1px solid #B83060; border-radius: 50px; cursor: pointer; user-select: none; }
.empty-tip { text-align: center; color: #C4C0B8; font-size: 13px; padding: 20px; }
.history-card { background: #fff; border-radius: 8px; padding: 12px 14px; margin-bottom: 6px; cursor: pointer; }
.history-header { display: flex; flex-direction: row; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.history-track { display: block; font-size: 14px; font-weight: 500; color: #1A1814; }
.history-time { display: block; font-size: 11px; color: #A8A49C; }
.history-count { font-size: 11px; color: #A8A49C; background: #F0EEE8; border-radius: 50px; padding: 2px 7px; }
.history-scripts { margin-top: 8px; border-top: 1px solid #F0EEE8; padding-top: 8px; }
.history-script-item { display: flex; flex-direction: row; align-items: flex-start; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #F7F6F2; }
.history-script-hook { flex: 1; font-size: 13px; color: #1A1814; line-height: 1.5; margin-right: 8px; }
.history-script-col { flex: 1; min-width: 0; margin-right: 8px; display: flex; flex-direction: column; align-items: stretch; }
.history-script-col .history-script-hook { flex: none; }
.history-script-content { display: block; font-size: 13px; color: #555; line-height: 1.75; white-space: pre-wrap; word-break: break-word; margin-top: 8px; padding-top: 8px; border-top: 1px dashed #ECEAE2; }

/* === PROFILE === */
.profile-hero { background: linear-gradient(135deg,#F5762A 0%,#FF9B5E 100%); border-radius: 12px; padding: 18px 16px 16px; margin-bottom: 12px; display: flex; flex-direction: column; align-items: stretch; }
.profile-hero-top { display: flex; flex-direction: row; align-items: center; width: 100%; margin-bottom: 14px; }
.profile-hero-mid { flex: 1; min-width: 0; display: flex; flex-direction: column; align-items: flex-start; justify-content: center; padding: 0 10px 0 12px; }
.profile-phone-inline { display: block; font-size: 12px; color: rgba(255,255,255,.72); margin-top: 4px; }
.avatar-lg { width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 0; position: relative; overflow: hidden; flex-shrink: 0; background: rgba(255,255,255,.18); box-shadow: inset 0 0 0 1px rgba(255,255,255,.22); }
.avatar-type-0 { background: linear-gradient(135deg,#8B5CF6,#5B21B6); }
.avatar-type-1 { background: linear-gradient(135deg,#F97316,#FB923C); }
.avatar-type-2 { background: linear-gradient(135deg,#3B82F6,#1D4ED8); }
.avatar-type-3 { background: linear-gradient(135deg,#10B981,#047857); }
.avatar-type-4 { background: linear-gradient(135deg,#EC4899,#BE185D); }
.avatar-type-5 { background: linear-gradient(135deg,#06B6D4,#0E7490); }
.avatar-type-6 { background: linear-gradient(135deg,#F59E0B,#B45309); }
.avatar-type-7 { background: linear-gradient(135deg,#64748B,#334155); }
.avatar-lg-text { font-size: 28px; line-height: 1; }
.avatar-lg-img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; display: block; }
.profile-name { display: block; font-size: 17px; font-weight: 700; color: #fff; margin-bottom: 0; user-select: none; line-height: 1.25; word-break: break-all; }
.profile-edit-entry { flex-shrink: 0; align-self: center; font-size: 13px; font-weight: 600; color: #D4561A; padding: 8px 12px; border-radius: 50px; background: #fff; cursor: pointer; user-select: none; white-space: nowrap; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
.nickname-edit-wrap { display: flex; flex-direction: row; align-items: center; margin-bottom: 12px; gap: 6px; }
.nickname-edit-input { flex: 1; background: rgba(255,255,255,.25); border: 1px solid rgba(255,255,255,.5); border-radius: 8px; height: 36px; padding: 0 10px; font-size: 14px; color: #fff; }
.nickname-edit-input::placeholder { color: rgba(255,255,255,.6); }
.nickname-edit-save { background: #fff; color: #F5762A; border-radius: 8px; height: 36px; line-height: 36px; padding: 0 14px; font-size: 13px; font-weight: 600; cursor: pointer; user-select: none; flex-shrink: 0; }
.nickname-edit-cancel { background: rgba(255,255,255,.2); color: #fff; border-radius: 8px; height: 36px; line-height: 36px; padding: 0 12px; font-size: 13px; cursor: pointer; user-select: none; flex-shrink: 0; }
.usage-stats { display: flex; flex-direction: row; align-items: center; background: rgba(255,255,255,.15); border-radius: 10px; padding: 10px 16px; width: 100%; justify-content: space-around; }
.stat-item { display: flex; flex-direction: column; align-items: center; }
.stat-num { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 3px; }
.stat-label { font-size: 11px; color: rgba(255,255,255,.75); }
.stat-empty { color: #FFD4C5; }
.stat-divider { width: 1px; height: 30px; background: rgba(255,255,255,.3); }
.avatar-picker { background: #fff; border-radius: 10px; padding: 14px; margin-bottom: 8px; }
.avatar-options { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 10px; }
.avatar-option { display: flex; flex-direction: column; align-items: center; padding: 6px; border-radius: 12px; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; }
.avatar-option-active { background: transparent; }
.avatar-opt-circle { width: 58px; height: 58px; border-radius: 16px; display: flex; align-items: center; justify-content: center; overflow: hidden; box-shadow: 0 3px 10px rgba(26,22,20,.08); }
.preset-avatar-svg { width: 100%; height: 100%; display: block; overflow: hidden; }
.avatar-lg .preset-avatar-svg { width: 100%; height: 100%; border-radius: 50%; }
.avatar-opt-circle .preset-avatar-svg { width: 100%; height: 100%; border-radius: 14px; }
.preset-avatar { width: 100%; height: 100%; border-radius: 50%; position: relative; overflow: hidden; background: linear-gradient(135deg,#F97316,#FB923C); }
.preset-avatar::before { content: ""; position: absolute; left: 10%; top: 8%; width: 80%; height: 48%; border-radius: 50% 50% 42% 42%; background: rgba(26,22,20,.92); z-index: 1; }
.pa-head { position: absolute; left: 30%; top: 23%; width: 40%; height: 36%; border-radius: 50%; background: #FFE1C7; z-index: 2; box-shadow: inset -3px -3px 0 rgba(214,86,26,.08); }
.pa-body { position: absolute; left: 20%; bottom: 0; width: 60%; height: 34%; border-radius: 42% 42% 0 0; background: rgba(255,255,255,.92); z-index: 2; }
.pa-neck { position: absolute; left: 42%; top: 52%; width: 16%; height: 16%; border-radius: 8px; background: #FFD2B2; z-index: 1; }
.pa-detail { position: absolute; z-index: 3; }
.preset-avatar-0 { background: linear-gradient(135deg,#8B5CF6,#5B21B6); }
.preset-avatar-0 .pa-body { background: #F6F0FF; }
.preset-avatar-1 { background: linear-gradient(135deg,#F97316,#FDBA74); }
.preset-avatar-1::before { left: 18%; top: 9%; width: 64%; height: 38%; border-radius: 54% 54% 40% 40%; background: #7C2D12; }
.preset-avatar-1 .pa-body { background: #FFF7ED; }
.preset-avatar-2 { background: linear-gradient(135deg,#3B82F6,#1D4ED8); }
.preset-avatar-2::before { top: 13%; height: 28%; border-radius: 50% 50% 20% 20%; background: #1E3A8A; }
.preset-avatar-2 .pa-body { background: #DBEAFE; }
.preset-avatar-3 { background: linear-gradient(135deg,#10B981,#047857); }
.preset-avatar-3::before { left: 16%; top: 5%; width: 68%; height: 42%; border-radius: 48% 48% 35% 35%; background: #064E3B; }
.preset-avatar-3 .pa-body { background: #D1FAE5; }
.preset-avatar-4 { background: linear-gradient(135deg,#EC4899,#BE185D); }
.preset-avatar-4::before { left: 7%; top: 9%; width: 86%; height: 54%; border-radius: 52% 52% 45% 45%; background: #831843; }
.preset-avatar-4 .pa-body { background: #FCE7F3; }
.preset-avatar-5 { background: linear-gradient(135deg,#06B6D4,#0E7490); }
.preset-avatar-5::before { left: 20%; top: 8%; width: 60%; height: 34%; border-radius: 16px 16px 12px 12px; background: #164E63; }
.preset-avatar-5 .pa-body { background: #CFFAFE; }
.preset-avatar-5 .pa-detail { left: 28%; top: 38%; width: 44%; height: 11%; border-top: 2px solid rgba(14,116,144,.9); border-radius: 50%; }
.preset-avatar-6 { background: linear-gradient(135deg,#F59E0B,#B45309); }
.preset-avatar-6::before { left: 12%; top: 10%; width: 76%; height: 34%; border-radius: 50% 50% 18% 18%; background: #78350F; }
.preset-avatar-6 .pa-body { background: #FEF3C7; }
.preset-avatar-6 .pa-detail { left: 28%; top: 35%; width: 44%; height: 14%; border: 2px solid rgba(120,53,15,.75); border-left: none; border-right: none; border-radius: 999px; }
.preset-avatar-7 { background: linear-gradient(135deg,#64748B,#334155); }
.preset-avatar-7::before { left: 15%; top: 8%; width: 70%; height: 40%; border-radius: 46% 46% 28% 28%; background: #111827; }
.preset-avatar-7 .pa-head { background: #F3D2B8; }
.preset-avatar-7 .pa-body { background: #E2E8F0; }
.profile-section { background: #fff; border-radius: 10px; padding: 14px; margin-bottom: 8px; }
.profile-section-title { display: block; font-size: 12px; color: #A8A49C; font-weight: 500; margin-bottom: 10px; }
.profile-row { display: flex; flex-direction: row; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #F0EEE8; }
.profile-row:last-child { border-bottom: none; }
.profile-key { font-size: 14px; color: #1A1814; }
.profile-val { font-size: 14px; color: #A8A49C; }
.val-green { color: #2D7A3A; font-weight: 500; }
.code-row { display: flex; flex-direction: row; align-items: center; }
.code-input { flex: 1; background: #F7F6F2; border: 1px solid #E4E2DA; border-radius: 6px 0 0 6px; padding: 0 12px; font-size: 14px; color: #1A1814; height: 44px; }
.code-input::placeholder { color: #C4C0B8; }
.code-submit { background: #FFD8C4; color: #9A3412; border-radius: 0 6px 6px 0; padding: 0 16px; height: 44px; line-height: 44px; font-size: 14px; font-weight: 600; cursor: pointer; user-select: none; flex-shrink: 0; }
.code-msg { display: block; font-size: 12px; margin-top: 6px; }
.code-ok { color: #2D7A3A; }
.code-err { color: #B83060; }

  const token = getToken();

  if (data) opts.body = JSON.stringify(data);
  if (signal) opts.signal = signal;

  const raw = await res.text();

    return { code: res.status || 500, msg: res.status >= 500 ? '服务器无响应内容，请稍后重试' : '请求失败' };
  }
  try {
    const j = JSON.parse(raw);
    if (j && typeof j.msg === 'string' && j.msg.length > 200) j.msg = j.msg.slice(0, 200) + '…';
    return j;
  } catch {
    return { code: res.status || 500, msg: `服务器返回非 JSON（${res.status}），请检查网关或部署日志` };
  }
}

function friendlyError(msg) {
  if (!msg) return '任务处理失败，请稍后重试';
  if (msg.includes('524') || msg.includes('timeout occurred') || /timed?\s*out/i.test(msg))
    return 'AI 服务响应超时，可能当前请求量较大，请稍后重试';
  if (msg.includes('<!DOCTYPE') || msg.includes('<html') || msg.includes('Cloudflare') || msg.includes('cloudflare'))
    return 'AI 服务暂时不可用，请稍后重试';
  if (/未配置|未启动|not configured/i.test(msg) && /asr|语音/i.test(msg))
    return '语音识别服务未配置，请联系管理员在后台填写 ASR 服务地址';
  // 中转站不支持 whisper-1
  if (/model_not_found|No available channel.*whisper/i.test(msg))
    return '语音转写失败：当前 AI 中转站不支持 whisper-1 模型，请在后台配置本地 ASR 服务地址';
  // 本地ASR返回错误，附上状态码
  if (/本地ASR返回错误/i.test(msg)) return msg;

    return '语音识别服务连接失败，请检查 ASR 服务是否正常运行';

    return '服务配置不完整，请联系管理员';

function formatDisplayTime(iso) {
  if (iso == null || iso === '') return '';
  const d = new Date(iso);
  if (Number.isNaN(d.getTime())) return String(iso).replace('T', ' ').slice(0, 16);
  const p = (n) => (n < 10 ? '0' : '') + n;
  return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;

  const s = String(phone || '');
  if (s.length < 7) return s;
  return s.slice(0, 3) + '****' + s.slice(-4);
}

// ===== RENDER ENGINE =====
let _lastRenderedViewKey = '';

function getViewKey() {
  const historyKey = S.currentTab === 'history'
    ? `${S.historyTab || ''}:${S.tasksView || ''}:${S.viewingTask?.id || ''}`
    : '';
  const profileKey = S.currentTab === 'profile' ? (S.profileView || '') : '';
  const extractKey = S.currentTab === 'extract'
    ? `${S.extractStep || ''}:${S.cloneTaskId || S.taskId || ''}`
    : '';
  const inspireKey = S.currentTab === 'inspire'
    ? `${S.inspireMode || ''}:${S.pathAState || ''}:${S.featuredPage || ''}`
    : '';
  const modalKey = S.showAvatarMgmt ? 'avatar-mgmt' : '';
  return [S.currentTab, historyKey, profileKey, extractKey, inspireKey, modalKey].join('|');
}

function setState(updates) {
  const focusId = document.activeElement && document.activeElement.id;
  const focusSel = [document.activeElement && document.activeElement.selectionStart,
                    document.activeElement && document.activeElement.selectionEnd];
  Object.assign(S, updates);
  render();
  if (focusId) {
    const el = document.getElementById(focusId);
    if (el) { el.focus(); try { el.setSelectionRange(focusSel[0], focusSel[1]); } catch { try { el.setSelectionRange(el.value.length, el.value.length); } catch {} } }
  }
}
function render() {
  const oldScroller = document.querySelector('.page-content');
  const oldScrollTop = oldScroller ? oldScroller.scrollTop : 0;
  const oldViewKey = _lastRenderedViewKey;
  const newViewKey = getViewKey();
  document.getElementById('app').innerHTML = tMain();
  _lastRenderedViewKey = newViewKey;
  if (oldViewKey && oldViewKey === newViewKey) {
    const newScroller = document.querySelector('.page-content');
    if (newScroller) {
      const maxTop = Math.max(0, newScroller.scrollHeight - newScroller.clientHeight);
      newScroller.scrollTop = Math.min(oldScrollTop, maxTop);
    }
  }
}

function openAuthSheet() { setState({ showAuthSheet: true, authErr: '' }); }
function closeAuthSheet() { setState({ showAuthSheet: false, authErr: '', loading: false }); }

/** 需要登录的操作入口：未登录则弹出底部登录层 */
function ensureLoggedIn() {
  if (getToken()) return true;
  openAuthSheet();
  return false;
}

function apiUnauthorized(r) {
  if (r && r.code === 401) {
    const had = !!getToken();
    clearAuth();
    setState({ userInfo: null, userName: '创作者', userPhone: '', userAvatar: 0, recentHistory: [], recentHistoryLoaded: false, inspireHistory: [], historyLoaded: false, homeDoneSeenIds: [], dismissedFromHomeIds: [] });
    if (had) { openAuthSheet(); showToast('登录已过期，请重新登录'); }
    return true;
  }
  return false;
}

function tHomeTaskSection() {
  if (!S.tasksLoaded && !S.cloneHistoryLoaded) return '';
  const taskKind = t => {
    if (!t) return '克隆';
    if (t.task_kind === 'industry' || t.type === 'industry_gen') return '行业';
    if (t.type === 'profile_analyze' || t.type === 'single_video_analyze') return '对标';
    return '克隆';
  };
  const taskKindCls = t => ({ '克隆':'home-task-mini-action-clone', '对标':'home-task-mini-action-benchmark', '行业':'home-task-mini-action-industry' }[taskKind(t)] || '');
  const DONE_BIG_WINDOW = 1 * 60 * 60 * 1000;
  const taskTime = t => {
    const raw = t && (t.activity_at || t.updated_at || t.created_at);
    const n = raw ? new Date(raw).getTime() : 0;
    return Number.isNaN(n) ? 0 : n;
  };
  const sortedTasks = [...(S.tasksList || [])].sort((a, b) => taskTime(b) - taskTime(a));
  const bigCards = sortedTasks
    .filter(t => Date.now() - taskTime(t) < DONE_BIG_WINDOW)
    .slice(0, 3);
  const bigIds = new Set(bigCards.map(t => String(t.id)));
  const oldDoneTasks = sortedTasks
    .filter(t => !bigIds.has(String(t.id)))
    .map(t => ({ _type: 'task', _task: t, label: taskKind(t), text: t.title, created_at: t.activity_at || t.updated_at || t.created_at }));
  const cloneItems = (S.cloneHistory || [])
    .map((it, idx) => ({ _type: 'clone', idx, label: '克隆', text: it.input || '', created_at: it.created_at }));
  const smallItems = [...oldDoneTasks, ...cloneItems]
    .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
    .slice(0, 5);

  if (!bigCards.length && !smallItems.length) {
    return `<div style="margin-bottom:14px">
      <div class="home-section-header">
        <span class="home-section-title">我的任务</span>
        <span class="home-section-more" onclick="openHistoryPage()">查看全部 ›</span>
      </div>
      <div class="recent-empty-line">还没有创作记录，快去试试吧</div>
    </div>`;
  }

  // Helper: 6-step bar for clone tasks
  function cloneStepBar(currentStep) {
    const labels = ['提取','改写','语音','数字人','后期','发布'];
    let html = '<div class="htc-step-bar">';
    for (let i = 0; i < 6; i++) {
      const n = i + 1;
      const isDone = n < currentStep;
      const isActive = n === currentStep;
      const cls = isDone ? 'htc-step-done' : isActive ? 'htc-step-active' : 'htc-step-inactive';
      const lblCls = isActive ? 'htc-step-lbl htc-step-lbl-active' : 'htc-step-lbl';
      const icon = isDone
        ? `<svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`
        : `${n}`;
      html += `<div class="htc-step"><div class="htc-step-circle ${cls}">${icon}</div><span class="${lblCls}">${labels[i]}</span></div>`;
      if (i < 5) {
        const lineCls = isDone ? 'htc-step-line htc-step-line-done' : 'htc-step-line htc-step-line-inactive';
        html += `<div class="${lineCls}"></div>`;
      }
    }
    html += '</div>';
    return html;
  }

  // Clone task icon SVG
  const iconClone = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6B6FE0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>`;
  const iconInspire = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#F5762A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;
  const iconDone = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0D9B5C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
  const iconFailed = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#DC2626" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`;
  const iconRun = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#F5762A" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;

  const clampPct = n => Math.max(0, Math.min(100, Math.round(n || 0)));
  const cloneStepOf = t => Math.max(1, Math.min(6, parseInt(t.clone_step) || (t.status === 'done' ? 3 : 1)));
  const clonePhaseOf = t => {
    const stage = t.stage || '';
    const savedStep = cloneStepOf(t);
    if (t.status === 'failed') return { step: savedStep, phase: 'failed' };
    if (t.status === 'pending') {
      if (stage === 'rewrite' || stage === 'extracted') return { step: 2, phase: 'rewrite_pending' };
      return { step: 1, phase: 'pending' };
    }
    if (t.status === 'running') {
      if (stage === 'rewrite') return { step: 2, phase: 'rewriting' };
      return { step: 1, phase: 'extracting' };
    }
    if (t.status === 'extracted') return savedStep > 1 ? { step: savedStep, phase: 'step_done' } : { step: 1, phase: 'extracted' };
    const step = savedStep;
    return { step, phase: step >= 6 ? 'published' : 'step_done' };
  };
  const cloneDoneLabels = ['提取中','提取完毕','改写完毕','语音完毕','数字人完毕','后期完毕'];
  const cloneNextActions = ['查看进度 ›','去改写 ›','去语音 ›','去数字人 ›','去后期 ›','去发布 ›'];
  const cloneStatusText = t => {
    const info = clonePhaseOf(t);
    if (info.phase === 'failed') return '失败';
    if (info.phase === 'pending') return '排队中';
    if (info.phase === 'rewrite_pending') return '等待改写';
    if (info.phase === 'extracting') return '提取中';
    if (info.phase === 'rewriting') return '改写中';
    if (info.phase === 'extracted') return '提取完毕';
    return cloneDoneLabels[info.step - 1] || '已完成';
  };
  const cloneHintText = t => {
    const info = clonePhaseOf(t);
    if (info.phase === 'failed') return friendlyError(t.error_msg);
    if (info.phase === 'pending') return '等待开始提取视频文案';
    if (info.phase === 'rewrite_pending') return '改写任务排队中，请稍候';
    if (info.phase === 'extracting') return t.thinking || '正在提取视频文案，请稍候';
    if (info.phase === 'rewriting') return t.thinking || '正在AI改写文案，请稍候';
    if (info.phase === 'extracted') return '提取完毕，去改写';
    const hints = [
      '正在提取视频文案，请稍候',
      '提取完毕，去改写',
      '改写完毕，去语音',
      '语音已完成，去数字人',
      '数字人视频已生成，去后期',
      '后期制作完成，去发布'
    ];
    return hints[info.step - 1] || '可继续完成当前步骤';
  };
  const statusText = t => {
    if (t.type === 'clone_video') return cloneStatusText(t);
    return ({ pending:'排队中', running:'进行中', extracted:'改写', done:'已完成', failed:'失败' }[t.status] || t.status);
  };
  const bigProgress = t => {
    if (t.status === 'failed') return Math.max(0, Math.min(100, t.progress || 0));
    if (t.type === 'clone_video') {
      const info = clonePhaseOf(t);
      if (info.phase === 'pending') return 0;
      if (info.phase === 'extracting') return clampPct(Math.min(16, Math.max(5, (t.progress || 10) * 0.45)));
      if (info.phase === 'extracted') return 17;
      if (info.phase === 'rewrite_pending') return 18;
      if (info.phase === 'rewriting') return 25;
      return clampPct(info.step / 6 * 100);
    }
    if (t.status === 'done') return 100;
    return Math.max(0, Math.min(100, t.progress || (t.status === 'extracted' ? 45 : 0)));
  };
  const cloneBadgeCls = t => {
    const info = clonePhaseOf(t);
    if (info.phase === 'failed') return 'htc-badge-failed';
    if (info.phase === 'pending') return 'htc-badge-pending';
    if (info.phase === 'extracting' || info.phase === 'rewrite_pending' || info.phase === 'rewriting' || info.phase === 'extracted') return 'htc-badge-extracted';
    return 'htc-badge-done';
  };
  const openTaskAction = t => t.type === 'clone_video' ? `openExtractWithTask('${t.id}')` : `openTaskFromHome('${t.id}')`;
  const bigActionText = t => {
    if (t.type === 'clone_video') {
      const info = clonePhaseOf(t);
      if (info.phase === 'failed') return '查看详情 ›';
      if (info.phase === 'pending' || info.phase === 'extracting') return '查看进度 ›';
      if (info.phase === 'rewrite_pending' || info.phase === 'rewriting') return '改写中 ›';
      if (info.phase === 'extracted') return '去改写 ›';
      return cloneNextActions[info.step - 1] || '继续 ›';
    }
    if (t.status === 'extracted') return '改写 ›';
    if (t.status === 'done') return '查看结果 ›';
    if (t.status === 'failed') return '查看详情 ›';
    return '查看详情 ›';
  };
  const miniAction = t => {
    return { text: taskKind(t), cls: taskKindCls(t) };
  };
  const miniIcon = t => {
    if (t.status === 'failed') return { icon: iconFailed, cls: 'htc-icon-failed' };
    if (t.status === 'done') return { icon: iconDone, cls: 'htc-icon-done' };
    if (t.status === 'pending' || t.status === 'running') return { icon: iconRun, cls: 'htc-icon-inspire' };
    return t.type === 'clone_video' ? { icon: iconClone, cls: 'htc-icon-clone' } : { icon: iconInspire, cls: 'htc-icon-inspire' };
  };

  const hasLive = bigCards.some(t => t.status === 'running' || t.status === 'pending');

  return `<div style="margin-bottom:14px">
    <div class="home-section-header">
      <span class="home-section-title">${hasLive ? `<span class="task-live-dot"></span>` : ''}我的任务</span>
      <span class="home-section-more" onclick="openHistoryPage()">查看全部 ›</span>
    </div>
    ${bigCards.map(t => {
      const isClone = t.type === 'clone_video';
      const cloneStep = isClone ? clonePhaseOf(t).step : cloneStepOf(t);
      const pct = bigProgress(t);
      const thinking = isClone
        ? cloneHintText(t)
        : (t.status === 'failed'
          ? friendlyError(t.error_msg)
          : (t.thinking || (t.status === 'pending' ? '等待处理...' : t.status === 'done' ? '最近生成完成' : t.status === 'extracted' ? '文案已提取，可继续改写' : '处理中...')));
      const liveDot = (t.status === 'running' || t.status === 'pending') ? '<span class="htc-live-dot"></span>' : '';
      const badgeCls = isClone ? cloneBadgeCls(t) : (t.status === 'failed' ? 'htc-badge-failed' : t.status === 'done' ? 'htc-badge-done' : t.status === 'extracted' ? 'htc-badge-extracted' : t.status === 'pending' ? 'htc-badge-pending' : 'htc-badge-running');
      return `<div class="home-task-card" style="cursor:pointer" onclick="${openTaskAction(t)}">
        <div class="htc-top-row">
          <div class="htc-title">${esc(t.title)}</div>
          <div class="htc-status-running">${liveDot}<span class="htc-badge ${badgeCls}">${statusText(t)}</span></div>
        </div>
        <div class="htc-progress-row">
          <div class="htc-progress-wrap" style="flex:1"><div class="htc-progress-fill" style="width:${pct}%"></div></div>
          <span class="htc-progress-pct">${pct}%</span>
        </div>
        ${isClone ? cloneStepBar(cloneStep) : ''}
        <div class="htc-footer-row">
          <span class="htc-thinking">${esc(thinking)}</span>
          <span class="htc-detail-link" onclick="event.stopPropagation();${openTaskAction(t)}">${bigActionText(t)}</span>
        </div>
      </div>`;
    }).join('')}
    ${smallItems.length > 0 ? `<div class="home-task-small-scroll">
      ${smallItems.map(it => {
        if (it._type === 'task') {
          const t = it._task;
          if (!t) return '';
          const mi = miniIcon(t);
          const act = miniAction(t);
          const clickFn = t.status === 'failed' ? `switchTab('inspire')` : openTaskAction(t);
          const meta = formatDisplayTime(t.activity_at || t.updated_at || t.created_at);
          return `<div class="home-task-mini-card" onclick="${clickFn}">
            <div class="home-task-mini-icon">
              <div class="htc-icon-wrap ${mi.cls}" style="width:34px;height:34px;border-radius:10px">${mi.icon}</div>
            </div>
            <div class="home-task-mini-body">
              <div class="home-task-mini-title">${esc(t.title)}</div>
              <div class="home-task-mini-meta">${esc(meta)}</div>
            </div>
            <span class="home-task-mini-action ${act.cls}">${act.text}</span>
          </div>`;
        }
        if (it._type === 'clone') {
          return `<div class="home-task-mini-card" onclick="openHistoryPage('clone')">
            <div class="home-task-mini-icon">
              <div class="htc-icon-wrap htc-icon-clone" style="width:34px;height:34px;border-radius:10px">${iconClone}</div>
            </div>
            <div class="home-task-mini-body">
              <div class="home-task-mini-title">${esc(it.text)}</div>
              <div class="home-task-mini-meta">克隆 · ${esc(formatDisplayTime(it.created_at))}</div>
            </div>
            <span class="home-task-mini-action home-task-mini-action-clone">克隆</span>
          </div>`;
        }
        return '';
      }).join('')}
    </div>` : ''}
  </div>`;
}

async function openTaskFromHome(taskId) {
  dismissHomeDoneSeen();
  setState({ currentTab: 'history', historyTab: 'inspire', tasksView: 'detail', viewingTask: null, tasksDetailFromHome: true });
  loadTasks();
  try {
    const r = await api.get(`/tasks/${taskId}`);
    if (r.code === 200) setState({ viewingTask: r.data });
    else setState({ tasksView: 'list' });
  } catch { setState({ tasksView: 'list' }); }
}

// ===== 克隆流程步骤条 =====
function cloneCurrentStep() {
  const s = S.extractStep;
  if (s === 0 || s === 'cloning' || s === 'review') return 1;
  if (s === 'rewriting' || s === 2) return 2;
  if ((s === 3 || s === 'tts_gen') && !(S.rewrittenScript || '').trim()) return 2;
  if ((s === 4 || s === 'avatar_gen') && !S.ttsAudioUrl) return 3;
  if (s === 5 && !S.avatarVideoUrl) return 4;
  if (s === 6 && !S.postProcessedVideoUrl && !S.avatarVideoUrl) return 5;
  if (s === 3 || s === 'tts_gen') return 3;
  if (s === 4 || s === 'avatar_gen') return 4;
  if (s === 5) return 5;
  if (s === 6) return 6;
  return 1;
}

function tCloneStepBar() {
  const cur = cloneCurrentStep();
  if (cur === 0) return '';
  const steps = ['提取','改写','语音','数字人','后期','发布'];
  const CHECK = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>`;
  let parts = [];
  steps.forEach((label, i) => {
    const n = i + 1;
    const done = n < cur, active = n === cur;
    const nc = done ? 'csb-node csb-node-done' : (active ? 'csb-node csb-node-active' : 'csb-node csb-node-idle');
    const lc = done ? 'csb-lbl csb-lbl-done' : (active ? 'csb-lbl csb-lbl-active' : 'csb-lbl csb-lbl-idle');
    const inner = done ? CHECK : n;
    parts.push(`<div class="csb-step"><div class="${nc}">${inner}</div><div class="${lc}">${label}</div></div>`);
    if (n < 6) parts.push(`<div class="csb-line ${done ? 'csb-line-done' : 'csb-line-idle'}"></div>`);
  });
  return `<div class="clone-step-bar"><div class="clone-step-bar-inner">${parts.join('')}</div></div>`;
}

function tCloneActions(primary, secondary = []) {
  const primaryCls = ['clone-action-main'];
  if (primary.disabled) primaryCls.push('btn-disabled');
  const main = `<div ${primary.id ? `id="${primary.id}" ` : ''}class="${primaryCls.join(' ')}" onclick="${primary.disabled ? '' : primary.onclick}">${primary.text}</div>`;
  const secs = secondary.filter(Boolean).map(btn => {
    const cls = ['clone-action-secondary'];
    if (btn.disabled) cls.push('btn-disabled');
    return `<div ${btn.id ? `id="${btn.id}" ` : ''}class="${cls.join(' ')}" onclick="${btn.disabled ? '' : btn.onclick}">${btn.text}</div>`;
  }).join('');
  const rowCls = secondary.filter(Boolean).length === 1 ? 'clone-action-secondary-row clone-action-secondary-row-single' : 'clone-action-secondary-row';
  return `<div class="clone-action-stack">${main}${secs ? `<div class="${rowCls}">${secs}</div>` : ''}</div>`;
}

function tExtract() {
  const sb = tCloneStepBar();

  // 路由到步骤3-6

  if (S.extractStep === 4 || S.extractStep === 'avatar_gen') return tCloneStep4(sb);
  if (S.extractStep === 5) return tCloneStep5(sb);
  if (S.extractStep === 6) return tCloneStep6(sb);

  // 正在提取文案（进度条）

  // AI 改写进行中

    const task = S.cloneTaskData;
    const progress = task?.progress || 60;
    const thinking = task?.thinking || '正在AI改写文案...';
    return `${sb}<div class="tab-page">
      <div class="input-card" style="text-align:center;padding:32px 20px">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#FF6B35" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:14px"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        <div style="font-size:15px;font-weight:600;color:#1A1814;margin-bottom:6px">AI 改写中</div>
        <div style="font-size:12px;color:#A8A49C;margin-bottom:16px">通常只需 20~30 秒</div>
        <div class="path-a-progress-bar" style="margin-bottom:10px"><div class="path-a-progress-fill" style="width:${progress}%"></div></div>
        <div style="font-size:13px;color:#6B6860;min-height:20px">${esc(thinking)}</div>
      </div>
    </div>`;
  }

  // 改写完成，展示结果 — 步骤2
  if (S.extractStep === 2) {
    const hasRewrite = !!(S.rewrittenScript || '').trim();
    const hasSource = !!(S.extractedScript || '').trim();
    const sourceExpanded = !!S.rewriteSourceExpanded;
    return `${sb}<div class="tab-page">
      <div class="rewrite-source-compact">
        <div class="rewrite-source-head">
          <span class="rewrite-source-title">原文参考</span>
          <span class="rewrite-source-toggle" onclick="setState({rewriteSourceExpanded:${sourceExpanded ? 'false' : 'true'}});render()">${sourceExpanded ? '收起' : '查看/修改'}</span>
        </div>
        ${sourceExpanded ? `
          <textarea class="editable-script-textarea" id="f-extracted-script-v2" oninput="S.extractedScript=this.value;syncRewriteActions()">${esc(S.extractedScript)}</textarea>
          <div class="result-action-bottom">
            <div class="copy-btn" onclick="copyExtracted()">${S.copiedId==='extracted'?'✓ 已复制':'复制原文'}</div>
          </div>
        ` : `<div class="rewrite-source-preview">${esc(S.extractedScript || '暂无原文')}</div>`}
      </div>
      <div class="result-card result-highlight">
        <div class="result-header-row"><span class="result-label">AI改写结果（可编辑）</span></div>
        <div class="thin-divider"></div>
        <textarea class="editable-script-textarea" id="f-rewritten-script" oninput="S.rewrittenScript=this.value;syncRewriteActions()">${esc(S.rewrittenScript)}</textarea>
        <div class="result-action-bottom">
          <div class="copy-btn copy-btn-strong ${!hasRewrite?'btn-disabled':''}" id="copy-rewritten-btn" onclick="copyRewritten()">${S.copiedId==='rewritten'?'✓ 已复制':'复制改写文案'}</div>
        </div>
      </div>
      ${S.extractErr?`<span class="err-text">${esc(S.extractErr)}</span>`:''}
      ${tCloneActions(
        { id: 'clone-step3-btn', text: '下一步：语音合成 →', onclick: 'goToCloneStep3()', disabled: !hasRewrite },
        [{ id: 'clone-rerewrite-btn', text: '重新改写', onclick: 'handleCloneRewrite()', disabled: !hasSource }]
      )}
    </div>`;
  }

  // 默认：输入链接
  return `${sb}<div class="tab-page">
    <div class="platform-tabs">
      <div class="platform-tab platform-tab-active">抖音</div>
      <div class="platform-tab platform-tab-disabled">快手<span class="coming-soon-badge">即将上线</span></div>
      <div class="platform-tab platform-tab-disabled">小红书<span class="coming-soon-badge">即将上线</span></div>
    </div>
    <div class="input-card">
      <span class="input-label">粘贴抖音视频链接或分享文字</span>
      <div class="url-input-wrap">
        <textarea class="url-textarea-v2" id="f-url" placeholder="例如：https://v.douyin.com/xxx 或直接粘贴分享文字..."
          oninput="S.videoUrl=this.value;render()">${esc(S.videoUrl)}</textarea>
        <div class="paste-btn" onclick="pasteFromClipboard()">粘贴</div>
      </div>
      ${S.extractErr?`<span class="err-text">${esc(S.extractErr)}</span>`:''}
      ${S.extractRawErr?`<div style="font-size:10px;color:#B4B2A9;margin-top:4px;word-break:break-all">原始错误：${esc(S.extractRawErr)}</div>`:''}
      ${S.extractLoading
        ? `<div class="btn-primary btn-disabled">⏳ 提交中...</div>`
        : `<div class="btn-primary ${!S.videoUrl.trim()?'btn-disabled':''}" onclick="handleExtract()">开始克隆</div>`}
    </div>
    <div class="tip-card-v2">
      <span class="tip-line">1. 在抖音找到想参考的视频，点击分享复制链接</span>
      <span class="tip-line">2. 粘贴到上方，点击开始克隆</span>
      <span class="tip-line">3. 语音提取完成后可以查看并一键AI改写</span>
    </div>
  </div>`;
}

// ===== 步骤3：语音合成 =====
function tCloneStep3(sb) {
  if (!(S.rewrittenScript || '').trim()) {
    return `${sb}<div class="tab-page">
      <div class="input-card" style="text-align:center;padding:26px 18px;margin-top:4px">
        <div style="font-size:15px;font-weight:700;color:#1A1814;margin-bottom:8px">请先完成文案改写</div>
        <div style="font-size:12px;color:#A8A49C;line-height:1.7;margin-bottom:16px">语音合成必须使用改写后的文案，避免直接拿提取原文进入后续流程。</div>
        <div class="btn-primary" onclick="setState({extractStep:2})">回到改写步骤</div>
      </div>
    </div>`;
  }
  // 合成中状态
  if (S.extractStep === 'tts_gen') {
    return `${sb}<div class="tab-page">
      <div class="input-card" style="text-align:center;padding:32px 20px;margin-top:4px">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#FF6B35" stroke-width="1.5" style="margin-bottom:12px"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        <div style="font-size:15px;font-weight:600;color:#1A1814;margin-bottom:6px">正在合成语音</div>
        <div style="font-size:12px;color:#A8A49C;margin-bottom:16px">通常需要 10~20 秒</div>
        <div class="path-a-progress-bar"><div class="path-a-progress-fill" style="width:65%"></div></div>
      </div>
    </div>`;
  }

  // 系统音色
  const SYS_VOICES = [
    { id:'xiaoxiao', name:'温柔女声', tag:'系统' },
    { id:'yunjian',  name:'磁性男声', tag:'系统' },
    { id:'xiaoyi',   name:'活泼女声', tag:'系统' },
    { id:'yunxi',    name:'阳光男声', tag:'系统' },
  ];
  // 克隆声音库（从localStorage读取）
  const myVoices = S.myVoices || [];

  // 合并所有声音
  const allVoices = [
    ...SYS_VOICES.map(v => ({ ...v, isCustom: false })),
    ...myVoices.map(v => ({ id: 'my_' + v.id, name: v.name, tag: '我的', isCustom: true, emotion: v.emotion, audio_b64: v.audio_b64, _myId: v.id })),
  ];

  const voiceScrollHtml = allVoices.map(v => {
    const on = S.ttsVoice === v.id;
    const iconSvg = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>`;
    return `<div class="voice-item voice-item-design ${on?'voice-item-active':''}" onclick="selectVoice('${v.id}')">
      <div class="voice-item-icon">${iconSvg}${on?`<span class="voice-selected-mark"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg></span>`:''}</div>
      <span class="voice-item-name">${esc(v.name)}</span>
      ${on?`<span class="voice-item-selected-tag">已选</span>`:`<span class="voice-item-tag">${esc(v.tag)}</span>`}
    </div>`;
  }).join('');

  // 当选择我的声音时显示情绪选择 + 强度滑块
  const selectedMyVoice = myVoices.find(v => S.ttsVoice === 'my_' + v.id);
  const curEmo = S.ttsIndexEmotion || 'neutral';
  const curIntensity = S.ttsEmoIntensity != null ? S.ttsEmoIntensity : 5;
  const intensityPct = curIntensity / 10 * 100;
  const intensityBg = `linear-gradient(to right,#F97316 ${intensityPct}%,#E8E4DC ${intensityPct}%)`;
  const emotionSection = selectedMyVoice ? `
    <div class="section-card" style="background:#FFF8F3;border:1.5px solid #FFD5B8">
      <div class="section-label" style="margin-bottom:8px;color:#9A3412">情绪风格</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:${curEmo!=='neutral'?'14px':'0'}">
        ${[['neutral','自然'],['happy','开心'],['excited','激动'],['sad','忧郁'],['calm','平静']].map(([id,name])=>{
          const on = curEmo === id;
          return `<div onclick="setState({ttsIndexEmotion:'${id}'})"
            style="padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid ${on?'#F97316':'#E8E4DC'};background:${on?'#FFF1E8':'#F7F6F2'};color:${on?'#9A3412':'#6B7280'}">${name}</div>`;
        }).join('')}
      </div>
      ${curEmo !== 'neutral' ? `
      <div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <span style="font-size:12px;color:#9A3412;font-weight:600">情绪强度</span>
          <span style="font-size:13px;font-weight:700;color:#F97316">${curIntensity} <span style="font-size:11px;color:#A8A49C;font-weight:400">/ 10</span></span>
        </div>
        <input type="range" min="0" max="10" step="1" value="${curIntensity}"
          style="width:100%;appearance:none;-webkit-appearance:none;height:4px;border-radius:2px;outline:none;cursor:pointer;background:${intensityBg}"
          oninput="onEmoIntensityInput(this)"/>
        <div style="display:flex;justify-content:space-between;font-size:10px;color:#C4C0B8;margin-top:4px">
          <span>弱</span><span>强</span>
        </div>
      </div>` : ''}
    </div>` : '';

  const speedPct = Math.round((S.ttsSpeed - 0.5) / 1.5 * 100);
  const speedBg = `linear-gradient(to right,#FF6B35 ${speedPct}%,#E8E4DC ${speedPct}%)`;
  const speedPresets = [0.75, 1, 1.25, 1.5, 2];
  const speedPresetHtml = speedPresets.map(v => {
    const on = Math.abs(S.ttsSpeed - v) < 0.01;
    return `<div class="voice-speed-pill ${on?'voice-speed-pill-active':''}" onclick="setTTSSpeedPreset(${v})">${v === 1 ? '1x' : v + 'x'}</div>`;
  }).join('');
  const wave = Array.from({length: 28}, (_, i) => `<span style="animation-delay:${(i % 7) * 0.07}s"></span>`).join('');

  const audioSection = S.ttsAudioUrl ? `
    <div class="clone-voice-card voice-preview-card">
      <div class="audio-play-btn voice-preview-play" onclick="playTTSAudio()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="#fff"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      </div>
      <div class="voice-preview-main">
        <div class="voice-preview-title">语音预览</div>
        <div class="voice-wave">${wave}</div>
      </div>
      <span class="voice-done-badge">✓ 合成完成</span>
    </div>` : '';

  return `${sb}<div class="tab-page clone-voice-page">
    <div class="clone-voice-card">
      <div class="clone-voice-head">
        <div class="clone-voice-title">声音选择</div>
        <span class="clone-voice-manage" onclick="gotoVoiceManager()">管理声音 ›</span>
      </div>
      <div class="voice-scroll-row voice-scroll-design">${voiceScrollHtml}</div>
    </div>
    <div class="clone-voice-card voice-speed-card">
      <div class="clone-voice-head">
        <div class="clone-voice-title">语速调节</div>
        <span id="speedLabel" class="voice-speed-value">${S.ttsSpeed.toFixed(1)}x</span>
      </div>
      <input class="speed-slider voice-speed-slider" type="range" min="50" max="200" step="10" value="${Math.round(S.ttsSpeed*100)}"
        id="speedSlider" oninput="onSpeedInput(this.value)"
        style="background:${speedBg}" />
      <div class="voice-speed-meta"><span>0.5x 慢</span><span>快 2.0x</span></div>
      <div class="voice-speed-presets">${speedPresetHtml}</div>
    </div>
    ${emotionSection}
    ${audioSection}
    ${S.ttsErr?`<span class="err-text">${esc(S.ttsErr)}</span>`:''}
    ${S.ttsAudioUrl ? `
      ${tCloneActions(
        { text: '下一步：选择数字人 →', onclick: 'goToCloneStep4()' },
        [
          { text: '上一步', onclick: 'setState({extractStep:2})' },
          { text: '重新合成', onclick: 'handleTTSGenerate()' }
        ]
      )}` : `
      ${tCloneActions(
        { text: '合成语音试听 →', onclick: 'handleTTSGenerate()', disabled: S.ttsGenerating },
        [{ text: '上一步', onclick: 'setState({extractStep:2})' }]
      )}`}
  </div>`;
}

// ===== 步骤4：数字人 =====
function tCloneStep4(sb) {
  // 生成中
  if (S.extractStep === 'avatar_gen') {
    return `${sb}<div class="tab-page">
      <div class="input-card" style="text-align:center;padding:32px 20px;margin-top:4px">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#F5762A" stroke-width="1.5" style="margin-bottom:12px"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
        <div style="font-size:15px;font-weight:600;color:#1A1814;margin-bottom:6px">正在生成数字人视频</div>
        <div style="font-size:12px;color:#A8A49C;margin-bottom:16px">GPU 渲染中，通常 1~3 分钟</div>
        <div class="path-a-progress-bar"><div class="path-a-progress-fill" style="width:${S.avatarProgressPct||20}%"></div></div>
        <div style="font-size:12px;color:#6B6860;margin-top:8px">${S.avatarProgressMsg||'初始化中...'}</div>
        <div class="avatar-stop-btn" onclick="handleAvatarStop()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
          停止生成
        </div>
      </div>
    </div>`;
  }

  // 生成完成 — 显示视频
  if (S.avatarVideoUrl) {
    return `${sb}<div class="tab-page">
      <div class="section-card" style="text-align:center">
        <video src="${S.avatarVideoUrl}" controls playsinline style="width:100%;border-radius:10px;max-height:50vh"></video>
        <div style="font-size:13px;color:#059669;margin-top:10px;font-weight:600">✓ 数字人视频生成完成</div>
      </div>
      ${S.avatarErr?`<div class="err-text">${esc(S.avatarErr)}</div>`:''}
      ${tCloneActions(
        { text: '下一步：后期制作 →', onclick: 'goToCloneStep5()' },
        [{ text: '重新生成', onclick: 'setState({avatarVideoUrl:null,avatarTaskId:null,extractStep:4})' }]
      )}
    </div>`;
  }

  // 视频来源：数字人库已选 > 本次上传 > 空
  const hasVideo = !!(S.avatarLibKey || S.avatarSrcVideoB64);
  let vidSection;
  if (S.avatarLibKey) {
    // 从库中选择的数字人
    vidSection = `<div style="display:flex;gap:12px;align-items:center;background:#F0FFF4;border-radius:12px;padding:12px">
      ${S.avatarLibThumb ? `<img src="${S.avatarLibThumb}" style="width:64px;height:64px;border-radius:8px;object-fit:cover;flex-shrink:0"/>` : ''}
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;font-weight:600;color:#1A1814;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(S.avatarLibName)}</div>
        <div style="font-size:12px;color:#10B981;margin-top:2px">✓ 已从数字人库选择</div>
      </div>
      <span style="font-size:12px;color:#F97316;cursor:pointer;flex-shrink:0"
        onclick="setState({avatarLibKey:null,avatarLibName:'',avatarLibThumb:''})">换一个</span>
    </div>`;
  } else if (S.avatarSrcVideoB64) {
    vidSection = `<div style="position:relative">
      <video src="${S._avatarSrcBlobUrl||''}" controls playsinline
        style="width:100%;border-radius:12px;max-height:220px;background:#000;display:block"></video>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px">
        <span style="font-size:12px;color:#A8A49C;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(S.avatarSrcVideoName)}</span>
        <input type="file" id="avatarVidInput" accept="video/mp4,video/quicktime,video/mov,video/*" style="display:none" onchange="handleAvatarVideoSelect(event)"/>
        <span style="font-size:12px;color:#F97316;cursor:pointer;flex-shrink:0;margin-left:10px" onclick="document.getElementById('avatarVidInput').click()">重新选择</span>
      </div>
    </div>`;
  } else {
    vidSection = `<input type="file" id="avatarVidInput" accept="video/mp4,video/quicktime,video/mov,video/*" style="display:none" onchange="handleAvatarVideoSelect(event)"/>
      <div onclick="document.getElementById('avatarVidInput').click()"
        style="border:2px dashed #D4D0C8;border-radius:12px;padding:28px 16px;display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;background:#FAFAF8">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#C4C0B8" stroke-width="1.5"><rect x="2" y="6" width="15" height="12" rx="2"/><path d="M17 10l5-3v10l-5-3V10z"/></svg>
        <div style="font-size:14px;color:#A8A49C;font-weight:500">点击上传人脸视频</div>
        <div style="font-size:12px;color:#C4C0B8;text-align:center">建议 3~10 秒不说话正脸视频<br/>MP4 / MOV，正脸居中清晰</div>
      </div>
      <div onclick="openAvatarMgmt('select')"
        style="display:flex;align-items:center;justify-content:center;gap:6px;margin-top:10px;padding:10px;border-radius:10px;background:#F0FFF4;cursor:pointer">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#10B981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="7" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        <span style="font-size:13px;color:#10B981;font-weight:600">从数字人库选择</span>
      </div>`;
  }

  return `${sb}<div class="tab-page">
    <div class="section-card">
      <div class="section-label" style="margin-bottom:12px">选择人脸视频</div>
      ${vidSection}
    </div>
    <div class="section-card">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0">
        <span style="font-size:14px;color:#1A1814">GFPGAN 面部增强</span>
        <div class="tog-sw ${S.avatarBeauty?'tog-sw-on':'tog-sw-off'}" onclick="setState({avatarBeauty:!S.avatarBeauty})">
          <div class="tog-sw-ball"></div>
        </div>
      </div>
      <div style="font-size:12px;color:#A8A49C">开启后画质更清晰，但生成速度约慢 30 秒</div>
    </div>
    ${S.avatarErr?`<div class="err-text" style="margin-bottom:10px">${esc(S.avatarErr)}</div>`:''}
    ${tCloneActions(
      { text: S.avatarGenerating ? '生成中...' : '开始生成数字人视频 →', onclick: 'handleAvatarGenerate()', disabled: (!S.ttsAudioUrl || !hasVideo || S.avatarGenerating) },
      [{ text: '上一步', onclick: 'setState({extractStep:3})' }]
    )}
    ${!S.ttsAudioUrl?`<div style="text-align:center;font-size:12px;color:#EF4444;margin-top:8px">请先完成步骤3语音合成</div>`:''}
  </div>`;
}

// ===== 步骤5：后期制作 =====
const SUBTITLE_TEMPLATES = [
  { id:'classic',  name:'经典白字', desc:'百搭首选',   color:'#FFFFFF', ol:'#000000', size:44, ow:2.5 },
  { id:'variety',  name:'综艺黄字', desc:'活泼抢眼',   color:'#FFEE00', ol:'#000000', size:40, ow:3   },
  { id:'movie',    name:'电影字幕', desc:'沉稳专业',   color:'#F0F0F0', ol:'#111111', size:30, ow:1.5 },
  { id:'fresh',    name:'清新绿字', desc:'知识科普',   color:'#00E87A', ol:'#000000', size:34, ow:2   },
  { id:'vibrant',  name:'活力橙字', desc:'带货推荐',   color:'#FF6B35', ol:'#FFFFFF', size:38, ow:2   },
  { id:'minimal',  name:'极简白字', desc:'无描边简洁', color:'#FFFFFF', ol:'none',    size:34, ow:0   },
];

function applySubTemplate(id) {
  const t = SUBTITLE_TEMPLATES.find(x => x.id === id);
  if (!t) return;
  setState({ subTemplate: id, subColor: t.color, subOutlineColor: t.ol, subFontsize: t.size, subOutlineWidth: t.ow });
}

function tCloneStep5(sb) {
  const videoSrc = S.postProcessedVideoUrl || S.avatarVideoUrl || '';
  const hasResult = !!S.postProcessedVideoUrl;

  // 模板卡片——用 text-shadow 模拟描边（兼容所有浏览器）
  const tplHtml = SUBTITLE_TEMPLATES.map(t => {
    const active = S.subTemplate === t.id;
    const shadow = t.ol === 'none' ? 'none'
      : `1px 1px 0 ${t.ol},-1px 1px 0 ${t.ol},1px -1px 0 ${t.ol},-1px -1px 0 ${t.ol},0 2px 4px rgba(0,0,0,.8)`;
    return `<div onclick="applySubTemplate('${t.id}')"
      style="flex:1;min-width:calc(50% - 4px);background:#2C2820;border-radius:10px;padding:10px 8px 8px;cursor:pointer;
             border:2.5px solid ${active ? '#F97316' : '#3A3630'};position:relative;box-sizing:border-box">

  // 自定义颜色色板
  const COLORS = ['#FFFFFF','#FFEE00','#00E87A','#FF6B35','#FF3B3B','#00BFFF'];
  const colorDots = COLORS.map(c => {
    const active = S.subColor === c;
    return `<div onclick="setState({subColor:'${c}',subTemplate:'custom'})"

  }).join('');

  const OL_COLORS = [['#000000','黑'],['#FFFFFF','白'],['none','无']];
  const olDots = OL_COLORS.map(([c,label]) => {
    const active = S.subOutlineColor === c;
    const bg = c === 'none' ? 'repeating-linear-gradient(45deg,#ddd 0,#ddd 4px,#fff 4px,#fff 8px)' : c;
    return `<div onclick="setState({subOutlineColor:'${c}',subTemplate:'custom'})" style="display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer">

  return `${sb}<div class="tab-page">

    ${videoSrc ? `<div class="section-card" style="padding:10px">
      <video src="${videoSrc}" controls playsinline style="width:100%;border-radius:10px;max-height:40vh"></video>
      <div style="font-size:12px;color:${hasResult?'#059669':'#A8A49C'};text-align:center;margin-top:6px;font-weight:${hasResult?600:400}">
        ${hasResult ? '✓ 字幕已烧录' : '原始视频（未加字幕）'}
      </div>
    </div>` : ''}

    <div class="section-card">
      <div class="section-label" style="margin-bottom:10px">快速选择模板</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px">${tplHtml}</div>
    </div>

    <div class="section-card">
      <div class="section-label" style="margin-bottom:12px">自定义微调</div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <span style="font-size:13px;color:#6B6860">字幕颜色</span>
        <div style="display:flex;gap:8px;align-items:center">${colorDots}</div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <span style="font-size:13px;color:#6B6860">描边颜色</span>
        <div style="display:flex;gap:10px;align-items:center">${olDots}</div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font-size:13px;color:#6B6860">字体大小</span>
        <span style="font-size:13px;font-weight:600;color:#F97316">${S.subFontsize}px</span>
      </div>
      <input type="range" min="24" max="48" step="4" value="${S.subFontsize}"
        style="width:100%;accent-color:#F97316;margin-bottom:10px"
        oninput="setState({subFontsize:+this.value,subTemplate:'custom'})"/>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font-size:13px;color:#6B6860">描边粗细</span>
        <span style="font-size:13px;font-weight:600;color:#F97316">${S.subOutlineWidth}</span>
      </div>
      <input type="range" min="0" max="4" step="0.5" value="${S.subOutlineWidth}"
        style="width:100%;accent-color:#F97316"
        oninput="setState({subOutlineWidth:+this.value,subTemplate:'custom'})"/>
    </div>

    ${S.postProcessErr ? `<div class="err-text">${esc(S.postProcessErr)}</div>` : ''}
    ${S.postProcessing ? `
      <div class="input-card" style="text-align:center;padding:16px">
        <div style="font-size:14px;color:#F5762A;font-weight:500;margin-bottom:8px">识别语音并烧录字幕中...</div>
        <div class="path-a-progress-bar"><div class="path-a-progress-fill" style="width:60%;animation:none;background:linear-gradient(90deg,#F5762A,#8B5CF6)"></div></div>
        <div style="font-size:12px;color:#A8A49C;margin-top:6px">约30~60秒</div>
      </div>` : ''}

    ${hasResult
      ? tCloneActions(
          { text: '下一步：发布 →', onclick: 'goToCloneStep6()' },
          [
            { text: '上一步', onclick: 'goToCloneStep4()' },
            { text: S.postProcessing ? '处理中...' : '重新烧录', onclick: 'handlePostProcess()', disabled: S.postProcessing }
          ]
        )
      : tCloneActions(
          { text: S.postProcessing ? '处理中...' : '开始烧录字幕 →', onclick: 'handlePostProcess()', disabled: S.postProcessing },
          [{ text: '上一步', onclick: 'goToCloneStep4()' }]
        )
    }

  </div>`;
}

function tInspire() {
  if (S.inspireMode === 'analyze') return tInspireAnalyze();
  if (S.inspireMode === 'featured') return tInspireFeatured();
  return tInspireEntry();
}

function tInspireEntry() {
  return `<div class="tab-page">
    <div class="inspire-entry-card inspire-entry-recommended" onclick="setState({inspireMode:'analyze',pathAState:'input',pathAText:'',pathAErr:'',pathAProfile:null,pathASelectedIds:[]});render()">
      <div class="inspire-entry-badge">推荐 · 效果更好</div>
      <div class="inspire-entry-title">对标拆解 →</div>

      <div class="inspire-entry-title">行业精选 →</div>

    </div>
    <div style="text-align:center;margin-top:20px">
      <span style="font-size:13px;color:#A8A49C;cursor:pointer" onclick="openHistoryPage()">查看我的任务</span>
    </div>
  </div>`;
}

function tInspireAnalyze() {
  if (S.pathAState === 'started') {
    const task = S.pathATaskData;
    const isDone = task?.status === 'done';
    const isFailed = task?.status === 'failed';
    const progress = task?.progress || 0;
    const thinking = task?.thinking || (task ? 'AI 正在准备中...' : '任务已提交，等待处理...');

    let body = '';
    if (isDone) {
      let result = {};
      try {
        result = typeof task.result === 'string' ? JSON.parse(task.result) : (task.result || {});
      } catch {}
      const { analysis = {}, scripts = [], author = {} } = result;
      body = `
        <div style="font-size:15px;font-weight:700;color:#1A1814;margin-bottom:12px;display:flex;align-items:center;gap:6px"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#10B981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:block"><polyline points="20 6 9 17 4 12"/></svg> 拆解完成</div>
        ${analysis.account_positioning ? `<div class="analysis-card">
          <div class="analysis-title">对标账号分析</div>
          ${analysis.account_positioning?`<div class="analysis-row">定位：${esc(analysis.account_positioning)}</div>`:''}
          ${analysis.target_audience?`<div class="analysis-row">受众：${esc(analysis.target_audience)}</div>`:''}
          ${analysis.tone?`<div class="analysis-row">风格：${esc(analysis.tone)}</div>`:''}
          ${Array.isArray(analysis.content_patterns)&&analysis.content_patterns.length?`<div class="analysis-row">规律：${analysis.content_patterns.map(s=>esc(s)).join('、')}</div>`:''}
        </div>` : ''}
        <div style="font-size:14px;font-weight:700;color:#1A1814;margin-bottom:10px">生成文案（${scripts.length}条）</div>
        ${scripts.map((s,i)=>`<div class="script-result-card">
          <div class="script-hook-badge">${esc(s.hook_type||'文案')}</div>
          <div class="script-content">${esc(s.content)}</div>
          <div class="script-actions">
            <button class="btn-copy-small" onclick="cpPathAInlineScript(${i})">复制</button>
          </div>
        </div>`).join('')}`;
    } else if (isFailed) {
      body = `<div style="text-align:center;padding:24px 0">
        <div style="font-size:36px;margin-bottom:12px">😞</div>
        <div style="font-size:14px;font-weight:600;color:#DC2626;margin-bottom:8px">处理失败</div>
        <div style="font-size:12px;color:#6B6860;margin-bottom:6px">${esc(friendlyError(task.error_msg))}</div>
        ${task.error_msg?`<div style="font-size:10px;color:#B4B2A9;margin-bottom:16px;word-break:break-all">原始错误：${esc(task.error_msg)}</div>`:''}
        <div class="btn-primary" style="display:inline-block;padding:0 24px" onclick="setState({pathAState:'input',pathATaskData:null});render()">重新输入</div>
      </div>`;
    } else {
      body = `<div style="padding:8px 0">
        <div style="font-size:14px;font-weight:600;color:#1A1814;margin-bottom:14px">${esc(task?.title||'AI 拆解任务')}</div>
        <div class="path-a-progress-bar"><div class="path-a-progress-fill" style="width:${progress}%"></div></div>
        <div style="font-size:13px;color:#6B6860;line-height:1.7;min-height:44px">
          <span class="typewriter-text">${esc(thinking)}</span>
        </div>
        <div style="font-size:11px;color:#A8A49C;margin-top:20px;text-align:center">
          通常需要 1-3 分钟，可以先去做别的事 · <span style="text-decoration:underline;cursor:pointer;color:#E8650A" onclick="openHistoryPage()">去任务中心</span>
        </div>
      </div>`;
    }

    return `<div class="tab-page">${body}</div>`;
  }

  if (S.pathAState === 'videos' && S.pathAProfile) {
    const profile = S.pathAProfile;
    const selected = S.pathASelectedIds;
    return `<div class="tab-page">
      <div style="font-size:13px;font-weight:600;color:#1A1814;margin-bottom:4px">@${esc(profile.author.nickname)} 的近期视频</div>
      <div style="font-size:11px;color:#A8A49C;margin-bottom:12px">选择 1-3 条，AI 将拆解其内容套路</div>
      ${profile.videos.map(v=>{
        const on = selected.includes(v.aweme_id);
        const digg = v.stats.digg >= 10000 ? (v.stats.digg/10000).toFixed(1)+'w' : String(v.stats.digg);
        return `<div class="video-list-item" onclick="pathAToggleVideo('${esc(v.aweme_id)}')">
          <div class="video-list-check ${on?'video-list-check-on':''}">
            ${on?'✓':''}
          </div>
          <div class="video-list-info">
            <div class="video-list-title">${esc(v.title)}</div>
            <div class="video-list-meta">${v.duration_sec}秒 · <span class="video-list-digg">❤️ ${digg}</span></div>
          </div>
        </div>`;
      }).join('')}
      <div style="margin-top:4px">
        <span class="section-label">店铺名称（选填，用于文案中自然提及）</span>
        <input class="field-input" placeholder="如：老王二手车" value="${esc(S.pathABrandName||S.userInfo?.brand_name||'')}" oninput="S.pathABrandName=this.value"/>
      </div>
      ${S.pathAErr?`<div class="err-text" style="margin-top:8px">${esc(S.pathAErr)}</div>`:''}
      <div class="btn-primary ${S.pathALoading||selected.length===0?'btn-disabled':''}" style="margin-top:14px"
           onclick="pathAStartAnalyze()">
        ${S.pathALoading?'⏳ 创建任务中...':'开始拆解（已选'+selected.length+'条）'}
      </div>
    </div>`;
  }

  // 默认：链接输入
  return `<div class="tab-page">
    <div class="section-card">
      <span class="section-label">粘贴对标主页或视频链接</span>
      <textarea class="field-input" id="f-path-a-text" rows="3"
        style="height:auto;padding:10px 14px;resize:none;line-height:1.6"
        placeholder="粘贴抖音分享文本或链接，支持主页、单视频"
        oninput="S.pathAText=this.value;render()">${esc(S.pathAText)}</textarea>
      <div style="font-size:11px;color:#A8A49C;margin-top:6px">支持：抖音主页链接 / 单条视频链接 / 分享文本</div>
    </div>
    ${S.pathAErr?`<div class="err-text">${esc(S.pathAErr)}</div>`:''}
    <div class="btn-primary ${S.pathALoading?'btn-disabled':''}" onclick="pathAResolve()">
      ${S.pathALoading?'⏳ 解析中...':'解析并开始'}
    </div>
  </div>`;
}

let _featuredRefreshTimer = null;

async function enterFeaturedMode() {
  setState({ inspireMode: 'featured', featuredPage: 'select', featuredIndustry: null, featuredVideos: [], featuredLoading: false, featuredIndustriesLoading: true, featuredErr: '', featuredSelectedIdx: null });
  render();
  await loadFeaturedIndustries();
  if (_featuredRefreshTimer) clearInterval(_featuredRefreshTimer);
  _featuredRefreshTimer = setInterval(async () => {
    if (S.inspireMode !== 'featured') return;
    const prevList = (S.featuredIndustriesList || []).join(',');
    await loadFeaturedIndustries();
    const newList = (S.featuredIndustriesList || []).join(',');
    if (prevList !== newList) render();
    // 内容页：刷新当前行业内容
    if (S.featuredPage === 'content' && S.featuredIndustry && !S.featuredLoading) {
      featuredSelectIndustry(S.featuredIndustry);
    }
  }, 30000);
}

async function loadFeaturedIndustries() {
  if (!S.featuredIndustriesList || S.featuredIndustriesList.length === 0) S.featuredIndustriesLoading = true;
  try {
    const r = await fetch('/api/industry-videos/industries').then(x => x.json());
    if (r.code === 200 && Array.isArray(r.data)) {
      setState({ featuredIndustriesList: r.data, featuredIndustriesLoading: false });
      render();
    } else {
      setState({ featuredIndustriesLoading: false });
    }
  } catch(e) {
    setState({ featuredIndustriesLoading: false });
    console.error('[loadFeaturedIndustries]', e);
  }
}
