<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>爆款文案工坊</title>
  <style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #F2F0EA; }
body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif; -webkit-font-smoothing: antialiased; }
input, button, textarea { -webkit-appearance: none; appearance: none; font-family: inherit; border: none; outline: none; background: none; }
::-webkit-scrollbar { width: 0; height: 0; }

/* === APP WRAP === */
#app { width: 100%; height: 100%; }
.app-wrap {
  display: flex; flex-direction: column;
  height: 100vh; background: #F2F0EA; overflow: hidden;
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  max-width: 480px; margin: 0 auto;
}

/* === TOP BAR === */
.top-bar {
  display: flex; flex-direction: row; align-items: center;
  padding: calc(env(safe-area-inset-top, 0px) + 16px) 16px 10px;
  background: #F2F0EA; flex-shrink: 0;
}
.app-name { font-size: 17px; font-weight: 700; color: #1A1814; letter-spacing: .5px; }
.top-bar-login { font-size: 14px; font-weight: 600; color: #F97316; padding: 6px 4px; cursor: pointer; user-select: none; flex-shrink: 0; }
.top-bar-sub { justify-content: space-between; align-items: center; }
.back-btn { border: none; background: transparent; padding: 6px 0; margin: 0; font-size: 15px; font-weight: 500; color: #1A1814; cursor: pointer; user-select: none; display: inline-flex; align-items: center; line-height: 1.25; min-width: 56px; font-family: inherit; }
.sub-page-title { font-size: 16px; font-weight: 600; color: #1A1814; text-align: center; flex: 1; }

/* === CONTENT === */
.page-content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; min-height: 0; }
.tab-page { padding: 12px 16px 100px; }

/* === BUTTONS === */
.btn-primary {
  background: #FF6B35; color: #FFFFFF; border-radius: 50px;
  height: 46px; line-height: 46px; text-align: center;
  font-size: 15px; font-weight: 600; cursor: pointer; user-select: none; display: block; width: 100%;
}
.btn-secondary {
  background: #FFFFFF; color: #1A1814; border: 1px solid #E4E2DA;
  border-radius: 50px; height: 46px; line-height: 46px;
  text-align: center; font-size: 15px; flex: 1; margin-right: 8px; cursor: pointer; user-select: none;
}
.btn-disabled { opacity: .5; pointer-events: none; }
.action-row { display: flex; flex-direction: row; align-items: center; margin-top: 10px; }
.action-row .btn-primary { flex: 1.5; }

/* === HOME === */
.welcome-banner { background: linear-gradient(135deg,#FF6B35 0%,#FF8C5A 100%); border-radius: 12px; padding: 20px 18px; margin-bottom: 14px; }
.welcome-hi { display: block; font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 4px; }
.welcome-sub { display: block; font-size: 13px; color: rgba(255,255,255,.85); margin-bottom: 10px; }
.usage-bar { display: inline-flex; flex-direction: row; align-items: center; background: rgba(255,255,255,.2); border-radius: 50px; padding: 5px 10px; }
.usage-text { font-size: 12px; color: #fff; }
.usage-sep { font-size: 12px; color: rgba(255,255,255,.6); margin: 0 4px; }
.usage-empty { color: #FFD4C5; }
.feature-cards { margin-bottom: 14px; }
.feature-card { background: #fff; border-radius: 10px; padding: 14px 16px; margin-bottom: 12px; display: flex; flex-direction: row; align-items: center; box-shadow: 0 1px 8px rgba(0,0,0,.05); cursor: pointer; user-select: none; }
.feature-icon-wrap { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-right: 12px; flex-shrink: 0; }
.feature-icon-blue { background: rgba(99,102,241,.12); }
.feature-icon-orange { background: rgba(255,107,53,.12); }
.feature-icon { display: flex; align-items: center; justify-content: center; }
.feature-info { flex: 1; }
.feature-title { display: block; font-size: 15px; font-weight: 600; color: #1A1814; margin-bottom: 3px; }
.feature-desc { display: block; font-size: 12px; color: #A8A49C; line-height: 1.5; }
.feature-arrow { font-size: 22px; color: #CCCCCC; margin-left: 4px; }
.stats-row { display: flex; flex-direction: row; justify-content: space-around; background: #F5F4F1; border-radius: 10px; padding: 14px 8px; }
.stat-pill { display: flex; flex-direction: column; align-items: center; }
.stat-pill-num { font-size: 20px; font-weight: 700; color: #FF6B35; margin-bottom: 2px; }
.stat-pill-label { font-size: 11px; color: #A8A49C; }

/* === EXTRACT === */
.input-card { background: #fff; border-radius: 10px; padding: 16px; margin-bottom: 10px; }
.input-label { display: block; font-size: 12px; color: #A8A49C; margin-bottom: 8px; font-weight: 500; }
.url-textarea { background: #F7F6F2; border: 1px solid #E4E2DA; border-radius: 8px; padding: 12px 14px; font-size: 14px; color: #1A1814; width: 100%; min-height: 60px; margin-bottom: 12px; line-height: 1.6; resize: none; display: block; }
.url-textarea::placeholder { color: #C4C0B8; }
.err-text { display: block; color: #B83060; font-size: 12px; text-align: center; padding: 6px 0; }
.tip-card { background: rgba(99,102,241,.06); border-radius: 8px; padding: 14px 16px; }
.tip-title { display: block; font-size: 13px; font-weight: 600; color: #6366F1; margin-bottom: 8px; }
.tip-line { display: block; font-size: 12px; color: #6B6E99; margin-bottom: 5px; line-height: 1.6; }
.result-card { background: #fff; border-radius: 10px; padding: 14px; margin-bottom: 8px; }
.result-muted { opacity: .7; }
.result-highlight { border: 1px solid #FF6B35; }
.result-header-row { display: flex; flex-direction: row; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.result-label { font-size: 14px; font-weight: 600; color: #1A1814; }
.result-label-sm { display: block; font-size: 11px; color: #A8A49C; margin-bottom: 6px; }
.copy-btn { background: rgba(99,102,241,.1); color: #6366F1; border-radius: 50px; padding: 4px 12px; font-size: 12px; cursor: pointer; user-select: none; flex-shrink: 0; }
.copy-btn-strong { background: #6366F1; color: #fff; }
.thin-divider { height: 1px; background: #ECEAE2; margin-bottom: 10px; }
.script-text { display: block; font-size: 14px; color: #1A1814; line-height: 1.8; white-space: pre-wrap; word-break: break-all; }
.script-text-sm { display: block; font-size: 12px; color: #A8A49C; line-height: 1.7; white-space: pre-wrap; word-break: break-all; }
.editable-script-textarea { width: 100%; min-height: 180px; max-height: 45vh; overflow-y: auto; -webkit-overflow-scrolling: touch; background: #F7F6F2; border: 1px solid #E4E2DA; border-radius: 10px; padding: 12px; font-size: 14px; color: #1A1814; line-height: 1.8; resize: vertical; transition: background .2s ease, color .2s ease; }
.editable-script-textarea:focus { border-color: #F97316; outline: none; }
.editable-script-textarea.editable-disabled { background: #EEEEEA; color: #A8A49C; cursor: not-allowed; }
.result-card.rewrite-generating { position: relative; overflow: hidden; }
.result-card.rewrite-generating::before,
.result-card.rewrite-generating::after {
  content: ''; position: absolute; left: -40%; width: 40%; height: 3px;
  background: linear-gradient(90deg, rgba(249,115,22,0), rgba(249,115,22,.65), rgba(249,115,22,0));
  animation: rewriteWave 1.15s linear infinite;
}
.result-card.rewrite-generating::before { top: 0; }
.result-card.rewrite-generating::after { bottom: 0; animation-delay: .35s; }
@keyframes rewriteWave {
  0% { left: -40%; }
  100% { left: 100%; }
}

/* === INSPIRE === */
.section-card { background: #fff; border-radius: 10px; padding: 14px; margin-bottom: 8px; }
.section-label { display: block; font-size: 13px; font-weight: 600; color: #1A1814; margin-bottom: 10px; }
.industry-grid { display: flex; flex-direction: row; flex-wrap: wrap; }
.industry-item { background: #F7F6F2; color: #1A1814; border: 1px solid #E4E2DA; border-radius: 50px; padding: 6px 14px; font-size: 13px; margin-right: 8px; margin-bottom: 8px; cursor: pointer; user-select: none; }
.industry-active { background: #6366F1; color: #fff; border-color: #6366F1; }
.field-input { background: #F7F6F2; border: 1px solid #E4E2DA; border-radius: 8px; height: 44px; padding: 0 14px; font-size: 14px; color: #1A1814; width: 100%; display: block; }
.field-input::placeholder { color: #C4C0B8; }
.inspire-action-row { display: flex; flex-direction: row; align-items: center; margin-bottom: 8px; }
.inspire-generate-btn { flex: 1; }
.stop-btn { background: #fff; color: #B83060; border: 1px solid #B83060; border-radius: 50px; height: 46px; line-height: 46px; text-align: center; font-size: 14px; padding: 0 18px; margin-left: 8px; flex-shrink: 0; cursor: pointer; user-select: none; }
.section-title-row { display: flex; flex-direction: row; align-items: center; justify-content: space-between; margin-bottom: 8px; margin-top: 4px; }
.section-title-text { font-size: 14px; font-weight: 600; color: #1A1814; }
.matched-tag { font-size: 11px; color: #6366F1; background: rgba(99,102,241,.1); border-radius: 50px; padding: 3px 9px; }
.inspire-card { background: #fff; border-radius: 10px; padding: 14px; margin-bottom: 8px; cursor: pointer; }
.inspire-seq { display: inline-block; background: #6366F1; color: #fff; border-radius: 50%; width: 20px; height: 20px; line-height: 20px; text-align: center; font-size: 11px; font-weight: 600; margin-bottom: 6px; }
.inspire-hook { display: block; font-size: 15px; font-weight: 600; color: #1A1814; line-height: 1.6; margin-bottom: 6px; }
.inspire-tags-row { display: flex; flex-direction: row; flex-wrap: wrap; margin-bottom: 4px; }
.tag { background: rgba(99,102,241,.1); color: #6366F1; border-radius: 50px; padding: 3px 9px; font-size: 11px; margin-right: 6px; margin-bottom: 4px; }
.inspire-expand { margin-top: 2px; }
.inspire-full { display: block; font-size: 13.5px; color: #3A3A3A; line-height: 1.8; white-space: pre-wrap; margin-bottom: 10px; word-break: break-all; }
.inspire-btns { display: flex; flex-direction: row; align-items: center; justify-content: flex-end; }
.expand-btn { background: #FF6B35; color: #fff; border-radius: 50px; padding: 5px 14px; font-size: 12px; margin-left: 8px; cursor: pointer; user-select: none; }
.toggle-hint { display: block; font-size: 11px; color: #A8A49C; text-align: right; margin-top: 6px; }
.history-header-row { display: flex; flex-direction: row; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.history-toggle { color: #A8A49C; font-size: 13px; padding: 8px 0; cursor: pointer; user-select: none; }
.clear-btn { color: #B83060; font-size: 12px; padding: 6px 10px; border: 1px solid #B83060; border-radius: 50px; cursor: pointer; user-select: none; }
.empty-tip { text-align: center; color: #C4C0B8; font-size: 13px; padding: 20px; }
.history-card { background: #fff; border-radius: 8px; padding: 12px 14px; margin-bottom: 6px; cursor: pointer; }
.history-header { display: flex; flex-direction: row; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.history-track { display: block; font-size: 14px; font-weight: 500; color: #1A1814; }
.history-time { display: block; font-size: 11px; color: #A8A49C; }
.history-count { font-size: 11px; color: #A8A49C; background: #F0EEE8; border-radius: 50px; padding: 2px 7px; }
.history-scripts { margin-top: 8px; border-top: 1px solid #F0EEE8; padding-top: 8px; }
.history-script-item { display: flex; flex-direction: row; align-items: flex-start; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #F7F6F2; }
.history-script-hook { flex: 1; font-size: 13px; color: #1A1814; line-height: 1.5; margin-right: 8px; }
.history-script-col { flex: 1; min-width: 0; margin-right: 8px; display: flex; flex-direction: column; align-items: stretch; }
.history-script-col .history-script-hook { flex: none; }
.history-script-content { display: block; font-size: 13px; color: #555; line-height: 1.75; white-space: pre-wrap; word-break: break-word; margin-top: 8px; padding-top: 8px; border-top: 1px dashed #ECEAE2; }

/* === PROFILE === */
.profile-hero { background: linear-gradient(135deg,#6366F1 0%,#818CF8 100%); border-radius: 12px; padding: 18px 16px 16px; margin-bottom: 12px; display: flex; flex-direction: column; align-items: stretch; }
.profile-hero-top { display: flex; flex-direction: row; align-items: center; width: 100%; margin-bottom: 14px; }
.profile-hero-mid { flex: 1; min-width: 0; display: flex; flex-direction: column; align-items: flex-start; justify-content: center; padding: 0 10px 0 12px; }
.profile-phone-inline { display: block; font-size: 12px; color: rgba(255,255,255,.72); margin-top: 4px; }
.avatar-lg { width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 0; position: relative; overflow: hidden; flex-shrink: 0; }
.avatar-type-0 { background: rgba(124,58,237,.55); }
.avatar-type-1 { background: rgba(249,115,22,.55); }
.avatar-type-2 { background: rgba(59,130,246,.55); }
.avatar-type-3 { background: rgba(16,185,129,.55); }
.avatar-lg-text { font-size: 28px; line-height: 1; }
.avatar-lg-img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; display: block; }
.profile-name { display: block; font-size: 17px; font-weight: 700; color: #fff; margin-bottom: 0; user-select: none; line-height: 1.25; word-break: break-all; }
.profile-edit-entry { flex-shrink: 0; align-self: center; font-size: 13px; font-weight: 600; color: #4F46E5; padding: 8px 12px; border-radius: 50px; background: #fff; cursor: pointer; user-select: none; white-space: nowrap; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
.nickname-edit-wrap { display: flex; flex-direction: row; align-items: center; margin-bottom: 12px; gap: 6px; }
.nickname-edit-input { flex: 1; background: rgba(255,255,255,.25); border: 1px solid rgba(255,255,255,.5); border-radius: 8px; height: 36px; padding: 0 10px; font-size: 14px; color: #fff; }
.nickname-edit-input::placeholder { color: rgba(255,255,255,.6); }
.nickname-edit-save { background: #fff; color: #6366F1; border-radius: 8px; height: 36px; line-height: 36px; padding: 0 14px; font-size: 13px; font-weight: 600; cursor: pointer; user-select: none; flex-shrink: 0; }
.nickname-edit-cancel { background: rgba(255,255,255,.2); color: #fff; border-radius: 8px; height: 36px; line-height: 36px; padding: 0 12px; font-size: 13px; cursor: pointer; user-select: none; flex-shrink: 0; }
.usage-stats { display: flex; flex-direction: row; align-items: center; background: rgba(255,255,255,.15); border-radius: 10px; padding: 10px 16px; width: 100%; justify-content: space-around; }
.stat-item { display: flex; flex-direction: column; align-items: center; }
.stat-num { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 3px; }
.stat-label { font-size: 11px; color: rgba(255,255,255,.75); }
.stat-empty { color: #FFD4C5; }
.stat-divider { width: 1px; height: 30px; background: rgba(255,255,255,.3); }
.avatar-picker { background: #fff; border-radius: 10px; padding: 14px; margin-bottom: 8px; }
.avatar-options { display: flex; flex-direction: row; justify-content: space-around; margin-top: 8px; }
.avatar-option { display: flex; flex-direction: column; align-items: center; padding: 4px; border-radius: 8px; border: 2px solid transparent; cursor: pointer; user-select: none; }
.avatar-option-active { border-color: #6366F1; background: rgba(99,102,241,.06); }
.avatar-opt-circle { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.avatar-opt-0 { background: #7C3AED; }
.avatar-opt-1 { background: #F97316; }
.avatar-opt-2 { background: #3B82F6; }
.avatar-opt-3 { background: #10B981; }
.avatar-opt-circle { display: flex; align-items: center; justify-content: center; }
.profile-section { background: #fff; border-radius: 10px; padding: 14px; margin-bottom: 8px; }
.profile-section-title { display: block; font-size: 12px; color: #A8A49C; font-weight: 500; margin-bottom: 10px; }
.profile-row { display: flex; flex-direction: row; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #F0EEE8; }
.profile-row:last-child { border-bottom: none; }
.profile-key { font-size: 14px; color: #1A1814; }
.profile-val { font-size: 14px; color: #A8A49C; }
.val-green { color: #2D7A3A; font-weight: 500; }
.code-row { display: flex; flex-direction: row; align-items: center; }
.code-input { flex: 1; background: #F7F6F2; border: 1px solid #E4E2DA; border-radius: 6px 0 0 6px; padding: 0 12px; font-size: 14px; color: #1A1814; height: 44px; }
.code-input::placeholder { color: #C4C0B8; }
.code-submit { background: #FFD8C4; color: #9A3412; border-radius: 0 6px 6px 0; padding: 0 16px; height: 44px; line-height: 44px; font-size: 14px; font-weight: 600; cursor: pointer; user-select: none; flex-shrink: 0; }
.code-msg { display: block; font-size: 12px; margin-top: 6px; }
.code-ok { color: #2D7A3A; }
.code-err { color: #B83060; }
.code-activated { background: rgba(45,122,58,.06); border-radius: 6px; padding: 10px; }
.code-activated-text { font-size: 13px; color: #2D7A3A; line-height: 1.6; }
.vip-upgrade-card { background: linear-gradient(135deg,#FF6B35 0%,#FF8C5A 100%); border-radius: 12px; padding: 20px 16px; margin-bottom: 10px; display: flex; flex-direction: row; align-items: center; cursor: pointer; user-select: none; }
.vip-upgrade-left { flex: 1; }
.vip-upgrade-title { display: flex; align-items: center; gap: 7px; font-size: 17px; font-weight: 700; color: #fff; margin-bottom: 4px; }
.vip-upgrade-sub { display: block; font-size: 13px; color: rgba(255,255,255,.88); line-height: 1.45; }
.vip-upgrade-arrow { font-size: 24px; color: rgba(255,255,255,.85); margin-left: 6px; }
.logout-btn { background: #fff; border: 1px solid #E4E2DA; border-radius: 10px; padding: 14px 16px; text-align: center; margin-top: 18px; margin-bottom: 8px; color: #6B6560; font-size: 15px; font-weight: 500; cursor: pointer; user-select: none; }

/* === VIP === */
.vip-hero { background: linear-gradient(135deg,#1A1814 0%,#3A3530 100%); border-radius: 12px; padding: 28px 18px 24px; margin-bottom: 14px; display: flex; flex-direction: column; align-items: center; }
.vip-hero-icon { display:flex; align-items:center; justify-content:center; margin-bottom: 10px; }
.vip-hero-title { display: block; font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 5px; }
.vip-hero-sub { display: block; font-size: 13px; color: rgba(255,255,255,.6); }
.plan-grid { display: flex; flex-direction: row; flex-wrap: wrap; margin: 0 -4px 8px; }
.plan-card { width: calc(50% - 8px); margin: 4px; background: #fff; border: 1px solid #E4E2DA; border-radius: 10px; padding: 14px 12px; position: relative; cursor: pointer; user-select: none; }
.plan-active { border-color: #6366F1; background: rgba(99,102,241,.04); }
.plan-name { display: block; font-size: 14px; font-weight: 600; color: #1A1814; margin-bottom: 3px; }
.plan-duration { display: block; font-size: 11px; color: #A8A49C; margin-bottom: 6px; }
.plan-price { display: block; color: #FF6B35; margin-top: 2px; }
.plan-price-unit { font-size: 12px; font-weight: 400; vertical-align: middle; }
.plan-price-num { font-size: 20px; font-weight: 500; letter-spacing: -0.5px; vertical-align: middle; }
.plan-badge { position: absolute; top: -1px; right: 8px; background: #FF6B35; color: #fff; font-size: 10px; padding: 2px 7px; border-radius: 0 0 6px 6px; }
.payment-row { display: flex; flex-direction: row; margin-bottom: 14px; }
.payment-item { flex: 1; background: #fff; border: 1px solid #E4E2DA; border-radius: 8px; padding: 12px; display: flex; flex-direction: column; align-items: center; margin-right: 8px; cursor: pointer; user-select: none; }
.payment-item:last-child { margin-right: 0; }
.payment-active { border-color: #6366F1; background: rgba(99,102,241,.04); }
.payment-icon { width: 36px; height: 36px; margin-bottom: 4px; display: flex; align-items: center; justify-content: center; }
.payment-name { font-size: 13px; color: #1A1814; }
.pay-btn { background: #FF6B35; color: #fff; border-radius: 50px; height: 50px; line-height: 50px; text-align: center; font-size: 16px; font-weight: 600; margin-bottom: 12px; cursor: pointer; user-select: none; }

/* === BOTTOM TAB === */
.bottom-tab { display: flex; flex-direction: row; background: #fff; border-top: 1px solid #ECEAE2; padding-bottom: env(safe-area-inset-bottom, 0px); flex-shrink: 0; }
.tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px 0 8px; cursor: pointer; user-select: none; color: #C4C0B8; }
.tab-icon { display: flex; align-items: center; justify-content: center; margin-bottom: 4px; }
.tab-label { font-size: 11px; color: #A8A49C; }
.tab-active { color: #F97316; }
.tab-active .tab-label { color: #F97316; font-weight: 600; }

/* === PAY MODAL === */
.pay-modal-mask { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; z-index: 100; }
.pay-modal { background: #fff; border-radius: 12px; padding: 24px 20px; width: 280px; display: flex; flex-direction: column; align-items: center; }
.pay-modal-icon { font-size: 36px; margin-bottom: 8px; }
.pay-modal-title { display: block; font-size: 16px; font-weight: 700; color: #1A1814; margin-bottom: 8px; }
.pay-modal-note { display: block; font-size: 13px; color: #A8A49C; text-align: center; margin-bottom: 16px; line-height: 1.6; }
.pay-modal-btn { background: #FF6B35; color: #fff; border-radius: 50px; padding: 0 30px; height: 44px; line-height: 44px; font-size: 15px; font-weight: 600; cursor: pointer; }

/* === AUTH BOTTOM SHEET === */
.auth-sheet-mask {
  position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 220;
  display: flex; align-items: flex-end; justify-content: center;
}
.auth-sheet {
  width: 100%; max-width: 480px; background: #F2F0EA;
  border-radius: 18px 18px 0 0;
  padding: 0 0 calc(12px + env(safe-area-inset-bottom, 0px));
  max-height: min(90vh, 720px);
  overflow: hidden; display: flex; flex-direction: column;
  box-shadow: 0 -8px 32px rgba(0,0,0,.12);
}
.auth-sheet-scroll { overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0 16px 8px; flex: 1; min-height: 0; }
.auth-sheet-handle { width: 40px; height: 5px; background: #D4D0C8; border-radius: 3px; margin: 10px auto 6px; cursor: pointer; }
.auth-sheet-head { display: flex; flex-direction: row; align-items: center; justify-content: space-between; padding: 4px 16px 8px; }
.auth-sheet-title { font-size: 17px; font-weight: 700; color: #1A1814; }
.auth-sheet-close { font-size: 22px; color: #A8A49C; line-height: 1; padding: 8px; margin: -4px -8px -4px 0; cursor: pointer; user-select: none; }
.auth-sheet-sub { font-size: 13px; color: #A8A49C; padding: 0 16px 12px; line-height: 1.5; }
.profile-guest-cta { display: block; margin: 12px auto 0; background: #fff; color: #6366F1; font-size: 15px; font-weight: 600; text-align: center; border-radius: 50px; padding: 12px 20px; cursor: pointer; user-select: none; width: 100%; max-width: 260px; }
.profile-guest-hint { display: block; font-size: 12px; color: rgba(255,255,255,.85); text-align: center; margin-top: 8px; line-height: 1.5; }
.form-card-sheet { margin: 0; box-shadow: none; background: transparent; }

/* === LOGIN === */
.login-page { min-height: 100vh; background: #F2F0EA; overflow-y: auto; -webkit-overflow-scrolling: touch; max-width: 480px; margin: 0 auto; }
.logo-area { display: flex; flex-direction: column; align-items: center; padding: 60px 24px 24px; }
.logo-icon { font-size: 44px; margin-bottom: 10px; }
.logo-title { font-size: 24px; font-weight: 700; color: #1A1814; letter-spacing: 1px; margin-bottom: 6px; }
.logo-sub { font-size: 13px; color: #A8A49C; }
.form-card { background: #fff; border-radius: 14px; margin: 0 16px; padding: 20px 18px; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
.mode-switch { display: flex; background: #F7F6F2; border-radius: 50px; padding: 3px; margin-bottom: 20px; }
.mode-btn { flex: 1; text-align: center; height: 34px; line-height: 34px; border-radius: 50px; font-size: 14px; color: #A8A49C; cursor: pointer; user-select: none; }
.mode-active { background: #fff; color: #1A1814; font-weight: 600; box-shadow: 0 1px 6px rgba(0,0,0,.08); }
.field-group { margin-bottom: 14px; }
.field-label { display: block; font-size: 12px; color: #A8A49C; margin-bottom: 6px; font-weight: 500; }
.input-wrap { display: flex; flex-direction: row; align-items: center; background: #F7F6F2; border: 1px solid #E4E2DA; border-radius: 8px; height: 48px; overflow: hidden; }
.input-prefix { font-size: 14px; color: #A8A49C; padding: 0 10px 0 14px; flex-shrink: 0; }
.lf-input { background: #F7F6F2; border: 1px solid #E4E2DA; border-radius: 8px; padding: 0 14px; font-size: 15px; color: #1A1814; width: 100%; height: 48px; }
.lf-input::placeholder { color: #C4C0B8; }
.input-wrap .lf-input { border: none; border-radius: 0; flex: 1; background: transparent; padding: 0 14px 0 0; }
.err-msg { display: block; color: #B83060; font-size: 12px; text-align: center; margin-bottom: 8px; padding: 6px; background: rgba(184,48,96,.06); border-radius: 6px; }
.submit-btn { background: #FF6B35; color: #fff; border-radius: 50px; height: 48px; line-height: 48px; text-align: center; font-size: 16px; font-weight: 600; margin-top: 4px; cursor: pointer; user-select: none; }
.submit-disabled { opacity: .5; pointer-events: none; }
.sms-send-btn { flex-shrink: 0; padding: 0 14px; font-size: 13px; font-weight: 600; color: #E8650A; cursor: pointer; white-space: nowrap; border-left: 1px solid #E4E2DA; height: 100%; display: flex; align-items: center; }
.sms-send-disabled { color: #C4C0B8; pointer-events: none; }
.footer-tip { text-align: center; padding: 20px 16px 40px; }
.footer-text { font-size: 11px; color: #C4C0B8; }

/* === TOAST === */
.toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,.75); color: #fff; border-radius: 6px; padding: 8px 16px; font-size: 14px; z-index: 200; pointer-events: none; white-space: nowrap; max-width: 480px; }

/* === USAGE PROGRESS BAR === */
.usage-progress-wrap { display: flex; flex-direction: row; align-items: center; }
.usage-progress-bar { flex: 1; height: 8px; background: rgba(255,255,255,.25); border-radius: 50px; overflow: hidden; margin-right: 8px; }
.usage-progress-fill { height: 100%; background: #fff; border-radius: 50px; transition: width .3s; }
.usage-progress-warn { background: #FFD580; }
.usage-progress-text { font-size: 12px; color: #fff; white-space: nowrap; flex-shrink: 0; }

/* === STATS WRAP === */
.stats-wrap { margin-bottom: 14px; }
.stats-source { text-align: right; font-size: 10px; color: #CCCCCC; padding: 4px 8px 0; }

/* === RECENT HISTORY (HOME) === */
.home-section-header { display: flex; flex-direction: row; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.home-section-title { font-size: 14px; font-weight: 600; color: #1A1814; }
.home-section-more { font-size: 12px; color: #A8A49C; cursor: pointer; user-select: none; }
.recent-list { display: flex; flex-direction: row; overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 0 -16px; padding: 0 16px 4px; }
.recent-item { flex-shrink: 0; width: 168px; background: #fff; border-radius: 10px; padding: 10px 12px 10px; margin-right: 10px; cursor: pointer; user-select: none; box-shadow: 0 1px 6px rgba(0,0,0,.05); display: flex; flex-direction: column; align-items: stretch; }
.recent-item-head { display: flex; flex-direction: row; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
.recent-item-text { flex: 1; min-width: 0; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; font-size: 13px; color: #1A1814; line-height: 1.45; }
.recent-copy { flex-shrink: 0; font-size: 12px; color: #A8A49C; cursor: pointer; user-select: none; padding: 2px 4px; margin-top: -1px; border-radius: 4px; background: #F7F6F2; }
.recent-item-time { display: block; font-size: 11px; color: #A8A49C; margin-top: auto; }
.profile-edit-page { padding-bottom: 24px; }
.profile-field { margin-bottom: 16px; }
.profile-field-label { display: block; font-size: 12px; color: #A8A49C; margin-bottom: 6px; }
.profile-field-hint { font-size: 12px; color: #A8A49C; margin-top: 6px; line-height: 1.5; }
.profile-phone-muted { background: #F3F2EE !important; color: #B8B4AC !important; border: 1px solid #E8E4DC !important; cursor: default !important; pointer-events: none; }
input.profile-phone-muted { height: 44px; border-radius: 8px; padding: 0 14px; font-size: 14px; width: 100%; -webkit-text-fill-color: #B8B4AC; opacity: 1; }
.crop-modal-mask { position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 300; display: flex; align-items: center; justify-content: center; padding: 20px; }
.crop-modal { background: #fff; border-radius: 14px; padding: 18px; width: 100%; max-width: 320px; }
.crop-modal-title { font-size: 16px; font-weight: 600; color: #1A1814; margin-bottom: 12px; text-align: center; }
.crop-preview-wrap { width: 220px; height: 220px; margin: 0 auto 12px; border-radius: 12px; overflow: hidden; background: #F7F6F2; position: relative; touch-action: none; }
.crop-preview-img { position: absolute; left: 50%; top: 50%; transform-origin: center center; user-select: none; -webkit-user-drag: none; }
.crop-slider-row { display: flex; align-items: center; gap: 10px; margin: 4px auto 10px; width: 220px; }
.crop-slider-row span { font-size: 12px; color: #8A867D; }
.crop-slider { flex: 1; accent-color: #FF6B35; }
.crop-modal-actions { display: flex; flex-direction: row; gap: 10px; }
.crop-modal-actions .btn-secondary { flex: 1; text-align: center; border-radius: 50px; height: 44px; line-height: 44px; background: #F0EDE8; color: #555; font-size: 14px; cursor: pointer; user-select: none; }
.crop-modal-actions .btn-primary { flex: 1; text-align: center; border-radius: 50px; height: 44px; line-height: 44px; background: #FF6B35; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; user-select: none; }
.profile-history-entry { margin-bottom: 10px; background: #fff; border: 1px solid #EAE7DF; border-radius: 10px; padding: 12px 14px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; }
.profile-history-entry .title { font-size: 13px; color:#1A1814; font-weight:600; }
.profile-history-entry .sub { font-size: 11px; color:#A8A49C; margin-top:2px; }
.profile-menu-list { background:#fff; border-radius:12px; border:1px solid #EAE7DF; overflow:hidden; margin-bottom:12px; }
.profile-menu-item { display:flex; align-items:center; padding:14px 16px; cursor:pointer; gap:12px; position:relative; }
.profile-menu-item:not(:last-child)::after { content:''; position:absolute; bottom:0; left:52px; right:0; height:1px; background:#F0EDE6; }
.profile-menu-icon { width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.pmi-orange { background:#FFF1E8; }
.pmi-blue { background:#EEF4FF; }
.pmi-green { background:#EDFAF4; }
.pmi-gray { background:#F5F4F0; }
.profile-menu-body { flex:1; min-width:0; }
.profile-menu-title { display:block; font-size:14px; font-weight:600; color:#1A1814; }
.profile-menu-sub { display:block; font-size:11px; color:#A8A49C; margin-top:1px; }
.profile-menu-arrow { flex-shrink:0; color:#C8C4BB; }
.recent-empty { background: #fff; border-radius: 10px; padding: 24px; display: flex; flex-direction: column; align-items: center; }
.recent-empty-icon { font-size: 32px; margin-bottom: 8px; }
.recent-empty-text { font-size: 13px; color: #A8A49C; margin-bottom: 12px; text-align: center; line-height: 1.6; }
.recent-empty-btn { background: #FF6B35; color: #fff; border-radius: 50px; padding: 8px 20px; font-size: 13px; font-weight: 600; cursor: pointer; user-select: none; }

/* === NICKNAME PROMPT === */
.nickname-prompt { position: fixed; bottom: calc(env(safe-area-inset-bottom,0px) + 70px); left: 50%; transform: translateX(-50%); background: #fff; border-radius: 14px; padding: 14px 16px; width: calc(100% - 32px); max-width: 448px; box-shadow: 0 4px 24px rgba(0,0,0,.18); z-index: 50; }
.nickname-prompt-text { display: block; font-size: 14px; font-weight: 500; color: #1A1814; margin-bottom: 10px; }
.nickname-prompt-row { display: flex; flex-direction: row; align-items: center; }
.nickname-prompt-input { flex: 1; background: #F7F6F2; border: 1px solid #E4E2DA; border-radius: 8px; height: 40px; padding: 0 12px; font-size: 14px; color: #1A1814; margin-right: 8px; }
.nickname-prompt-input::placeholder { color: #C4C0B8; }
.nickname-prompt-confirm { background: #FF6B35; color: #fff; border-radius: 8px; height: 40px; line-height: 40px; padding: 0 16px; font-size: 14px; font-weight: 600; cursor: pointer; user-select: none; flex-shrink: 0; }
.nickname-prompt-skip { text-align: right; font-size: 12px; color: #A8A49C; margin-top: 8px; cursor: pointer; user-select: none; }

/* === HISTORY PAGE === */
.history-tabs { display: flex; background: #fff; border-radius: 10px; padding: 4px; margin-bottom: 12px; gap: 4px; }
.history-tab-btn { flex: 1; text-align: center; height: 34px; line-height: 34px; border-radius: 8px; font-size: 13px; color: #A8A49C; cursor: pointer; user-select: none; }
.history-tab-btn-active { background: #FFF1E8; color: #F97316; font-weight: 600; }
.history-page-card { background: #fff; border-radius: 10px; padding: 14px; margin-bottom: 10px; cursor: pointer; user-select: none; }
.history-page-track { display: block; font-size: 14px; font-weight: 600; color: #1A1814; margin-bottom: 4px; }
.history-page-hook { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; font-size: 13px; color: #555; line-height: 1.5; margin-bottom: 6px; }
.history-page-meta { display: flex; flex-direction: row; align-items: center; justify-content: space-between; }

/* === INSPIRE ENTRY === */
.inspire-entry-card { background: #fff; border-radius: 14px; padding: 18px; margin-bottom: 12px; cursor: pointer; user-select: none; border: 2px solid transparent; }
.inspire-entry-recommended { border-color: #FF6B35; background: #FFF6F3; }
.inspire-entry-badge { display: inline-block; background: #FF6B35; color: #fff; border-radius: 50px; font-size: 11px; font-weight: 600; padding: 3px 10px; margin-bottom: 8px; }
.inspire-entry-title { font-size: 18px; font-weight: 700; color: #1A1814; margin-bottom: 6px; }
.inspire-entry-desc { font-size: 13px; color: #6B6860; line-height: 1.6; }

/* === PATH A · 对标拆解 === */
.video-list-item { background: #fff; border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; cursor: pointer; user-select: none; }
.video-list-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #E4E2DA; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 12px; }
.video-list-check-on { border-color: #FF6B35; background: #FF6B35; color: #fff; }
.video-list-info { flex: 1; min-width: 0; }
.video-list-title { font-size: 13px; font-weight: 600; color: #1A1814; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.video-list-meta { font-size: 11px; color: #A8A49C; margin-top: 3px; }
.video-list-digg { font-size: 11px; color: #F97316; }

/* === PATH B · 行业生成 === */
.clarify-question { background: #fff; border-radius: 10px; padding: 14px; margin-bottom: 12px; }
.clarify-q-text { font-size: 14px; font-weight: 600; color: #1A1814; margin-bottom: 10px; }
.clarify-options { display: flex; flex-direction: row; flex-wrap: wrap; gap: 8px; }
.clarify-option { border: 1.5px solid #E4E2DA; border-radius: 8px; padding: 7px 12px; font-size: 13px; color: #3A3A3A; cursor: pointer; user-select: none; }
.clarify-option-active { border-color: #FF6B35; background: #FFF1E8; color: #FF6B35; font-weight: 600; }

/* === 任务页 === */
.task-card { background: #fff; border-radius: 12px; padding: 14px; margin-bottom: 10px; }
.task-card-clickable { cursor: pointer; }
.task-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.task-type-badge { font-size: 10px; font-weight: 600; border-radius: 4px; padding: 2px 7px; flex-shrink: 0; }
.task-type-a { background: #EEF2FF; color: #4F46E5; }
.task-type-b { background: #ECFDF5; color: #059669; }
.task-type-v { background: #FFF7ED; color: #EA580C; }
.task-card-title { font-size: 14px; font-weight: 600; color: #1A1814; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.task-card-time { font-size: 11px; color: #A8A49C; margin-bottom: 8px; }
.task-status-row { display: flex; align-items: center; gap: 8px; }
.task-status-badge { font-size: 11px; font-weight: 600; border-radius: 50px; padding: 3px 10px; }
.task-status-pending { background: #F3F4F6; color: #6B7280; }
.task-status-running { background: #FFF7ED; color: #EA580C; }
.task-status-done { background: #ECFDF5; color: #059669; }
.task-status-failed { background: #FEF2F2; color: #DC2626; }
.task-thinking { font-size: 12px; color: #6B6860; margin-top: 8px; line-height: 1.5; }
.task-progress-wrap { margin-top: 8px; background: #F0EDE8; border-radius: 50px; height: 4px; overflow: hidden; }
.task-progress-fill { height: 100%; background: #FF6B35; border-radius: 50px; transition: width .5s; }
.task-result-badge { font-size: 12px; color: #059669; margin-left: auto; }

/* === 结果页 === */
.script-result-card { background: #fff; border-radius: 12px; padding: 14px; margin-bottom: 10px; }
.script-hook-badge { display: inline-block; font-size: 10px; font-weight: 600; background: #FFF7ED; color: #EA580C; border-radius: 4px; padding: 2px 8px; margin-bottom: 8px; }
.script-content { font-size: 13.5px; color: #1A1814; line-height: 1.8; white-space: pre-wrap; word-break: break-all; }
.script-actions { display: flex; gap: 8px; margin-top: 10px; justify-content: flex-end; }
.analysis-card { background: #EEF2FF; border-radius: 12px; padding: 14px; margin-bottom: 12px; }
.typewriter-text::after { content: '|'; animation: tw-blink 1s step-end infinite; color: #E8650A; }
@keyframes tw-blink { 50% { opacity: 0; } }
.home-task-card { background:#fff; border-radius:12px; padding:14px; margin-bottom:8px; }
.home-task-card-done { cursor:pointer; display:flex; align-items:center; gap:10px; }
.task-live-dot { display:inline-block; width:7px; height:7px; background:#E8650A; border-radius:50%; margin-right:5px; animation:live-pulse 1.4s ease-in-out infinite; }
@keyframes live-pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }
.path-a-progress-bar { background:#F5F4F0; border-radius:8px; height:8px; overflow:hidden; margin-bottom:16px; }
.path-a-progress-fill { background:#E8650A; height:100%; border-radius:8px; transition:width 0.8s ease; }
.analysis-title { font-size: 12px; font-weight: 600; color: #4F46E5; margin-bottom: 6px; }
.analysis-row { font-size: 12px; color: #374151; line-height: 1.7; }
.history-page-time { font-size: 11px; color: #A8A49C; }
.history-page-count { font-size: 11px; color: #A8A49C; background: #F0EEE8; border-radius: 50px; padding: 2px 7px; }

/* === HOME v1.1 === */
.feature-card-main { background: #fff; border-radius: 12px; padding: 0 16px; height: 72px; display: flex; flex-direction: row; align-items: center; box-shadow: 0 1px 8px rgba(0,0,0,.06); cursor: pointer; user-select: none; margin-bottom: 10px; }
.feature-arrow-orange { font-size: 26px; color: #F97316; margin-left: 4px; font-weight: 400; }
.feature-row-light { display: flex; flex-direction: row; align-items: center; height: 44px; padding: 0 4px; cursor: pointer; user-select: none; margin-bottom: 12px; }
.feature-row-icon { font-size: 17px; margin-right: 8px; }
.feature-row-title { font-size: 14px; font-weight: 500; color: #555; margin-right: 6px; }
.feature-row-desc { font-size: 12px; color: #A8A49C; flex: 1; }
.feature-row-arrow { font-size: 16px; color: #CCCCCC; }
.recent-empty-line { height: 48px; display: flex; align-items: center; font-size: 13px; color: #A8A49C; }
.recent-empty-line a { color: #F97316; cursor: pointer; user-select: none; text-decoration: none; }
.hot-tags-section { margin-bottom: 14px; }
.hot-tags-scroll { display: flex; flex-direction: row; overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 0 -16px; padding: 0 16px 4px; }
.hot-tag-chip { flex-shrink: 0; background: #fff; border: 1px solid #E4E2DA; border-radius: 50px; padding: 7px 16px; font-size: 13px; color: #555; margin-right: 8px; cursor: pointer; user-select: none; white-space: nowrap; }

/* === EXTRACT v2 === */
.platform-tabs { display: flex; flex-direction: row; background: #fff; border-radius: 10px; padding: 6px; margin-bottom: 12px; gap: 6px; }
.platform-tab { flex: 1; text-align: center; height: 36px; line-height: 36px; border-radius: 8px; font-size: 13px; color: #A8A49C; cursor: pointer; user-select: none; position: relative; }
.platform-tab-active { background: #FFF1E8; color: #F97316; font-weight: 600; }
.platform-tab-disabled { pointer-events: none; }
.coming-soon-badge { position: absolute; top: 4px; right: 4px; background: #E4E2DA; color: #A8A49C; font-size: 9px; border-radius: 50px; padding: 1px 5px; line-height: 1.4; }
.url-input-wrap { position: relative; margin-bottom: 12px; }
.url-textarea-v2 { background: #F7F6F2; border: 1.5px solid #E4E2DA; border-radius: 12px; padding: 14px; font-size: 14px; color: #1A1814; width: 100%; height: 108px; line-height: 1.6; resize: none; display: block; transition: border-color .2s; }
.url-textarea-v2::placeholder { color: #C4C0B8; }
.url-textarea-v2:focus { border-color: #F97316; outline: none; }
.paste-btn { position: absolute; bottom: 10px; right: 10px; background: #F97316; color: #fff; border-radius: 6px; padding: 5px 12px; font-size: 12px; font-weight: 600; cursor: pointer; user-select: none; }
.tip-toggle { display: flex; flex-direction: row; align-items: center; padding: 2px 0 8px; cursor: pointer; user-select: none; }
.tip-toggle-text { font-size: 13px; color: #A8A49C; flex: 1; }
.tip-toggle-icon { font-size: 12px; color: #A8A49C; transition: transform .2s; }
.tip-toggle-icon.open { transform: rotate(180deg); }
.tip-card-v2 { background: #fff; border-radius: 10px; padding: 14px 16px; border-left: 3px solid #F97316; margin-bottom: 12px; }
.extract-hist-item { background: #fff; border-radius: 8px; padding: 10px 14px; margin-bottom: 8px; display: flex; flex-direction: row; align-items: center; cursor: pointer; user-select: none; }
.extract-hist-url { flex: 1; font-size: 13px; color: #555; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-right: 8px; }
.extract-hist-time { font-size: 11px; color: #A8A49C; flex-shrink: 0; }
.result-scroll-area { max-height: 45vh; overflow-y: auto; -webkit-overflow-scrolling: touch; margin-bottom: 10px; }
.result-action-bottom { display: flex; flex-direction: row; align-items: center; justify-content: flex-end; padding-top: 10px; border-top: 1px solid #F0EEE8; }
.style-selector { background: #fff; border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; }
.style-selector-label { display: block; font-size: 12px; color: #A8A49C; margin-bottom: 8px; }

<body>
<div id="app"></div>
<script>
// ===== CONFIG =====
const API_BASE = (location.protocol === 'http:' || location.protocol === 'https:') ? `${location.origin}/api` : 'http://106.14.151.37/api';

// ===== STORAGE =====
function getToken() { return localStorage.getItem('wf_token') || ''; }
function setToken(t) { localStorage.setItem('wf_token', t); }
function clearAuth() { localStorage.removeItem('wf_token'); localStorage.removeItem('wf_user'); }
function getUser() { try { return JSON.parse(localStorage.getItem('wf_user') || 'null'); } catch { return null; } }
function userHomeKey(base) { const uid = (S.userInfo && S.userInfo.id) || (getUser() && getUser().id); return uid ? base + '_' + uid : base; }
function setUser(u) { localStorage.setItem('wf_user', JSON.stringify(u)); }

// ===== API =====
async function apiFetch(method, path, data, signal) {
  const token = getToken();
  const opts = { method, headers: { 'Content-Type': 'application/json', ...(token ? { 'Authorization': `Bearer ${token}` } : {}) } };
  if (data) opts.body = JSON.stringify(data);
  if (signal) opts.signal = signal;
  const res = await fetch(API_BASE + path, opts);
  const raw = await res.text();
  if (!raw.trim()) {
    return { code: res.status || 500, msg: res.status >= 500 ? '服务器无响应内容，请稍后重试' : '请求失败' };
  }
  try {
    const j = JSON.parse(raw);
    if (j && typeof j.msg === 'string' && j.msg.length > 200) j.msg = j.msg.slice(0, 200) + '…';
    return j;
  } catch {
    return { code: res.status || 500, msg: `服务器返回非 JSON（${res.status}），请检查网关或部署日志` };
  }
}
const api = {
  get: (path, signal) => apiFetch('GET', path, null, signal),
  post: (path, data, signal) => apiFetch('POST', path, data, signal),
  put: (path, data) => apiFetch('PUT', path, data),
  del: (path) => apiFetch('DELETE', path),
};

// ===== STATE =====
const S = {
  currentTab: 'home',
  showAuthSheet: false,
  isRegMode: false, phone: '', password: '', authErr: '', loading: false,
  authMode: 'sms',       // 'sms' | 'pwd'

// ===== UTILS =====
async function deleteCloneHistoryItem(e, histId) {
  e.stopPropagation();
  if (!confirm('确定删除这条记录吗？')) return;
  try {
    const r = await api.del('/history/' + histId);
    if (r.code === 200) {
      S.cloneHistory = S.cloneHistory.filter(it => it.id !== histId);
      render();
      showToast('已删除');
    } else { showToast(r.msg || '删除失败'); }
  } catch { showToast('删除失败'); }
}
async function deleteTask(e, taskId) {
  e.stopPropagation();
  if (!confirm('确定删除这条任务记录吗？')) return;
  try {
    const r = await api.del(`/tasks/${taskId}`);
    if (r.code === 200) {
      setState({ tasksList: S.tasksList.filter(t => t.id !== taskId) });
      showToast('已删除');
    } else {
      showToast(r.msg || '删除失败');
    }
  } catch { showToast('删除失败'); }
}

function friendlyError(msg) {
  if (!msg) return '任务处理失败，请稍后重试';
  if (msg.includes('524') || msg.includes('timeout occurred') || /timed?\s*out/i.test(msg))
    return 'AI 服务响应超时，可能当前请求量较大，请稍后重试';
  if (msg.includes('<!DOCTYPE') || msg.includes('<html') || msg.includes('Cloudflare') || msg.includes('cloudflare'))
    return 'AI 服务暂时不可用，请稍后重试';
  if (/未配置|未启动|not configured/i.test(msg) && /asr|语音/i.test(msg))
    return '语音识别服务未配置，请联系管理员在后台填写 ASR 服务地址';
  // 中转站不支持 whisper-1
  if (/model_not_found|No available channel.*whisper/i.test(msg))
    return '语音转写失败：当前 AI 中转站不支持 whisper-1 模型，请在后台配置本地 ASR 服务地址';
  // 本地ASR返回错误，附上状态码
  if (/本地ASR返回错误/i.test(msg)) return msg;
  if (/asr|transcri|语音|whisper/i.test(msg))
    return '语音识别服务连接失败，请检查 ASR 服务是否正常运行';
  if (/tikhub|tik\s*hub|视频解析|视频下载|视频信息/i.test(msg))
    return '视频解析失败，请检查链接是否有效后重试';
  if (/ai\s*(接口|调用|错误|失败)|callai|openai|zhipu|api.*error/i.test(msg))
    return 'AI 服务暂时出现问题，请稍后重试';
  if (msg.includes('ASR 服务未配置') || msg.includes('TikHub API Key 未配置'))
    return '服务配置不完整，请联系管理员';
  if (msg.length > 80) return '服务暂时出现问题，请稍后重试';
  return msg;
}


function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function showToast(msg) {
  const old = document.querySelector('.toast');
  if (old) old.remove();
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}
function copyText(text) {
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).catch(() => fbCopy(text));
  } else { fbCopy(text); }
}
function fbCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.cssText = 'position:fixed;opacity:0';
  document.body.appendChild(ta); ta.select();
  document.execCommand('copy'); ta.remove();
}

function formatDisplayTime(iso) {
  if (iso == null || iso === '') return '';
  const d = new Date(iso);
  if (Number.isNaN(d.getTime())) return String(iso).replace('T', ' ').slice(0, 16);
  const p = (n) => (n < 10 ? '0' : '') + n;
  return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}

function maskPhone(phone) {
  const s = String(phone || '');
  if (s.length < 7) return s;
  return s.slice(0, 3) + '****' + s.slice(-4);
}

// ===== RENDER ENGINE =====
function setState(updates) {
  const focusId = document.activeElement && document.activeElement.id;
  const focusSel = [document.activeElement && document.activeElement.selectionStart,
                    document.activeElement && document.activeElement.selectionEnd];
  Object.assign(S, updates);
  render();
  if (focusId) {
    const el = document.getElementById(focusId);
    if (el) { el.focus(); try { el.setSelectionRange(focusSel[0], focusSel[1]); } catch { try { el.setSelectionRange(el.value.length, el.value.length); } catch {} } }
  }
}
function render() {
  document.getElementById('app').innerHTML = tMain();
}

function openAuthSheet() { setState({ showAuthSheet: true, authErr: '' }); }
function closeAuthSheet() { setState({ showAuthSheet: false, authErr: '', loading: false }); }

/** 需要登录的操作入口：未登录则弹出底部登录层 */
function ensureLoggedIn() {
  if (getToken()) return true;
  openAuthSheet();
  showToast('请先登录');
  return false;
}

function apiUnauthorized(r) {
  if (r && r.code === 401) {
    const had = !!getToken();
    clearAuth();
    setState({ userInfo: null, userName: '创作者', userPhone: '', userAvatar: 0, recentHistory: [], recentHistoryLoaded: false, inspireHistory: [], historyLoaded: false, homeDoneSeenIds: [], dismissedFromHomeIds: [] });
    if (had) { openAuthSheet(); showToast('登录已过期，请重新登录'); }
    return true;
  }
  return false;
}

// ===== 克隆流程步骤条 =====
function cloneCurrentStep() {
  const s = S.extractStep;
  if (s === 'cloning' || s === 'review') return 1;
  if (s === 'rewriting' || s === 2) return 2;
  if (s === 3 || s === 'tts_gen') return 3;
  if (s === 4 || s === 'avatar_gen') return 4;
  if (s === 5) return 5;
  if (s === 6) return 6;
  return 0;
}

function tCloneStepBar() {
  const cur = cloneCurrentStep();
  if (cur === 0) return '';
  const steps = ['提取','改写','语音','数字人','后期','发布'];
  const targets = ['review', 2, 3, 4, 5, 6];
  const CHECK = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>`;
  let parts = [];
  steps.forEach((label, i) => {
    const n = i + 1;
    const done = n < cur, active = n === cur;
    const nc = done ? 'csb-node csb-node-done' : (active ? 'csb-node csb-node-active' : 'csb-node csb-node-idle');
    const lc = done ? 'csb-lbl csb-lbl-done' : (active ? 'csb-lbl csb-lbl-active' : 'csb-lbl csb-lbl-idle');
    const inner = done ? CHECK : n;
    const target = JSON.stringify(targets[i]);
    parts.push(`<div class="csb-step" onclick="setState({extractStep:${target}})"><div class="${nc}">${inner}</div><div class="${lc}">${label}</div></div>`);
    if (n < 6) parts.push(`<div class="csb-line ${done ? 'csb-line-done' : 'csb-line-idle'}"></div>`);
  });
  return `<div class="clone-step-bar"><div class="clone-step-bar-inner">${parts.join('')}</div></div>`;
}

// ===== EXTRACT =====
function tExtract() {
  const sb = tCloneStepBar();

  // 路由到步骤3-6
  if (S.extractStep === 3 || S.extractStep === 'tts_gen') return tCloneStep3(sb);
  if (S.extractStep === 4 || S.extractStep === 'avatar_gen') return tCloneStep4(sb);
  if (S.extractStep === 5) return tCloneStep5(sb);
  if (S.extractStep === 6) return tCloneStep6(sb);

  // 正在提取文案（进度条）
  if (S.extractStep === 'cloning') {
    const task = S.cloneTaskData;
    const progress = task?.progress || 0;
    const thinking = task?.thinking || '正在初始化...';
    return `${sb}<div class="tab-page">
      <div class="input-card" style="text-align:center;padding:32px 20px">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#6366F1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:14px"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 10a7 7 0 0014 0M12 19v3M8 22h8"/></svg>
        <div style="font-size:15px;font-weight:600;color:#1A1814;margin-bottom:6px">正在提取文案</div>
        <div style="font-size:12px;color:#A8A49C;margin-bottom:16px">预计需要 1~2 分钟，请稍候</div>
        <div class="path-a-progress-bar" style="margin-bottom:10px"><div class="path-a-progress-fill" style="width:${progress}%"></div></div>
        <div style="font-size:13px;color:#6B6860;min-height:20px">${esc(thinking)}</div>
      </div>
      <div class="btn-action-sec" style="margin-top:8px" onclick="resetExtract()">取消</div>
    </div>`;
  }

  // 提取完成，用户查看并决定是否改写
  if (S.extractStep === 'review') {
    return `${sb}<div class="tab-page">

function tInspireAnalyze() {
  if (S.pathAState === 'started') {
    const task = S.pathATaskData;
    const isDone = task?.status === 'done';
    const isFailed = task?.status === 'failed';
    const progress = task?.progress || 0;
    const thinking = task?.thinking || (task ? 'AI 正在准备中...' : '任务已提交，等待处理...');

    let body = '';
    if (isDone) {
      let result = {};
      try {
        result = typeof task.result === 'string' ? JSON.parse(task.result) : (task.result || {});
      } catch {}
      const { analysis = {}, scripts = [], author = {} } = result;
      body = `
        <div style="font-size:15px;font-weight:700;color:#1A1814;margin-bottom:12px;display:flex;align-items:center;gap:6px"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#10B981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:block"><polyline points="20 6 9 17 4 12"/></svg> 拆解完成</div>
        ${analysis.account_positioning ? `<div class="analysis-card">
          <div class="analysis-title">对标账号分析</div>
          ${analysis.account_positioning?`<div class="analysis-row">定位：${esc(analysis.account_positioning)}</div>`:''}
          ${analysis.target_audience?`<div class="analysis-row">受众：${esc(analysis.target_audience)}</div>`:''}
          ${analysis.tone?`<div class="analysis-row">风格：${esc(analysis.tone)}</div>`:''}
          ${Array.isArray(analysis.content_patterns)&&analysis.content_patterns.length?`<div class="analysis-row">规律：${analysis.content_patterns.map(s=>esc(s)).join('、')}</div>`:''}
        </div>` : ''}
        <div style="font-size:14px;font-weight:700;color:#1A1814;margin-bottom:10px">生成文案（${scripts.length}条）</div>
        ${scripts.map((s,i)=>`<div class="script-result-card">
          <div class="script-hook-badge">${esc(s.hook_type||'文案')}</div>
          <div class="script-content">${esc(s.content)}</div>
          <div class="script-actions">
            <button class="btn-copy-small" onclick="cpPathAInlineScript(${i})">复制</button>
          </div>
        </div>`).join('')}`;
    } else if (isFailed) {
      body = `<div style="text-align:center;padding:24px 0">
        <div style="font-size:36px;margin-bottom:12px">😞</div>
        <div style="font-size:14px;font-weight:600;color:#DC2626;margin-bottom:8px">处理失败</div>
        <div style="font-size:12px;color:#6B6860;margin-bottom:6px">${esc(friendlyError(task.error_msg))}</div>
        ${task.error_msg?`<div style="font-size:10px;color:#B4B2A9;margin-bottom:16px;word-break:break-all">原始错误：${esc(task.error_msg)}</div>`:''}
        <div class="btn-primary" style="display:inline-block;padding:0 24px" onclick="setState({pathAState:'input',pathATaskData:null});render()">重新输入</div>
      </div>`;
    } else {
      body = `<div style="padding:8px 0">
        <div style="font-size:14px;font-weight:600;color:#1A1814;margin-bottom:14px">${esc(task?.title||'AI 拆解任务')}</div>
        <div class="path-a-progress-bar"><div class="path-a-progress-fill" style="width:${progress}%"></div></div>
        <div style="font-size:13px;color:#6B6860;line-height:1.7;min-height:44px">
          <span class="typewriter-text">${esc(thinking)}</span>
        </div>
        <div style="font-size:11px;color:#A8A49C;margin-top:20px;text-align:center">
          通常需要 1-3 分钟，可以先去做别的事 · <span style="text-decoration:underline;cursor:pointer;color:#E8650A" onclick="openHistoryPage()">去任务中心</span>
        </div>
      </div>`;
    }

    return `<div class="tab-page">${body}</div>`;
  }

  if (S.pathAState === 'videos' && S.pathAProfile) {
    const profile = S.pathAProfile;
    const selected = S.pathASelectedIds;
    return `<div class="tab-page">
      <div style="font-size:13px;font-weight:600;color:#1A1814;margin-bottom:4px">@${esc(profile.author.nickname)} 的近期视频</div>
      <div style="font-size:11px;color:#A8A49C;margin-bottom:12px">选择 1-3 条，AI 将拆解其内容套路</div>
      ${profile.videos.map(v=>{
        const on = selected.includes(v.aweme_id);
        const digg = v.stats.digg >= 10000 ? (v.stats.digg/10000).toFixed(1)+'w' : String(v.stats.digg);
        return `<div class="video-list-item" onclick="pathAToggleVideo('${esc(v.aweme_id)}')">
          <div class="video-list-check ${on?'video-list-check-on':''}">
            ${on?'✓':''}
          </div>
          <div class="video-list-info">
            <div class="video-list-title">${esc(v.title)}</div>
            <div class="video-list-meta">${v.duration_sec}秒 · <span class="video-list-digg">❤️ ${digg}</span></div>
          </div>
        </div>`;
      }).join('')}
      <div style="margin-top:4px">
        <span class="section-label">店铺名称（选填，用于文案中自然提及）</span>
        <input class="field-input" placeholder="如：老王二手车" value="${esc(S.pathABrandName||S.userInfo?.brand_name||'')}" oninput="S.pathABrandName=this.value"/>
      </div>
      ${S.pathAErr?`<div class="err-text" style="margin-top:8px">${esc(S.pathAErr)}</div>`:''}
      <div class="btn-primary ${S.pathALoading||selected.length===0?'btn-disabled':''}" style="margin-top:14px"
           onclick="pathAStartAnalyze()">
        ${S.pathALoading?'⏳ 创建任务中...':'开始拆解（已选'+selected.length+'条）'}
      </div>
    </div>`;
  }

  // 默认：链接输入
  return `<div class="tab-page">
    <div class="section-card">
      <span class="section-label">粘贴对标主页或视频链接</span>
      <textarea class="field-input" id="f-path-a-text" rows="3"
        style="height:auto;padding:10px 14px;resize:none;line-height:1.6"
        placeholder="粘贴抖音分享文本或链接，支持主页、单视频"
        oninput="S.pathAText=this.value;render()">${esc(S.pathAText)}</textarea>
      <div style="font-size:11px;color:#A8A49C;margin-top:6px">支持：抖音主页链接 / 单条视频链接 / 分享文本</div>
    </div>
    ${S.pathAErr?`<div class="err-text">${esc(S.pathAErr)}</div>`:''}
    <div class="btn-primary ${S.pathALoading?'btn-disabled':''}" onclick="pathAResolve()">
      ${S.pathALoading?'⏳ 解析中...':'解析并开始'}
    </div>
  </div>`;
}

          <div class="clarify-options">

              return `<div class="clarify-option ${on?'clarify-option-active':''}" onclick="pathBSelectAnswer('${esc(q.id)}','${esc(opt)}','${q.type||'single'}')">${esc(opt)}</div>`;

        `).join('')}
      </div>
    </div>
    <div class="section-card">
      <span class="section-label">或自定义赛道</span>
      <input class="field-input" placeholder="如：二手车、烘焙店..." value="${esc(S.pathBCustom)}"
        oninput="S.pathBCustom=this.value;S.pathBIndustryId=null;S.pathBIndustryName='';render()"/>

      <input class="field-input" placeholder="如：老王二手车" value="${esc(S.pathBBrandName||S.userInfo?.brand_name||'')}"
        oninput="S.pathBBrandName=this.value"/>

      <div style="display:flex;flex-direction:column;align-items:center;margin-bottom:8px">
        <div class="avatar-lg avatar-type-${S.userAvatar}" style="width:72px;height:72px">
          ${hasImg ? `<img class="avatar-lg-img" src="${esc(u.avatar_image)}" alt=""/>` : `<span class="avatar-lg-text">${emoji}</span>`}
        </div>
        <input type="file" id="f-avatar-file" accept="image/jpeg,image/png,image/webp" style="display:none" onchange="onAvatarFile(event)"/>
        <div class="btn-secondary" style="margin-top:10px;padding:0 16px;border-radius:999px;font-size:13px;text-align:center;display:inline-flex;align-items:center;justify-content:center;height:34px;line-height:34px;min-width:128px" onclick="document.getElementById('f-avatar-file').click()">上传本地图片</div>
      </div>
      <span class="profile-section-title" style="margin-top:4px">预设头像</span>
      <div class="avatar-options" style="justify-content:flex-start;flex-wrap:wrap;gap:10px">
        ${[0,1,2,3].map(i=>`
          <div class="avatar-option ${S.userAvatar===i && !hasImg ? 'avatar-option-active' : ''}" onclick="selectAvatar(${i})">
            <div class="avatar-opt-circle avatar-opt-${i}"><svg width="22" height="22" viewBox="0 0 24 24" fill="rgba(255,255,255,0.9)"><path d="M12 12a5 5 0 100-10 5 5 0 000 10z"/><path d="M4 20c0-2.67 5.33-4 8-4s8 1.33 8 4v1H4v-1z"/></svg></div>
          </div>`).join('')}
      </div>
    </div>
    <div class="profile-section">
      <span class="profile-field-label">昵称</span>
      <input class="field-input" id="f-profile-nick" placeholder="2–20 个字" maxlength="20"
        value="${esc(S.nicknameEditInput)}" oninput="S.nicknameEditInput=this.value"/>
    </div>
    <div class="profile-section">
      <span class="profile-field-label">手机号</span>
      <input type="text" class="field-input profile-phone-muted" readonly tabindex="-1" aria-readonly="true"
        value="${esc(u && u.phone && !String(u.phone).startsWith('wx_') ? '+86 ' + maskPhone(u.phone) : (u && u.phone ? u.phone : '—'))}" />
      <p class="profile-field-hint">手机号不可修改。换绑请联系管理员或客服。</p>
    </div>
    <div class="profile-section">
      <span class="profile-field-label">默认店铺名称（选填）</span>
      <input class="field-input" id="f-profile-brand" placeholder="如：老王二手车" maxlength="50"
        value="${esc(S.userInfo&&S.userInfo.brand_name||'')}" oninput="if(S.userInfo)S.userInfo.brand_name=this.value"/>
      <p class="profile-field-hint">生成文案时自动预填，无需每次重复输入</p>
    </div>
    <div class="btn-primary" style="margin-top:4px" onclick="saveProfileEdit()">保存资料</div>
  </div>`;
}

function tSetPasswordSheet() {
  const hasPwd = S.userInfo?.has_password;
  const phone = S.userInfo?.phone || '';
  const maskedPhone = phone && !phone.startsWith('wx_') ? maskPhone(phone) : '';
  const close = "setState({showSetPwdSheet:false,pwdSmsCode:'',pwdSmsSent:false,pwdSmsCountdown:0,pwdErr:'',pwdNew:'',pwdNew2:''});render()";
  return `<div class="auth-sheet-mask" onclick="${close}">
    <div class="auth-sheet" onclick="event.stopPropagation()">
      <div class="auth-sheet-handle" onclick="${close}"></div>
      <div class="auth-sheet-head">
        <span class="auth-sheet-title">${hasPwd?'修改密码':'设置密码'}</span>
        <span class="auth-sheet-close" onclick="${close}">✕</span>
      </div>
      <div class="auth-sheet-scroll" style="padding-bottom:32px">
        ${hasPwd?`
        <div style="font-size:13px;color:#6B6860;margin-bottom:14px">将向 <span style="color:#1A1814;font-weight:600">+86 ${esc(maskedPhone)}</span> 发送验证码以确认身份</div>
        <div class="field-group">
          <span class="field-label">验证码</span>
          <div class="input-wrap">
            <input class="lf-input" type="number" maxlength="6" placeholder="6位验证码"
              value="${esc(S.pwdSmsCode)}" oninput="S.pwdSmsCode=this.value" style="flex:1;padding-left:14px"/>
            <div class="sms-send-btn ${S.pwdSmsCountdown>0||S.pwdLoading?'sms-send-disabled':''}" onclick="handleSendPwdSms()">
              ${S.pwdSmsCountdown>0?`${S.pwdSmsCountdown}s后重发`:S.pwdSmsSent?'重新发送':'获取验证码'}
            </div>
          </div>
        </div>`:''}
        <div class="field-group">
          <span class="field-label">新密码</span>
          <input class="lf-input" type="password" placeholder="至少6位"
            value="${esc(S.pwdNew)}" oninput="S.pwdNew=this.value"/>
        </div>
        <div class="field-group">
          <span class="field-label">确认新密码</span>
          <input class="lf-input" type="password" placeholder="再次输入新密码"
            value="${esc(S.pwdNew2)}" oninput="S.pwdNew2=this.value" onkeydown="if(event.key==='Enter')handleSetPassword()"/>
        </div>
        ${S.pwdErr?`<span class="err-msg">${esc(S.pwdErr)}</span>`:''}
        <div class="submit-btn ${S.pwdLoading?'submit-disabled':''}" style="margin-top:4px" onclick="handleSetPassword()">
          ${S.pwdLoading?'请稍候...':(hasPwd?'确认修改':'设置密码')}
        </div>
      </div>
    </div>
  </div>`;
}

function tAvatarCropModal() {
  const percent = Number(S.avatarCropScale || 100);
  const userScale = Math.max(0.2, percent / 100);
  const meta = S.avatarCropMeta || { width: 220, height: 220 };
  const previewSize = 220;
  const base = Math.max(previewSize / meta.width, previewSize / meta.height);
  const sc = base * userScale;
  const tx = Number(S.avatarCropX || 0);
  const ty = Number(S.avatarCropY || 0);
  return `<div class="crop-modal-mask" onclick="if(event.target===event.currentTarget)cancelAvatarCrop()">
    <div class="crop-modal" onclick="event.stopPropagation()">
      <div class="crop-modal-title">头像预览</div>
      <div class="crop-preview-wrap"
        onpointerdown="startAvatarDrag(event)"
        onpointermove="moveAvatarDrag(event)"
        onpointerup="endAvatarDrag(event)"
        onpointercancel="endAvatarDrag(event)"
        onpointerleave="endAvatarDrag(event)">
        <img class="crop-preview-img" src="${esc(S.avatarCropDataUrl)}" alt="" draggable="false"
          style="transform:translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(${sc});"/>
      </div>
      <div class="crop-slider-row">
        <span>缩小</span>
        <input class="crop-slider" type="range" min="20" max="220" step="1" value="${Math.round(percent)}" oninput="setAvatarCropScale(this.value)" />
        <span>${Math.round(percent)}%</span>
      </div>
      <p class="profile-field-hint" style="text-align:center;margin-bottom:12px">默认填满裁剪框（100%），可拖拽与缩放，裁剪比例固定 1:1</p>
      <div class="crop-modal-actions">
        <div class="btn-secondary" onclick="cancelAvatarCrop()">重选</div>
        <div class="btn-primary" onclick="confirmAvatarCrop()">确认使用</div>
      </div>
    </div>
  </div>`;
}

// ===== LOGIN HANDLERS =====
function setLoginMode() { setState({ isRegMode: false, authErr: '' }); }
function setRegMode()   { setState({ isRegMode: true,  authErr: '' }); }
function setAuthMode(mode) { setState({ authMode: mode, authErr: '', smsCode: '', smsSent: false }); }

let smsCountdownTimer = null;
let pwdSmsCountdownTimer = null;
function startPwdSmsCountdown() {
  setState({ pwdSmsCountdown: 60 });
  if (pwdSmsCountdownTimer) clearInterval(pwdSmsCountdownTimer);
  pwdSmsCountdownTimer = setInterval(() => {
    const next = S.pwdSmsCountdown - 1;
    if (next <= 0) { clearInterval(pwdSmsCountdownTimer); pwdSmsCountdownTimer = null; setState({ pwdSmsCountdown: 0 }); }
    else setState({ pwdSmsCountdown: next });
  }, 1000);
}
async function handleSendPwdSms() {
  if (S.pwdSmsCountdown > 0 || S.pwdLoading) return;
  const phone = S.userInfo?.phone;
  if (!phone) return;
  setState({ pwdLoading: true, pwdErr: '' });
  try {
    const r = await api.post('/auth/send-sms', { phone });
    setState({ pwdLoading: false });
    if (r.code === 200) { setState({ pwdSmsSent: true }); startPwdSmsCountdown(); showToast('验证码已发送'); }
    else setState({ pwdErr: r.msg || '发送失败，请重试' });
  } catch { setState({ pwdLoading: false, pwdErr: '网络错误，请重试' }); }
}
function startSmsCountdown() {
  setState({ smsCountdown: 60 });
  if (smsCountdownTimer) clearInterval(smsCountdownTimer);
  smsCountdownTimer = setInterval(() => {
    const next = S.smsCountdown - 1;
    if (next <= 0) { clearInterval(smsCountdownTimer); smsCountdownTimer = null; setState({ smsCountdown: 0 }); }
    else setState({ smsCountdown: next });
  }, 1000);
}

async function handleSendSms() {
  if (S.smsCountdown > 0 || S.loading) return;
  const phone = S.phone.trim();
  if (!phone) { setState({ authErr: '请输入手机号' }); return; }
  if (!/^1[3-9]\d{9}$/.test(phone)) { setState({ authErr: '手机号格式不正确' }); return; }
  setState({ loading: true, authErr: '' });
  try {
    const r = await api.post('/auth/send-sms', { phone });
    setState({ loading: false });
    if (r.code === 200) { setState({ smsSent: true }); startSmsCountdown(); showToast('验证码已发送'); }
    else setState({ authErr: r.msg || '发送失败，请重试' });
  } catch { setState({ loading: false, authErr: '网络错误，请重试' }); }
}

async function handleSmsLogin() {
  const phone = S.phone.trim(), code = (document.getElementById('smsCodeInput')?.value || S.smsCode).trim();
  if (!phone) { setState({ authErr: '请输入手机号' }); return; }
  if (!code)  { setState({ authErr: '请输入验证码' }); return; }
  setState({ loading: true, authErr: '' });
  try {
    const r = await api.post('/auth/sms-login', { phone, code });
    if (r.code === 200) {
      setToken(r.data.token);
      setState({ loading: false, showAuthSheet: false, smsCode: '', smsSent: false, smsCountdown: 0, authErr: '', phone: '' });
      if (smsCountdownTimer) { clearInterval(smsCountdownTimer); smsCountdownTimer = null; }
      await fetchMe();
      loadTasks();
      showToast(r.data.isNew ? '注册成功，欢迎使用' : '登录成功');
    } else { setState({ loading: false, authErr: r.msg || '验证失败，请重试' }); }
  } catch { setState({ loading: false, authErr: '网络错误，请重试' }); }
}

async function handleSetPassword() {
  const { pwdSmsCode, pwdNew, pwdNew2 } = S;
  if (!pwdNew || pwdNew.length < 6) { setState({ pwdErr: '新密码至少6位' }); return; }
  if (pwdNew !== pwdNew2) { setState({ pwdErr: '两次输入的密码不一致' }); return; }
  if (S.userInfo?.has_password && !pwdSmsCode.trim()) { setState({ pwdErr: '请先获取并输入验证码' }); return; }
  setState({ pwdLoading: true, pwdErr: '' });
  try {
    const body = { new_password: pwdNew };
    if (S.userInfo?.has_password) body.sms_code = pwdSmsCode.trim();
    const r = await api.post('/auth/set-password', body);
    if (r.code === 200) {
      if (S.userInfo) setState({ userInfo: { ...S.userInfo, has_password: true } });
      setState({ pwdLoading: false, pwdNew: '', pwdNew2: '', pwdSmsCode: '', pwdSmsSent: false, pwdSmsCountdown: 0 });
      showToast('密码设置成功');
      setTimeout(() => setState({ showSetPwdSheet: false }), 800);
    } else { setState({ pwdLoading: false, pwdErr: r.msg || '操作失败' }); }
  } catch { setState({ pwdLoading: false, pwdErr: '网络错误，请重试' }); }
}

async function handleAuth() {
  if (S.loading) return;
  const phone = S.phone.trim(), pwd = S.password;
  if (!phone || !pwd)             { setState({ authErr: '请输入手机号和密码' }); return; }
  if (!/^1[3-9]\d{9}$/.test(phone)) { setState({ authErr: '手机号格式不正确' }); return; }
  if (pwd.length < 6)             { setState({ authErr: '密码至少6位' }); return; }
  setState({ loading: true, authErr: '' });
  try {
    const r = await api.post(S.isRegMode ? '/auth/register' : '/auth/login', { phone, password: pwd });
    if (r.code === 200) {
      setToken(r.data.token); setUser(r.data.user);
      showToast(S.isRegMode ? '注册成功' : '登录成功');
      if (S.showAuthSheet) {
        // 来自底部浮层登录
        setState({
          showAuthSheet: false,
          loading: false,
          authErr: '',
          userName: r.data.user.nickname || '创作者',
          userPhone: r.data.user.phone || '',
          userAvatar: r.data.user.avatar || 0,
        });
        fetchMe(); loadIndustries();
      } else {
        setTimeout(() => {
          Object.assign(S, {
            showAuthSheet: false, loading: false,
            userName: r.data.user.nickname || '创作者',
            userPhone: r.data.user.phone || '',
            userAvatar: r.data.user.avatar || 0,
          });
          render(); fetchMe(); loadIndustries();
        }, 600);
      }
    } else {
      setState({ authErr: r.msg || '操作失败，请重试', loading: false });
    }
  } catch { setState({ authErr: '网络错误，请稍后重试', loading: false }); }
}

// ===== NAV =====
function switchTab(tab) {
  const resetProfile = tab !== 'profile';
  setState({
    prevTab: S.currentTab,
    currentTab: tab,
    nicknamePrompt: false,
    ...(resetProfile ? { profileView: 'main', avatarCropOpen: false, avatarCropDataUrl: '' } : {}),
  });
  if (tab === 'profile') fetchMe();
  if (tab === 'vip') loadMemberPlans();
  if (tab === 'home') {
    dismissHomeDoneSeen();
    if (!S.cloneHistoryLoaded) loadCloneHistory(); else render();
    loadTasks();
  }
  if (tab === 'history') {
    if (!S.cloneHistoryLoaded) loadCloneHistory();
    loadTasks();
  }
  if (tab === 'extract' && !S.extractHistoryLoaded) loadExtractHistory();
}
function goBack() {
  if (S.currentTab === 'history') {
    setState({ currentTab: 'home', historyPageExpanded: null });
  } else {
    setState({ currentTab: 'home' });
  }
  dismissHomeDoneSeen();
  if (!S.cloneHistoryLoaded) loadCloneHistory();
  loadTasks();
}

async function handleExtract() {
  if (!ensureLoggedIn()) return;
  if (!S.videoUrl.trim() || S.extractLoading) return;
  setState({ extractLoading: true, extractErr: '' });
  try {
    const r = await api.post('/video/clone-start', { url: S.videoUrl.trim() });
    if (apiUnauthorized(r)) { setState({ extractLoading: false }); return; }
    if (r.code === 200) {
      setState({ extractLoading: false, cloneTaskId: r.data.taskId, cloneTaskData: null, extractStep: 'cloning' });
      startClonePoller(r.data.taskId);
    } else {
      setState({ extractErr: r.msg || '提交失败，请重试', extractLoading: false });
    }
  } catch {
    setState({ extractErr: '网络错误，请重试', extractLoading: false });
  }
}

function startClonePoller(taskId) {
  if (clonePollerTimer) clearInterval(clonePollerTimer);
  clonePollerTimer = setInterval(async () => {
    if (S.currentTab !== 'extract') return;
    try {
      const r = await api.get(`/tasks/${taskId}`);
      if (r.code !== 200) return;
      const task = r.data;
      setState({ cloneTaskData: task });
      if (task.status === 'extracted') {
        stopClonePoller();
        setState({ extractStep: 'review', extractedScript: task.result?.transcript || '' });
      } else if (task.status === 'done') {
        stopClonePoller();
        const rewritten = task.result?.rewritten || task.result?.scripts?.[0]?.content || '';
        setState({ extractStep: 2, rewrittenScript: rewritten, extractedScript: task.result?.transcript || S.extractedScript });
        loadTasks();
      } else if (task.status === 'failed') {
        stopClonePoller();
        setState({ extractStep: 0, extractErr: friendlyError(task.error_msg), extractRawErr: task.error_msg || '', cloneTaskId: null, cloneTaskData: null });
        loadTasks();
      }
    } catch {}
  }, 2000);
}

function stopClonePoller() {
  if (clonePollerTimer) { clearInterval(clonePollerTimer); clonePollerTimer = null; }
}

async function handleCloneRewrite() {
  const taskId = S.cloneTaskId;
  if (!taskId || !S.extractedScript.trim()) return;
  setState({ extractStep: 'rewriting', extractErr: '' });
  try {

    if (r.code === 200) startClonePoller(taskId);
    else setState({ extractStep: 'review', extractErr: r.msg || '触发改写失败，请重试' });
  } catch { setState({ extractStep: 'review', extractErr: '网络错误，请重试' }); }
}

function onAvatarFile(ev) {
  const f = ev.target.files && ev.target.files[0];
  ev.target.value = '';
  if (!f) return;
  if (f.size > 5 * 1024 * 1024) { showToast('图片需小于 5MB'); return; }
  loadAvatarImage(f).then(({ dataUrl, width, height }) => {
    setState({
      avatarCropOpen: true,
      avatarCropDataUrl: dataUrl,
      avatarCropMeta: { width, height },
      avatarCropScale: 100,
      avatarCropX: 0,
      avatarCropY: 0,
    });
  }).catch(() => showToast('图片处理失败'));
}
function loadAvatarImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => resolve({ dataUrl: String(reader.result || ''), width: img.width, height: img.height });
      img.onerror = () => reject(new Error('bad image'));
      img.src = String(reader.result || '');
    };
    reader.onerror = () => reject(new Error('read fail'));
    reader.readAsDataURL(file);
  });
}
function setAvatarCropScale(v) {
  const percent = Math.max(20, Math.min(220, Number(v) || 100));
  setState({ avatarCropScale: percent });
}
function startAvatarDrag(e) {
  if (!S.avatarCropOpen) return;
  S._avatarDrag = { x: e.clientX, y: e.clientY, ox: S.avatarCropX || 0, oy: S.avatarCropY || 0 };
}
function moveAvatarDrag(e) {
  if (!S._avatarDrag) return;
  const dx = e.clientX - S._avatarDrag.x;
  const dy = e.clientY - S._avatarDrag.y;
  S.avatarCropX = S._avatarDrag.ox + dx;
  S.avatarCropY = S._avatarDrag.oy + dy;
  render();
}
function endAvatarDrag() {

}
function cancelAvatarCrop() {
  setState({ avatarCropOpen: false, avatarCropDataUrl: '', avatarCropMeta: null, avatarCropScale: 100, avatarCropX: 0, avatarCropY: 0 });
}
async function confirmAvatarCrop() {
  if (!S.avatarCropDataUrl || !S.avatarCropMeta) return;
  const outSize = 420;
  const previewSize = 220;
  const scale = Math.max(0.2, Number(S.avatarCropScale || 100) / 100);
  const x = Number(S.avatarCropX || 0);
  const y = Number(S.avatarCropY || 0);
  const source = new Image();
  source.src = S.avatarCropDataUrl;
  await new Promise((res, rej) => { source.onload = res; source.onerror = rej; });
  const base = Math.max(previewSize / source.width, previewSize / source.height);
  const drawScale = base * scale;
  const drawW = source.width * drawScale;
  const drawH = source.height * drawScale;
  const canvas = document.createElement('canvas');
  canvas.width = outSize;
  canvas.height = outSize;
  const ctx = canvas.getContext('2d');
  const ratio = outSize / previewSize;
  const dx = ((previewSize - drawW) / 2 + x) * ratio;
  const dy = ((previewSize - drawH) / 2 + y) * ratio;
  ctx.drawImage(source, dx, dy, drawW * ratio, drawH * ratio);
  const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
  try {
    const r = await api.put('/auth/profile', { avatar_image: dataUrl });
    if (r.code !== 200) { showToast(r.msg || '上传失败'); return; }
  } catch { showToast('网络错误'); return; }
  setState({ avatarCropOpen: false, avatarCropDataUrl: '', avatarCropMeta: null, avatarCropScale: 1, avatarCropX: 0, avatarCropY: 0 });
  await fetchMe();
  showToast('头像已更新');
}

// ===== 任务页视图 =====
function taskCountdown(t) {
  if (t.status !== 'pending' && t.status !== 'running') return '';
  const expectedSecs = { profile_analyze: 180, single_video_analyze: 90, industry_gen: 20, clone_video: 90 };
  const expected = expectedSecs[t.type] || 120;
  const elapsed = Math.floor((Date.now() - new Date(t.created_at).getTime()) / 1000);
  const remaining = Math.max(0, expected - elapsed);
  if (remaining === 0) return `<span style="font-size:11px;color:#E8650A;font-weight:600">即将完成...</span>`;
  const m = Math.floor(remaining / 60), s = remaining % 60;
  const label = m > 0 ? `${m}分${s}秒` : `${s}秒`;
  return `<span style="font-size:11px;color:#A8A49C">预计还需 <b style="color:#E8650A">${label}</b></span>`;
}
