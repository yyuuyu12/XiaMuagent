function tInspireFeatured() {
  return S.featuredPage === 'content' ? tFeaturedContent() : tFeaturedSelect();
}

function tFeaturedSelect() {
  const list = S.featuredIndustriesList || [];
  if (S.featuredIndustriesLoading && list.length === 0) {
    return `<div class="tab-page">${tAppLoader('正在整理行业热门文案')}</div>`;
  }
  if (list.length === 0) {
    return `<div class="tab-page"><div style="text-align:center;color:#9CA3AF;margin-top:60px;font-size:14px">暂无行业数据，请联系管理员</div></div>`;
  }
  const selected = S.featuredIndustry;
  const cards = list.map(ind => {
    const isSel = ind === selected;
    return `<div class="ind-card ${isSel ? 'ind-card-selected' : ''}" onclick="setState({featuredIndustry:'${esc(ind)}'});render()">
      <span class="ind-card-name">${esc(ind)}</span>
    </div>`;
  }).join('');
  const hasSelected = !!selected;
  return `<div class="tab-page">
    <div class="ind-select-sub">选择你的行业赛道，AI 生成爆款文案创意</div>
    <div class="ind-grid">${cards}</div>
    <button class="ind-confirm-btn${hasSelected ? '' : ' ind-confirm-disabled'}" onclick="${hasSelected ? `featuredSelectIndustry('${esc(selected || '')}')` : ''}">查看行业热门文案</button>
  </div>`;
}

function tFeaturedContent() {
  const di = S.featuredDetailIdx;
  let grid = '';
  if (S.featuredLoading) {
    grid = `<div style="grid-column:1/-1">${tAppLoader('正在加载热门文案')}</div>`;
  } else if (S.featuredErr) {
    grid = `<div style="grid-column:1/-1;text-align:center;color:#EF4444;font-size:13px">${esc(S.featuredErr)}</div>`;
  } else if (!S.featuredVideos || S.featuredVideos.length === 0) {
    grid = `<div style="grid-column:1/-1;text-align:center;color:#9CA3AF;font-size:13px;padding:40px 0">该行业暂无采集数据</div>`;
  } else {
    grid = S.featuredVideos.map((v, i) => `
      <div class="feat-card" onclick="setState({featuredDetailIdx:${i}});render()">
        <div class="feat-card-text">${esc(v.transcript)}</div>
        <div class="feat-card-likes"><svg width="12" height="12" viewBox="0 0 24 24" fill="#F97316" xmlns="http://www.w3.org/2000/svg"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>${fmtLikes(v.likes)}</div>
      </div>`).join('');
  }
  // 详情弹窗
  let modal = '';
  if (di !== null && di !== undefined && S.featuredVideos && S.featuredVideos[di]) {
    const dv = S.featuredVideos[di];
    modal = `<div class="feat-modal-overlay" onclick="if(event.target===this){setState({featuredDetailIdx:null});render()}">
      <div class="feat-modal">
        <div class="feat-modal-handle"></div>
        <div class="feat-modal-body">
          <div class="feat-modal-text">${esc(dv.transcript)}</div>
          <div class="feat-modal-likes"><svg width="14" height="14" viewBox="0 0 24 24" fill="#F97316" xmlns="http://www.w3.org/2000/svg"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>${fmtLikes(dv.likes)} 点赞</div>
        </div>
        <div class="feat-modal-btns">
          <button class="feat-btn-sec" onclick="featuredCopySelected()">复制文案</button>
          <button class="feat-btn-pri" onclick="featuredRewrite()">仿写爆款</button>
        </div>
      </div>
    </div>`;
  }
  return `<div class="tab-page">
    <div class="feat-grid">${grid}</div>
  </div>${modal}`;
}

function fmtLikes(n) {
  if (!n) return '0';
  if (n >= 10000) return (n / 10000).toFixed(1) + 'w';
  return String(n);
}

async function featuredSelectIndustry(ind) {
  if (S.featuredLoading) return;
  setState({ featuredIndustry: ind, featuredPage: 'content', featuredSelectedIdx: null, featuredDetailIdx: null, featuredVideos: [], featuredLoading: true, featuredErr: '' });
  render();
  try {
    const r = await fetch(`/api/industry-videos?industry=${encodeURIComponent(ind)}&limit=15`).then(x => x.json());
    if (r.code === 200) {
      setState({ featuredVideos: r.data || [], featuredLoading: false });
    } else {
      setState({ featuredErr: r.msg || '加载失败', featuredLoading: false });
    }
  } catch(e) {
    setState({ featuredErr: '网络错误，请重试', featuredLoading: false });
  }
  render();
}

async function startCloneFromFeatured(videoId, transcript) {
  if (_featuredRefreshTimer) { clearInterval(_featuredRefreshTimer); _featuredRefreshTimer = null; }
  setState({
    currentTab: 'extract',
    inspireMode: null,
    featuredDetailIdx: null,
    extractStep: 'review',
    extractedScript: transcript || '',
    rewrittenScript: '',
    rewriteSourceExpanded: false,
    extractErr: '',
    extractRawErr: '',
    videoUrl: '',
    cloneTaskId: null,
    cloneTaskData: null,
    taskId: null,
    ttsAudioUrl: null,
    ttsAudioB64: null,
    avatarVideoUrl: null,
    avatarVideoB64: null,
    postProcessedVideoUrl: null,
    postProcessedB64: null,
  });
  try {
    const r = await api.post(`/industry-videos/start-clone/${videoId}`, {});
    if (r.code === 200 && r.data && r.data.task_id) {
      setState({ cloneTaskId: r.data.task_id });
      saveCloneSession(2);
      loadTasks();
    } else {
      showToast(r.msg || '操作失败，请重试');
    }
  } catch(e) {
    showToast('网络错误，请重试');
  }
}

function featuredCopy(i) {
  const v = (S.featuredVideos || [])[i];
  if (!v) return;
  navigator.clipboard.writeText(v.transcript).then(() => showToast('已复制')).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = v.transcript; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta); showToast('已复制');
  });
}

async function featuredConfirm() {
  if (!S.featuredIndustry) return;
  setState({ featuredPage: 'content', featuredVideos: [], featuredLoading: true, featuredErr: '', featuredSelectedIdx: null });
  render();
  try {
    const r = await fetch(`/api/industry-videos?industry=${encodeURIComponent(S.featuredIndustry)}&limit=15`).then(x => x.json());
    setState({ featuredVideos: r.code === 200 ? (r.data || []) : [], featuredLoading: false, featuredErr: r.code !== 200 ? (r.msg || '加载失败') : '' });
  } catch(e) {
    setState({ featuredErr: '网络错误，请重试', featuredLoading: false });
  }
  render();
}

function featuredCopySelected() {
  if (!ensureLoggedIn()) return;
  const v = (S.featuredVideos || [])[S.featuredDetailIdx];
  if (!v) return;
  navigator.clipboard.writeText(v.transcript).then(() => showToast('已复制')).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = v.transcript; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta); showToast('已复制');
  });
}

async function featuredRewrite() {
  if (!ensureLoggedIn()) return;
  const v = (S.featuredVideos || [])[S.featuredDetailIdx];
  if (!v) return;
  if (v.id) {
    await startCloneFromFeatured(v.id, v.transcript);
    return;
  }
  if (_featuredRefreshTimer) { clearInterval(_featuredRefreshTimer); _featuredRefreshTimer = null; }
  setState({ inspireMode: null, featuredDetailIdx: null, extractedScript: v.transcript, rewrittenScript: '', extractStep: 'review', extractErr: '', extractRawErr: '', videoUrl: '', cloneTaskId: null, cloneTaskData: null, taskId: null });
  switchTab('extract');
  render();
  showToast('已填入爆款文案，点击开始AI改写');
}

];
function emoLabel(e) { return {neutral:'自然',happy:'开心',excited:'激动',sad:'忧郁',calm:'平静'}[e]||e; }

function tVoiceManager() {
  const myVoices = S.myVoices || [];
  const isRecording = S.recordingState === 'recording';

  const sysRows = SYS_VOICES_DEF.map(v => `
    <div class="vm-voice-row">
      <div class="vm-voice-avatar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#F97316" stroke-width="2"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/></svg>
      </div>
      <div style="flex:1">
        <div class="vm-voice-name">${v.name}</div>
        <div class="vm-voice-sub">系统音色</div>
      </div>
    </div>`).join('');

  const playingId = S.vmPlayingId || '';
  const PLAY_ICON = `<svg width="13" height="13" viewBox="0 0 24 24" fill="#F97316"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;
  const PAUSE_ICON = `<svg width="13" height="13" viewBox="0 0 24 24" fill="#F97316"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`;

  const myRows = myVoices.length === 0
    ? `<div style="font-size:13px;color:#A8A49C;padding:14px 0;text-align:center">暂无克隆声音，点击下方按钮添加</div>`
    : myVoices.map(v => {
      const isPlaying = playingId === v.id;
      return `
      <div class="vm-voice-row">
        <div class="vm-voice-avatar" style="background:#FFF1E8;cursor:pointer" onclick="playMyVoice('${v.id}')">
          ${isPlaying ? PAUSE_ICON : PLAY_ICON}
        </div>
        <div style="flex:1">
          <div class="vm-voice-name">${esc(v.name)}</div>
          <div class="vm-voice-sub">我的声音 · ${emoLabel(v.emotion)}${isPlaying ? ' · <span style="color:#F97316">播放中</span>' : ''}</div>
        </div>
        <div class="vm-del-btn" onclick="deleteMyVoice('${v.id}')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#EF4444" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
        </div>
      </div>`;
    }).join('');

  const addTip = `<div style="background:#FFF7ED;border-radius:8px;padding:10px 12px;margin-top:10px;font-size:12px;color:#92400E;line-height:1.6">
    💡 <b>最佳效果：</b>录制 10~30 秒，语速自然、环境安静、普通话清晰。过短或过长都会影响克隆质量和合成速度。
  </div>`;

  const addUI = isRecording ? `
    <div style="background:#FEF2F2;border-radius:12px;padding:14px;margin-top:12px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div class="rec-dot"></div>
        <span style="font-size:14px;font-weight:600;color:#EF4444">录音中</span>
        <span style="font-size:14px;color:#EF4444;font-weight:600;margin-left:auto" id="recTimer">${formatRecTime(S.recordingSeconds)}</span>
      </div>
      <div class="path-a-progress-bar" style="margin-bottom:12px">
        <div class="path-a-progress-fill" style="width:${Math.min(100,S.recordingSeconds/30*100)}%;background:#EF4444"></div>
      </div>
      <div class="rec-stop-btn" onclick="stopMicRecording()">松开停止录音</div>
    </div>` : `
    <div style="display:flex;gap:10px;margin-top:12px">
      <input type="file" id="vmAudioInput" accept="audio/*,.m4a,.caf,.aac,.mp3,.wav,.ogg,.opus,.flac" style="display:none" onchange="handleVMUpload(event)"/>
      <div style="flex:1;background:#F7F6F2;border:1.5px solid #E8E4DC;border-radius:10px;padding:12px;text-align:center;cursor:pointer" onclick="document.getElementById('vmAudioInput').click()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="2" style="margin-bottom:4px"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <div style="font-size:13px;color:#6B7280;margin-top:2px">上传文件</div>
      </div>
      <div style="flex:1;background:#FFF1E8;border:1.5px solid #FDBA74;border-radius:10px;padding:12px;text-align:center;cursor:pointer" onclick="startMicRecording()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#F97316" stroke-width="2" style="margin-bottom:4px"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg>
        <div style="font-size:13px;color:#F97316;margin-top:2px">麦克风录制</div>
      </div>
    </div>`;

  return `<div class="tab-page">
    <div class="section-card">
      <div class="section-label" style="margin-bottom:12px">系统音色</div>
      ${sysRows}
    </div>
    <div class="section-card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <div class="section-label" style="margin-bottom:0">我的声音 <span style="font-size:12px;color:#A8A49C;font-weight:400">${myVoices.length}/8</span></div>
      </div>
      ${myRows}
      ${myVoices.length < 8 ? addTip + addUI : `<div style="font-size:12px;color:#A8A49C;text-align:center;margin-top:10px">最多保存8个声音</div>`}
    </div>
    <div style="height:20px"></div>
  </div>`;
}

  const maskedPhone = phone && !phone.startsWith('wx_') ? maskPhone(phone) : '';
  const close = "setState({showSetPwdSheet:false,pwdSmsCode:'',pwdSmsSent:false,pwdSmsCountdown:0,pwdErr:'',pwdNew:'',pwdNew2:''});render()";
  return `<div class="auth-sheet-mask" onclick="${close}">
    <div class="auth-sheet" onclick="event.stopPropagation()">
      <div class="auth-sheet-handle" onclick="${close}"></div>
      <div class="auth-sheet-head">
        <span class="auth-sheet-title">${hasPwd?'修改密码':'设置密码'}</span>
        <span class="auth-sheet-close" onclick="${close}">✕</span>
      </div>
      <div class="auth-sheet-scroll" style="padding-bottom:32px">
        ${hasPwd?`
        <div style="font-size:13px;color:#6B6860;margin-bottom:14px">将向 <span style="color:#1A1814;font-weight:600">+86 ${esc(maskedPhone)}</span> 发送验证码以确认身份</div>
        <div class="field-group">
          <span class="field-label">验证码</span>
          <div class="input-wrap">
            <input class="lf-input" type="number" maxlength="6" placeholder="6位验证码"
              value="${esc(S.pwdSmsCode)}" oninput="S.pwdSmsCode=this.value" style="flex:1;padding-left:14px"/>
            <div class="sms-send-btn ${S.pwdSmsCountdown>0||S.pwdLoading?'sms-send-disabled':''}" onclick="handleSendPwdSms()">
              ${S.pwdSmsCountdown>0?`${S.pwdSmsCountdown}s后重发`:S.pwdSmsSent?'重新发送':'获取验证码'}
            </div>
          </div>
        </div>`:''}
        <div class="field-group">
          <span class="field-label">新密码</span>
          <input class="lf-input" type="password" placeholder="至少6位"
            value="${esc(S.pwdNew)}" oninput="S.pwdNew=this.value"/>
        </div>
        <div class="field-group">
          <span class="field-label">确认新密码</span>
          <input class="lf-input" type="password" placeholder="再次输入新密码"
            value="${esc(S.pwdNew2)}" oninput="S.pwdNew2=this.value" onkeydown="if(event.key==='Enter')handleSetPassword()"/>
        </div>
        ${S.pwdErr?`<span class="err-msg">${esc(S.pwdErr)}</span>`:''}
        <div class="submit-btn ${S.pwdLoading?'submit-disabled':''}" style="margin-top:4px" onclick="handleSetPassword()">
          ${S.pwdLoading?'请稍候...':(hasPwd?'确认修改':'设置密码')}
        </div>
      </div>
    </div>
  </div>`;
}

function tAvatarCropModal() {
  const percent = Number(S.avatarCropScale || 100);
  const userScale = Math.max(0.2, percent / 100);
  const meta = S.avatarCropMeta || { width: 220, height: 220 };
  const previewSize = 220;
  const base = Math.max(previewSize / meta.width, previewSize / meta.height);
  const sc = base * userScale;
  const tx = Number(S.avatarCropX || 0);
  const ty = Number(S.avatarCropY || 0);
  return `<div class="crop-modal-mask" onclick="if(event.target===event.currentTarget)cancelAvatarCrop()">
    <div class="crop-modal" onclick="event.stopPropagation()">
      <div class="crop-modal-title">头像预览</div>
      <div class="crop-preview-wrap"
        onpointerdown="startAvatarDrag(event)"
        onpointermove="moveAvatarDrag(event)"
        onpointerup="endAvatarDrag(event)"
        onpointercancel="endAvatarDrag(event)"
        onpointerleave="endAvatarDrag(event)">
        <img class="crop-preview-img" src="${esc(S.avatarCropDataUrl)}" alt="" draggable="false"
          style="transform:translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(${sc});"/>
      </div>
      <div class="crop-slider-row">
        <span>缩小</span>
        <input class="crop-slider" type="range" min="20" max="220" step="1" value="${Math.round(percent)}" oninput="setAvatarCropScale(this.value)" />
        <span>${Math.round(percent)}%</span>
      </div>
      <p class="profile-field-hint" style="text-align:center;margin-bottom:12px">默认填满裁剪框（100%），可拖拽与缩放，裁剪比例固定 1:1</p>
      <div class="crop-modal-actions">
        <div class="btn-secondary" onclick="cancelAvatarCrop()">重选</div>
        <div class="btn-primary" onclick="confirmAvatarCrop()">确认使用</div>
      </div>
    </div>
  </div>`;
}

// ===== LOGIN HANDLERS =====
function setLoginMode() { setState({ isRegMode: false, authErr: '' }); }
function setRegMode()   { setState({ isRegMode: true,  authErr: '' }); }
function setAuthMode(mode) { setState({ authMode: mode, authErr: '', smsCode: '', smsSent: false }); }

let smsCountdownTimer = null;
let pwdSmsCountdownTimer = null;
function startPwdSmsCountdown() {
  setState({ pwdSmsCountdown: 60 });
  if (pwdSmsCountdownTimer) clearInterval(pwdSmsCountdownTimer);
  pwdSmsCountdownTimer = setInterval(() => {
    const next = S.pwdSmsCountdown - 1;
    if (next <= 0) { clearInterval(pwdSmsCountdownTimer); pwdSmsCountdownTimer = null; setState({ pwdSmsCountdown: 0 }); }
    else setState({ pwdSmsCountdown: next });
  }, 1000);
}
async function handleSendPwdSms() {
  if (S.pwdSmsCountdown > 0 || S.pwdLoading) return;
  const phone = S.userInfo?.phone;
  if (!phone) return;
  setState({ pwdLoading: true, pwdErr: '' });
  try {
    const r = await api.post('/auth/send-sms', { phone });
    setState({ pwdLoading: false });
    if (r.code === 200) { setState({ pwdSmsSent: true }); startPwdSmsCountdown(); showToast('验证码已发送'); }
    else setState({ pwdErr: r.msg || '发送失败，请重试' });
  } catch { setState({ pwdLoading: false, pwdErr: '网络错误，请重试' }); }
}
function startSmsCountdown() {
  setState({ smsCountdown: 60 });
  if (smsCountdownTimer) clearInterval(smsCountdownTimer);
  smsCountdownTimer = setInterval(() => {
    const next = S.smsCountdown - 1;
    if (next <= 0) { clearInterval(smsCountdownTimer); smsCountdownTimer = null; setState({ smsCountdown: 0 }); }
    else setState({ smsCountdown: next });
  }, 1000);
}

async function handleSendSms() {
  if (S.smsCountdown > 0 || S.loading) return;
  const phone = S.phone.trim();
  if (!phone) { setState({ authErr: '请输入手机号' }); return; }
  if (!/^1[3-9]\d{9}$/.test(phone)) { setState({ authErr: '手机号格式不正确' }); return; }
  setState({ loading: true, authErr: '' });
  try {
    const r = await api.post('/auth/send-sms', { phone });
    setState({ loading: false });
    if (r.code === 200) { setState({ smsSent: true }); startSmsCountdown(); showToast('验证码已发送'); }
    else setState({ authErr: r.msg || '发送失败，请重试' });
  } catch { setState({ loading: false, authErr: '网络错误，请重试' }); }
}

async function handleSmsLogin() {
  const phone = S.phone.trim(), code = (document.getElementById('smsCodeInput')?.value || S.smsCode).trim();
  if (!phone) { setState({ authErr: '请输入手机号' }); return; }
  if (!code)  { setState({ authErr: '请输入验证码' }); return; }
  setState({ loading: true, authErr: '' });
  try {
    const r = await api.post('/auth/sms-login', { phone, code });
    if (r.code === 200) {
      setToken(r.data.token);
      setState({ loading: false, showAuthSheet: false, smsCode: '', smsSent: false, smsCountdown: 0, authErr: '', phone: '' });
      if (smsCountdownTimer) { clearInterval(smsCountdownTimer); smsCountdownTimer = null; }
      await fetchMe();
      loadTasks();
      showToast(r.data.isNew ? '注册成功，欢迎使用' : '登录成功');
    } else { setState({ loading: false, authErr: r.msg || '验证失败，请重试' }); }
  } catch { setState({ loading: false, authErr: '网络错误，请重试' }); }
}

async function handleSetPassword() {
  const { pwdSmsCode, pwdNew, pwdNew2 } = S;
  if (!pwdNew || pwdNew.length < 6) { setState({ pwdErr: '新密码至少6位' }); return; }
  if (pwdNew !== pwdNew2) { setState({ pwdErr: '两次输入的密码不一致' }); return; }
  if (S.userInfo?.has_password && !pwdSmsCode.trim()) { setState({ pwdErr: '请先获取并输入验证码' }); return; }
  setState({ pwdLoading: true, pwdErr: '' });
  try {
    const body = { new_password: pwdNew };
    if (S.userInfo?.has_password) body.sms_code = pwdSmsCode.trim();
    const r = await api.post('/auth/set-password', body);
    if (r.code === 200) {
      if (S.userInfo) setState({ userInfo: { ...S.userInfo, has_password: true } });
      setState({ pwdLoading: false, pwdNew: '', pwdNew2: '', pwdSmsCode: '', pwdSmsSent: false, pwdSmsCountdown: 0 });
      showToast('密码设置成功');
      setTimeout(() => setState({ showSetPwdSheet: false }), 800);
    } else { setState({ pwdLoading: false, pwdErr: r.msg || '操作失败' }); }
  } catch { setState({ pwdLoading: false, pwdErr: '网络错误，请重试' }); }
}

async function handleAuth() {
  if (S.loading) return;
  const phone = S.phone.trim(), pwd = S.password;
  if (!phone || !pwd)             { setState({ authErr: '请输入手机号和密码' }); return; }
  if (!/^1[3-9]\d{9}$/.test(phone)) { setState({ authErr: '手机号格式不正确' }); return; }
  if (pwd.length < 6)             { setState({ authErr: '密码至少6位' }); return; }
  setState({ loading: true, authErr: '' });
  try {
    const r = await api.post(S.isRegMode ? '/auth/register' : '/auth/login', { phone, password: pwd });
    if (r.code === 200) {
      setToken(r.data.token); setUser(r.data.user);
      showToast(S.isRegMode ? '注册成功' : '登录成功');
      if (S.showAuthSheet) {
        // 来自底部浮层登录
        setState({
          showAuthSheet: false,
          loading: false,
          authErr: '',
          userName: r.data.user.nickname || '创作者',
          userPhone: r.data.user.phone || '',
          userAvatar: r.data.user.avatar || 0,
        });
        fetchMe(); loadIndustries();
      } else {
        setTimeout(() => {
          Object.assign(S, {
            showAuthSheet: false, loading: false,
            userName: r.data.user.nickname || '创作者',
            userPhone: r.data.user.phone || '',
            userAvatar: r.data.user.avatar || 0,
          });
          render(); fetchMe(); loadIndustries();
        }, 600);
      }
    } else {
      setState({ authErr: r.msg || '操作失败，请重试', loading: false });
    }
  } catch { setState({ authErr: '网络错误，请稍后重试', loading: false }); }
}

// ===== NAV =====
function switchTab(tab) {
  const resetProfile = tab !== 'profile';
  setState({
    prevTab: S.currentTab,
    currentTab: tab,
    nicknamePrompt: false,
    ...(resetProfile ? { profileView: 'main', avatarCropOpen: false, avatarCropDataUrl: '' } : {}),
  });
  if (tab === 'profile') fetchMe();
  if (tab === 'vip') loadMemberPlans();
  if (tab === 'home') {
    dismissHomeDoneSeen();
    if (!S.cloneHistoryLoaded) loadCloneHistory(); else render();
    loadTasks();
  }
  if (tab === 'history') {
    if (!S.cloneHistoryLoaded) loadCloneHistory();
    loadTasks();
  }
  if (tab === 'extract' && !S.extractHistoryLoaded) loadExtractHistory();
}
function goBack() {
  if (S.currentTab === 'history') {
    setState({ currentTab: 'home', historyPageExpanded: null });
  } else {
    setState({ currentTab: 'home' });
  }
  dismissHomeDoneSeen();
  if (!S.cloneHistoryLoaded) loadCloneHistory();
  loadTasks();
}

async function handleExtract() {
  if (!ensureLoggedIn()) return;
  if (!S.videoUrl.trim() || S.extractLoading) return;
  setState({ extractLoading: true, extractErr: '' });
  try {
    const r = await api.post('/video/clone-start', { url: S.videoUrl.trim() });
    if (apiUnauthorized(r)) { setState({ extractLoading: false }); return; }
    if (r.code === 200) {
      setState({ extractLoading: false, cloneTaskId: r.data.taskId, cloneTaskData: null, extractStep: 'cloning' });
      startClonePoller(r.data.taskId);
    } else {
      setState({ extractErr: r.msg || '提交失败，请重试', extractLoading: false });
    }
  } catch {
    setState({ extractErr: '网络错误，请重试', extractLoading: false });
  }
}

function startClonePoller(taskId) {
  if (clonePollerTimer) clearInterval(clonePollerTimer);
  clonePollerTimer = setInterval(async () => {
    if (S.currentTab !== 'extract') return;
    try {
      const r = await api.get(`/tasks/${taskId}`);
      if (r.code !== 200) return;
      const task = r.data;
      setState({ cloneTaskData: task });
      if (task.status === 'extracted') {
        stopClonePoller();
        setState({ extractStep: 'review', extractedScript: task.result?.transcript || '' });
      } else if (task.status === 'done') {
        stopClonePoller();
        const rewritten = task.result?.rewritten || task.result?.scripts?.[0]?.content || '';
        setState({ extractStep: 2, rewrittenScript: rewritten, rewriteSourceExpanded: false, extractedScript: task.result?.transcript || S.extractedScript });
        loadTasks();
      } else if (task.status === 'pending' || task.status === 'running') {
        const nextStep = (task.stage === 'rewrite' || task.stage === 'extracted') ? 'rewriting' : 'cloning';
        if (S.extractStep !== nextStep) setState({ extractStep: nextStep });
      } else if (task.status === 'failed') {
        stopClonePoller();
        setState({ extractStep: 0, extractErr: friendlyError(task.error_msg), extractRawErr: task.error_msg || '', cloneTaskId: null, cloneTaskData: null });
        loadTasks();
      }
    } catch {}
  }, 2000);
}

function stopClonePoller() {
  if (clonePollerTimer) { clearInterval(clonePollerTimer); clonePollerTimer = null; }
}

async function handleCloneRewrite() {
  // 先从 DOM 读最新内容（oninput 可能未触发）
  const ta = document.getElementById('f-extracted-script') || document.getElementById('f-extracted-script-v2');
  if (ta) S.extractedScript = ta.value;
  const text = S.extractedScript.trim();
  if (!text) { showToast('请先填写原始文案'); return; }

  const wasRewriteStep = S.extractStep === 2;
  setState({ extractStep: 'rewriting', rewriteSourceExpanded: false, extractErr: '' });
  saveCloneSession(2);
  if (S.cloneTaskId) {
    try {
      const r = await api.post(`/tasks/${S.cloneTaskId}/start-rewrite`, { editedTranscript: text });
      if (apiUnauthorized(r)) return;
      if (r.code !== 200) {
        setState({ extractStep: wasRewriteStep ? 2 : 'review', extractErr: r.msg || '改写失败，请重试' });
        return;
      }
      const nowIso = new Date().toISOString();
      S.tasksList = (S.tasksList || []).map(t => String(t.id) === String(S.cloneTaskId)
        ? { ...t, status: 'pending', stage: 'extracted', progress: 50, clone_step: 2, activity_at: nowIso, updated_at: nowIso }
        : t);
      startClonePoller(S.cloneTaskId);
      loadTasks();
      return;
    } catch (e) {
      setState({ extractStep: wasRewriteStep ? 2 : 'review', extractErr: '网络错误，请重试' });
      return;
    }
  }
  try {
    // 直接把用户编辑好的文案传给 AI 改写，不经过 task 队列
    const r = await api.post('/ai/rewrite', { text });
    if (r.code === 200) {
      const rewritten = (r.data?.result || '').trim();
      if (!rewritten) {
        setState({ extractStep: 2, rewrittenScript: '', rewriteSourceExpanded: false, extractErr: 'AI改写结果为空，请点击重新改写' });
        return;
      }
      setState({ extractStep: 2, rewrittenScript: rewritten, rewriteSourceExpanded: false, extractErr: '' });
      // 把任务状态更新为 done，并保存 session（step=2），首页进度条才能更新
      if (S.cloneTaskId) {
        api.post(`/tasks/${S.cloneTaskId}/set-rewritten`, { rewrittenScript: rewritten }).catch(() => {});
        saveCloneSession(2);
        loadTasks(); // 刷新首页任务列表
      }
    } else {
      setState({ extractStep: wasRewriteStep ? 2 : 'review', extractErr: r.msg || '改写失败，请重试' });
    }
  } catch (e) {
    setState({ extractStep: wasRewriteStep ? 2 : 'review', extractErr: '网络错误，请重试' });
  }
}

async function handleTTSGenerate() {
  if (!ensureLoggedIn()) return;
  const text = (S.rewrittenScript || '').trim();
  if (!text) { showToast('请先完成文案改写'); setState({ extractStep: 2 }); return; }
  setState({ ttsGenerating: true, ttsErr: '', extractStep: 'tts_gen' });
  touchCloneTaskActivity();
  try {
    // 处理我的声音（my_xxx格式）
    let voiceId = S.ttsVoice;
    let indexRefAudio = null;
    let indexEmotion = S.ttsIndexEmotion || 'neutral';
    if (voiceId && voiceId.startsWith('my_')) {
      const myId = voiceId.slice(3);
      const myVoice = (S.myVoices || []).find(v => v.id === myId);
      if (!myVoice) { setState({ ttsGenerating: false, ttsErr: '声音不存在，请重新选择', extractStep: 3 }); return; }
      voiceId = 'indextts';
      indexRefAudio = myVoice.audio_b64;
      // 优先用UI上用户实时选的情绪，没选才降级到声音入库时保存的值
      indexEmotion = S.ttsIndexEmotion || myVoice.emotion || 'neutral';
    }
    const payload = { text: text.slice(0, 2000), voice: voiceId, speed: S.ttsSpeed };
    if (voiceId === 'cloned' && S.ttsCloneVoiceId) payload.cloneVoiceId = S.ttsCloneVoiceId;
    if (voiceId === 'indextts') {
      const refAudio = indexRefAudio || S.ttsIndexRefAudio;
      if (!refAudio) { setState({ ttsGenerating: false, ttsErr: '请先上传参考音频', extractStep: 3 }); return; }
      payload.indexRefAudio = refAudio;
      payload.indexEmotion = indexEmotion;
      // neutral 不传强度（不叠模板），其他情绪传用户设置的强度 0-10 → 0.0-1.0
      if (indexEmotion !== 'neutral') {
        payload.indexEmoAlpha = (S.ttsEmoIntensity != null ? S.ttsEmoIntensity : 5) / 10;
      }
    }
    const r = await api.post('/ai/tts', payload);
    if (r.code === 200) {
      // 转成 Blob URL，移动端大 base64 直接用 new Audio() 会静默失败
      const audioUrl = _b64ToBlobUrl(r.data.audio, 'audio/mp3');
      setState({ ttsGenerating: false, ttsAudioUrl: audioUrl, ttsAudioB64: r.data.audio, extractStep: 3 });
      saveCloneSession(3); // ★ 步骤3：语音合成完成，保存 session
    } else {
      setState({ ttsGenerating: false, ttsErr: r.msg || '语音合成失败，请重试', extractStep: 3 });
    }
  } catch {
    setState({ ttsGenerating: false, ttsErr: '网络错误，请重试', extractStep: 3 });
  }
}

function _b64ToBlobUrl(b64, mime) {
  try {
    const raw = atob(b64);
    const buf = new Uint8Array(raw.length);
    for (let i = 0; i < raw.length; i++) buf[i] = raw.charCodeAt(i);
    return URL.createObjectURL(new Blob([buf], { type: mime }));
  } catch { return `data:${mime};base64,${b64}`; }
}

let _ttsAudio = null;

function playTTSAudio() {
  if (!S.ttsAudioUrl) return;
  // 已有实例且是同一个URL：切换播放/暂停
  if (_ttsAudio && _ttsAudio._src === S.ttsAudioUrl) {
    if (_ttsAudio.paused) {
      _ttsAudio.play().catch(e => showToast('播放失败：' + e.message));
      _updatePlayBtn(true);
    } else {
      _ttsAudio.pause();
      _updatePlayBtn(false);
    }
    return;
  }
  // 停掉旧的
  if (_ttsAudio) { _ttsAudio.pause(); _ttsAudio = null; }
  try {
    _ttsAudio = new Audio(S.ttsAudioUrl);
    _ttsAudio._src = S.ttsAudioUrl;
    _ttsAudio.addEventListener('error', () => { showToast('播放失败'); _updatePlayBtn(false); });
    _ttsAudio.addEventListener('ended', () => { _updatePlayBtn(false); });
    _ttsAudio.play().catch(e => showToast('播放失败：' + e.message));
    _updatePlayBtn(true);
  } catch (e) { showToast('播放失败：' + e.message); }
}

  const btn = document.querySelector('.audio-play-btn');

// 检查 base64 音频时长，返回 Promise<{ok, seconds, msg}>
async function checkAudioB64(b64) {
  try {
    const raw = atob(b64);
    const buf = new Uint8Array(raw.length);
    for (let i = 0; i < raw.length; i++) buf[i] = raw.charCodeAt(i);
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const decoded = await ctx.decodeAudioData(buf.buffer.slice(0));
    ctx.close();
    const secs = decoded.duration;
    if (secs < 3) return { ok: false, seconds: secs, msg: `音频太短（${secs.toFixed(1)}s），建议 5~30 秒清晰语音` };
    if (secs > 60) return { ok: false, seconds: secs, msg: `音频太长（${secs.toFixed(0)}s），请裁剪到 60 秒以内` };
    if (secs > 30) return { ok: true, seconds: secs, msg: `音频较长（${secs.toFixed(0)}s），建议使用 5~30 秒，过长会导致超时` };
    return { ok: true, seconds: secs, msg: '' };
  } catch {
    // 解码失败时不拦截，由服务端判断
    return { ok: true, seconds: 0, msg: '' };
  }
}

// 检查 base64 大小（字节）
function checkAudioSize(b64) {
  const bytes = Math.round(b64.length * 3 / 4);
  if (bytes > 8 * 1024 * 1024) return { ok: false, msg: `文件过大（${(bytes/1024/1024).toFixed(1)} MB），请压缩到 8 MB 以内` };
  return { ok: true };
}

async function addToMyVoiceLibrary(name, audio_b64, emotion) {
  const arr = [...(S.myVoices || [])];
  if (arr.length >= 8) { showToast('声音库已满（最多8个）'); return; }
  // 大小校验
  const sizeCheck = checkAudioSize(audio_b64);
  if (!sizeCheck.ok) { showToast(sizeCheck.msg); return; }
  // 时长校验
  const durCheck = await checkAudioB64(audio_b64);
  if (!durCheck.ok) { showToast(durCheck.msg); return; }
  if (durCheck.msg) showToast(durCheck.msg); // 仅警告，不拦截
  const id = Date.now().toString(36);
  arr.push({ id, name, audio_b64, emotion: emotion || 'neutral' });
  saveMyVoices(arr);
  showToast(`声音已添加（${durCheck.seconds > 0 ? durCheck.seconds.toFixed(1)+'s' : ''}）`);
}

let _vmAudio = null;

function playMyVoice(id) {
  const voice = (S.myVoices || []).find(v => v.id === id);
  if (!voice) return;

  // 同一个 — 切换播放/暂停
  if (_vmAudio && _vmAudio._vmId === id) {
    if (_vmAudio.paused) {
      _vmAudio.play();
      setState({ vmPlayingId: id });
    } else {
      _vmAudio.pause();
      setState({ vmPlayingId: '' });
    }
    return;
  }

  // 停掉上一个
  if (_vmAudio) { _vmAudio.pause(); _vmAudio = null; }

  // 把 base64 转成 Blob URL 再播（移动端兼容好）
  try {
    const raw = atob(voice.audio_b64);
    const buf = new Uint8Array(raw.length);
    for (let i = 0; i < raw.length; i++) buf[i] = raw.charCodeAt(i);
    const url = URL.createObjectURL(new Blob([buf], { type: 'audio/wav' }));
    _vmAudio = new Audio(url);
    _vmAudio._vmId = id;
    _vmAudio.onended = () => setState({ vmPlayingId: '' });
    _vmAudio.onerror = () => { showToast('播放失败'); setState({ vmPlayingId: '' }); };
    _vmAudio.play().catch(e => { showToast('播放失败：' + e.message); setState({ vmPlayingId: '' }); });
    setState({ vmPlayingId: id });
  } catch (e) {
    showToast('播放失败：' + e.message);
  }
}

let _recMediaRecorder = null;
let _recChunks = [];
let _recTimer = null;

async function startMicRecording() {
  if (S.recordingState === 'recording') return;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    _recChunks = [];
    _recMediaRecorder = new MediaRecorder(stream);
    _recMediaRecorder.ondataavailable = e => { if (e.data.size > 0) _recChunks.push(e.data); };
    _recMediaRecorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      const blob = new Blob(_recChunks, { type: 'audio/webm' });
      const reader = new FileReader();
      reader.onload = (ev) => {
        const b64 = ev.target.result.split(',')[1];
        const name = '录音_' + new Date().toLocaleTimeString('zh-CN', { hour12: false, hour:'2-digit', minute:'2-digit', second:'2-digit' }).replace(/:/g,'-');
        addToMyVoiceLibrary(name, b64, 'neutral');
      };
      reader.readAsDataURL(blob);
    };
    _recMediaRecorder.start();
    setState({ recordingState: 'recording', recordingSeconds: 0 });
    _recTimer = setInterval(() => {
      const secs = (S.recordingSeconds || 0) + 1;
      S.recordingSeconds = secs;
      const el = document.getElementById('recTimer');
      if (el) el.textContent = formatRecTime(secs);
      const bar = document.querySelector('.path-a-progress-fill');
      if (bar) bar.style.width = Math.min(100, secs / 30 * 100) + '%';
      if (secs >= 60) stopMicRecording(); // 最长1分钟
    }, 1000);
  } catch (err) {
    showToast('麦克风权限被拒绝：' + (err.message || err));
  }
}

function stopMicRecording() {
  if (_recTimer) { clearInterval(_recTimer); _recTimer = null; }
  if (_recMediaRecorder && _recMediaRecorder.state !== 'inactive') {
    _recMediaRecorder.stop();
  }
  setState({ recordingState: 'idle' });
}

async function handleAvatarGenerate() {
  if (!S.ttsAudioUrl) { showToast('请先完成步骤3语音合成'); return; }
  if (!S.avatarSrcVideoB64 && !S.avatarLibKey) { showToast('请先上传或选择人脸视频'); return; }
  if (S.avatarGenerating) return;
  const runSeq = ++_avatarRunSeq;

  // 把 Blob URL 转成 base64
  let audioB64 = null;
  try {
    const resp = await fetch(S.ttsAudioUrl);
    const buf = await resp.arrayBuffer();
    // 分块转 base64，避免大文件一次展开导致 call stack overflow
    const bytes = new Uint8Array(buf);
    let bin = '';
    for (let i = 0; i < bytes.length; i += 8192) {
      bin += String.fromCharCode(...bytes.subarray(i, i + 8192));
    }
    audioB64 = btoa(bin);
  } catch (e) {
    if (runSeq === _avatarRunSeq) setState({ avatarErr: '音频读取失败: ' + e.message });
    return;
  }

  setState({ avatarGenerating: true, avatarErr: '', extractStep: 'avatar_gen', avatarTaskId: null, avatarVideoUrl: null, avatarProgressMsg: '初始化中...', avatarProgressPct: 20 });
  touchCloneTaskActivity();

  try {
    // 先拿 ngrok 地址，大文件直接传给本地服务，绕过 Zeabur 代理限制
    const urlR = await api.get('/ai/asr-url');
    if (runSeq !== _avatarRunSeq) return;
    if (urlR.code !== 200) {
      setState({ avatarGenerating: false, avatarErr: urlR.msg || '获取服务地址失败', extractStep: 4 }); return;
    }
    const asrUrl = urlR.data.url.replace(/\/$/, '');

    const videoPayload = S.avatarLibKey
      ? { avatar_key: S.avatarLibKey }
      : { video_b64: S.avatarSrcVideoB64, video_fmt: S.avatarSrcVideoFmt || 'mp4' };
    const resp = await fetch(`${asrUrl}/video/generate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': '1' },
      body: JSON.stringify({
        audio_b64: audioB64,
        audio_fmt: 'wav',
        enhancer: S.avatarBeauty,
        ...videoPayload,
      }),
    });
    if (runSeq !== _avatarRunSeq) return;
    if (!resp.ok) {
      const t = await resp.text();
      setState({ avatarGenerating: false, avatarErr: '视频服务出错: ' + t.slice(0, 100), extractStep: 4 }); return;
    }
    const data = await resp.json();
    const taskId = data.task_id;
    if (runSeq !== _avatarRunSeq) {
      cancelRemoteAvatarTask(taskId, asrUrl);
      return;
    }
    setState({ avatarTaskId: taskId, avatarAsrUrl: asrUrl });
    saveCloneSession(4); // 生成任务已提交，立即保存 taskId 以便跨会话恢复
    _startAvatarPoller(taskId, asrUrl, runSeq);
  } catch (e) {
    if (runSeq === _avatarRunSeq) {
      setState({ avatarGenerating: false, avatarErr: '网络错误: ' + e.message, extractStep: 4 });
    }
  }
}

function _startAvatarPoller(taskId, asrUrl, runSeq = _avatarRunSeq) {
  if (_avatarPoller) clearInterval(_avatarPoller);
  let elapsed = 0;
  _avatarPoller = setInterval(async () => {
    if (runSeq !== _avatarRunSeq || String(S.avatarTaskId || '') !== String(taskId)) {
      clearInterval(_avatarPoller); _avatarPoller = null;
      return;
    }
    elapsed += 5;
    try {
      const resp = await fetch(`${asrUrl}/video/task/${taskId}`, { headers: { 'ngrok-skip-browser-warning': '1' } });
      const r = resp.ok ? { code: 200, data: await resp.json() } : { code: 500 };
      if (r.code !== 200) return;
      if (runSeq !== _avatarRunSeq || String(S.avatarTaskId || '') !== String(taskId)) return;
      const t = r.data;
      const pct = Math.min(90, 10 + elapsed * 1.2);
      setState({ avatarProgressPct: pct, avatarProgressMsg: t.msg || '处理中...' });

      if (t.status === 'done' && t.video_b64) {
        if (runSeq !== _avatarRunSeq || String(S.avatarTaskId || '') !== String(taskId)) return;
        clearInterval(_avatarPoller); _avatarPoller = null;
        const raw = atob(t.video_b64);
        const buf = new Uint8Array(raw.length);
        for (let i = 0; i < raw.length; i++) buf[i] = raw.charCodeAt(i);
        const url = URL.createObjectURL(new Blob([buf], { type: 'video/mp4' }));
        setState({ avatarGenerating: false, avatarVideoUrl: url, avatarVideoB64: t.video_b64, avatarTaskId: null, extractStep: 4 });
        saveCloneSession(4); // ★ 步骤4：数字人生成完成，保存 session（avatarTaskId已清空）
      } else if (t.status === 'error') {
        clearInterval(_avatarPoller); _avatarPoller = null;
        setState({ avatarGenerating: false, avatarErr: t.error || '生成失败', extractStep: 4 });
      } else if (t.status === 'cancelled') {
        clearInterval(_avatarPoller); _avatarPoller = null;
        setState({ avatarGenerating: false, avatarTaskId: null, avatarAsrUrl: null, extractStep: 4, avatarErr: '已停止生成' });
      }
    } catch (e) {
      setState({ avatarProgressMsg: '轮询错误: ' + e.message });
      console.error('[avatar poller]', e);
    }
  }, 5000);
}

function cancelRemoteAvatarTask(taskId, asrUrl) {
  if (!taskId || !asrUrl) return;
  fetch(`${asrUrl}/video/cancel/${taskId}`, {
    method: 'POST',
    headers: { 'ngrok-skip-browser-warning': '1' },
  }).catch(() => {});
}

function handleAvatarStop() {
  const taskId = S.avatarTaskId;
  const asrUrl = S.avatarAsrUrl;
  _avatarRunSeq++;
  if (_avatarPoller) { clearInterval(_avatarPoller); _avatarPoller = null; }
  cancelRemoteAvatarTask(taskId, asrUrl);
  setState({
    avatarGenerating: false,
    avatarTaskId: null,
    avatarAsrUrl: null,
    avatarProgressPct: 0,
    avatarProgressMsg: '',
    avatarErr: '已停止生成，可重新开始',
    extractStep: 4,
  });
  saveCloneSession(4);
}

async function handlePostProcess() {
  if (S.postProcessing) return;
  if (!S.avatarVideoB64) { showToast('请先生成数字人视频'); return; }
  if (!S.ttsAudioB64)    { showToast('未找到语音数据，请返回步骤3重新合成'); return; }

  setState({ postProcessing: true, postProcessErr: '' });
  touchCloneTaskActivity();
  try {
    const asrUrl = S.asrUrl || (await (async () => {
      const r = await api.get('/ai/asr-url');
      if (r.code !== 200) throw new Error('获取服务地址失败');
      setState({ asrUrl: r.data.url });
      return r.data.url;
    })());

    const resp = await fetch(`${asrUrl}/video/postprocess`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': '1' },
      body: JSON.stringify({
        video_b64:     S.avatarVideoB64,
        audio_b64:     S.ttsAudioB64,
        audio_fmt:     'mp3',
        sub_color:     S.subColor,
        outline_color: S.subOutlineColor,
        outline_width: S.subOutlineWidth,
        fontsize:      S.subFontsize,
      }),
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.detail || '后期处理失败');

    // base64 → blob URL
    const raw = atob(data.video_b64);
    const buf = new Uint8Array(raw.length);
    for (let i = 0; i < raw.length; i++) buf[i] = raw.charCodeAt(i);
    const url = URL.createObjectURL(new Blob([buf], { type: 'video/mp4' }));
    setState({ postProcessing: false, postProcessedVideoUrl: url, postProcessedB64: data.video_b64 });
    saveCloneSession(5); // ★ 步骤5：后期制作完成，保存 session
  } catch (e) {
    setState({ postProcessing: false, postProcessErr: e.message });
  }
}

// ===== 封面生成 =====
function _extractFrame(videoUrl, seekSec) {
  return new Promise((resolve, reject) => {
    const v = document.createElement('video');
    v.muted = true;
    v.preload = 'auto';
    v.src = videoUrl;
    v.addEventListener('loadeddata', () => {
      v.currentTime = Math.min(seekSec, Math.max(0.1, (v.duration || 10) - 0.5));
    }, { once: true });
    v.addEventListener('seeked', () => {
      try {
        const c = document.createElement('canvas');
        c.width = v.videoWidth || 720;
        c.height = v.videoHeight || 1280;
        c.getContext('2d').drawImage(v, 0, 0);
        resolve({ dataUrl: c.toDataURL('image/jpeg', 0.9), w: c.width, h: c.height });
      } catch (e) { reject(e); }
    }, { once: true });
    v.addEventListener('error', () => reject(new Error('视频加载失败')), { once: true });
    v.load();
  });
}

function _drawCoverText(frameDataUrl, title, w, h) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      const ctx = c.getContext('2d');
      ctx.drawImage(img, 0, 0);
      // 顶部暗渐变
      const grad = ctx.createLinearGradient(0, 0, 0, h * 0.38);
      grad.addColorStop(0, 'rgba(0,0,0,0.75)');
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h * 0.38);
      // 文字
      const fs = Math.max(28, Math.round(w * 0.1));
      ctx.font = `bold ${fs}px "Microsoft YaHei",sans-serif`;
      ctx.textAlign = 'center';
      ctx.lineJoin = 'round';
      ctx.lineWidth = fs * 0.14;
      ctx.strokeStyle = 'rgba(0,0,0,0.9)';
      ctx.strokeText(title, w / 2, h * 0.17);
      ctx.fillStyle = '#FFFFFF';
      ctx.fillText(title, w / 2, h * 0.17);
      resolve(c.toDataURL('image/jpeg', 0.92));
    };
    img.src = frameDataUrl;
  });
}

async function generateCover(seekSec, retitleOnly) {
  if (!S.avatarVideoUrl) { showToast('请先生成数字人视频'); return; }
  const t = isNaN(seekSec) ? 1.0 : Math.max(0.5, seekSec);
  setState({ coverGenerating: true });
  touchCloneTaskActivity();
  try {
    // 获取封面短标题
    let title = S.coverTitle;
    if (!title || retitleOnly) {
      const script = (S.rewrittenScript || S.extractedScript || '').trim();
      if (script) {
        const r = await api.post('/ai/cover-title', { script });
        title = (r.code === 200 && r.data?.title) ? r.data.title : script.slice(0, 7);
      } else {
        title = '精彩内容';
      }
    }
    // 抓帧（不带字幕用原始视频）
    const { dataUrl, w, h } = await _extractFrame(S.avatarVideoUrl, t);
    // 叠加文字
    const coverUrl = await _drawCoverText(dataUrl, title, w, h);
    setState({ coverGenerating: false, coverFrameUrl: coverUrl, coverTitle: title, coverSeekTime: t });
    saveCloneSession(6); // ★ 步骤6：封面生成完成，保存 session
  } catch (e) {
    setState({ coverGenerating: false });
    showToast('封面生成失败: ' + e.message);
  }
}

function goToCloneStep6() {
  setState({ extractStep: 6, publishCopied: false });
  saveCloneSession(6);
  // 自动触发标题生成
  if (!S.publishTitle && !S.publishTitleLoading) handlePublishTitleGen();
  // 自动生成封面（有视频时）
  if (S.avatarVideoUrl && !S.coverFrameUrl && !S.coverGenerating) generateCover(1.0);
}

async function handlePublishTitleGen() {
  if (!ensureLoggedIn()) return;
  const script = (S.rewrittenScript || S.extractedScript || '').trim();
  if (!script) return;
  setState({ publishTitleLoading: true });
  try {
    const r = await api.post('/ai/publish-info', { script: script.slice(0, 800) });
    if (r.code === 200) {
      setState({ publishTitleLoading: false, publishTitle: r.data.title || '', publishTags: r.data.tags || [] });
      // 同步到 contenteditable
      const el = document.getElementById('pub-title-el');
      if (el) el.innerText = r.data.title || '';
    } else {
      setState({ publishTitleLoading: false });
      showToast(r.msg || '生成失败，请重试');
    }
  } catch {
    setState({ publishTitleLoading: false });
    showToast('网络错误，请重试');
  }
}

function handlePublishCopy() {
  const title = S.publishTitle || (S.rewrittenScript || S.extractedScript || '').slice(0, 28);
  const tags  = S.publishTags.map(t => '#' + t).join(' ');
  const text  = [title, tags].filter(Boolean).join('\n\n');
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      setState({ publishCopied: true });
      setTimeout(() => setState({ publishCopied: false }), 3000);
    }).catch(() => showToast('复制失败，请手动复制'));
  } else {
    showToast('请手动复制：' + text.slice(0, 60));
  }
}

// ===== 任务 Session 持久化 =====
function currentCloneStepFromState() {
  if (S.extractStep === 'cloning') return 1;
  if (S.extractStep === 'review' || S.extractStep === 'rewriting') return 2;
  if (S.extractStep === 'tts_gen') return 3;
  if (S.extractStep === 'avatar_gen') return 4;
  const n = parseInt(S.extractStep);
  return Number.isFinite(n) ? Math.max(1, Math.min(6, n)) : 1;
}

function patchLocalCloneTaskStep(taskId, cloneStep) {
  if (!taskId) return;
  const nowIso = new Date().toISOString();
  const pct = Math.max(0, Math.min(100, Math.round((cloneStep / 6) * 100)));
  S.tasksList = (S.tasksList || []).map(t => {
    if (String(t.id) !== String(taskId)) return t;
    const prev = parseInt(t.clone_step) || 1;
    return {
      ...t,
      clone_step: Math.max(prev, cloneStep),
      progress: Math.max(t.progress || 0, pct),
      activity_at: nowIso,
      updated_at: nowIso
    };
  });
}

// 保存当前克隆流程的关键状态到服务器（静默，失败不影响用户）
async function saveCloneSession(cloneStep) {
  const taskId = S.cloneTaskId;
  if (!taskId) return;
  cloneStep = Math.max(parseInt(cloneStep) || 1, currentCloneStepFromState());
  patchLocalCloneTaskStep(taskId, cloneStep);
  // 只保存纯数据（base64），不保存 Blob URL（跨会话无效）
  const session = {
    extractedScript:  S.extractedScript  || '',
    rewrittenScript:  S.rewrittenScript  || '',
    ttsVoice:         S.ttsVoice,
    ttsSpeed:         S.ttsSpeed,
    ttsAudioB64:      S.ttsAudioB64      || null,   // 步骤3完成后有值
    ttsIndexEmotion:  S.ttsIndexEmotion  || 'neutral',
    avatarVideoB64:   S.avatarVideoB64   || null,   // 步骤4完成后有值
    avatarTaskId:     S.avatarTaskId     || null,   // 数字人生成任务ID（生成中时有值）
    avatarAsrUrl:     S.avatarAsrUrl     || null,   // 数字人服务地址（用于恢复poller）
    avatarLibKey:     S.avatarLibKey     || null,
    avatarLibName:    S.avatarLibName    || '',
    avatarLibThumb:   S.avatarLibThumb   || '',
    subColor:         S.subColor,
    subOutlineColor:  S.subOutlineColor,
    subFontsize:      S.subFontsize,
    subOutlineWidth:  S.subOutlineWidth,
    subTemplate:      S.subTemplate,
    postProcessedB64: S.postProcessedB64 || null,   // 步骤5完成后有值
    coverFrameUrl:    S.coverFrameUrl    || null,   // 封面（dataURL，不大）
    coverTitle:       S.coverTitle       || '',
    publishTitle:     S.publishTitle     || '',
    publishTags:      S.publishTags      || [],
  };
  try {
    await api.post(`/tasks/${taskId}/session`, { clone_step: cloneStep, session });
    patchLocalCloneTaskStep(taskId, cloneStep);
  } catch (e) {
    console.warn('[saveCloneSession] 保存失败', e);
  }
}

async function touchCloneTaskActivity() {
  const taskId = S.cloneTaskId;
  if (!taskId) return;
  try {
    await api.post(`/tasks/${taskId}/touch`, {});
    const nowIso = new Date().toISOString();
    S.tasksList = (S.tasksList || []).map(t => String(t.id) === String(taskId)
      ? { ...t, activity_at: nowIso, updated_at: nowIso }
      : t);
  } catch (e) {
    console.warn('[touchCloneTaskActivity] 刷新失败', e);
  }
}

// 从服务器恢复克隆任务 session 状态，并跳到对应步骤
async function restoreCloneSession(taskId) {
  try {
    const r = await api.get(`/tasks/${taskId}/session`);
    if (r.code !== 200 || !r.data) return false;
    const { clone_step, session: s } = r.data;
    if (!s) return false;

    const patch = {
      extractedScript:      s.extractedScript || '',
      rewrittenScript:      s.rewrittenScript || '',
      ttsVoice:             s.ttsVoice        || 'xiaoxiao',
      ttsSpeed:             s.ttsSpeed        || 1.0,
      ttsIndexEmotion:      s.ttsIndexEmotion || 'neutral',
      avatarLibKey:         s.avatarLibKey    || null,
      avatarLibName:        s.avatarLibName   || '',
      avatarLibThumb:       s.avatarLibThumb  || '',
      subColor:             s.subColor        || '#FFFFFF',
      subOutlineColor:      s.subOutlineColor || '#000000',
      subFontsize:          s.subFontsize     || 44,
      subOutlineWidth:      s.subOutlineWidth || 2.5,
      subTemplate:          s.subTemplate     || 'classic',
      coverTitle:           s.coverTitle      || '',
      publishTitle:         s.publishTitle    || '',
      publishTags:          s.publishTags     || [],
      extractStep:          clone_step        || 2,
      // ★ 显式重置所有"进行中"状态，防止旧 session 脏数据残留
      avatarGenerating:     false,
      avatarTaskId:         null,
      avatarAsrUrl:         null,
      avatarVideoUrl:       null,
      avatarVideoB64:       null,
      avatarErr:            '',
      avatarProgressPct:    0,
      avatarProgressMsg:    '',
      ttsAudioUrl:          null,
      ttsAudioB64:          null,
      ttsGenerating:        false,
      ttsErr:               '',
      postProcessedVideoUrl: null,
      postProcessedB64:     null,
      postProcessing:       false,
      coverFrameUrl:        null,
    };
    // 音频 base64 → Blob URL 恢复
    if (s.ttsAudioB64) {
      patch.ttsAudioB64 = s.ttsAudioB64;
      patch.ttsAudioUrl = _b64ToBlobUrl(s.ttsAudioB64, 'audio/mp3');
    }
    // 数字人视频 base64 → Blob URL 恢复
    if (s.avatarVideoB64) {
      patch.avatarVideoB64 = s.avatarVideoB64;
      patch.avatarVideoUrl = _b64ToBlobUrl(s.avatarVideoB64, 'video/mp4');
    } else if (s.avatarTaskId && s.avatarAsrUrl) {
      // 视频未完成但有任务ID → 恢复"生成中"状态并重启poller
      patch.avatarTaskId    = s.avatarTaskId;
      patch.avatarAsrUrl    = s.avatarAsrUrl;
      patch.avatarGenerating = true;
      patch.extractStep     = 'avatar_gen';
      patch.avatarProgressMsg = '恢复中，继续等待生成...';
      patch.avatarProgressPct = 30;
      // setState 之后再启动 poller
      setTimeout(() => _startAvatarPoller(s.avatarTaskId, s.avatarAsrUrl), 500);
    }
    // 后期视频 base64 → Blob URL 恢复
    if (s.postProcessedB64) {
      patch.postProcessedB64 = s.postProcessedB64;
      patch.postProcessedVideoUrl = _b64ToBlobUrl(s.postProcessedB64, 'video/mp4');
    }
    // 封面（dataURL 可直接用）
    if (s.coverFrameUrl) patch.coverFrameUrl = s.coverFrameUrl;

    setState(patch);
    return true;
  } catch (e) {
    console.warn('[restoreCloneSession] 恢复失败', e);
    return false;
  }
}

async function openExtractWithTask(taskId, fromHistory) {
  // ★ 停掉上一个任务的 avatar poller，防止它继续污染全局状态
  if (_avatarPoller) { clearInterval(_avatarPoller); _avatarPoller = null; }

  // ★ 立即重置所有生成中状态，防止切换任务时上一个任务的状态残留
  setState({
    currentTab: 'extract', cloneTaskId: taskId, cloneTaskData: null,
    extractErr: '', extractFromHistory: !!fromHistory,
    avatarGenerating: false, avatarTaskId: null, avatarAsrUrl: null,
    avatarVideoUrl: null, avatarVideoB64: null, avatarErr: '',
    avatarProgressPct: 0, avatarProgressMsg: '',
    ttsAudioUrl: null, ttsAudioB64: null, ttsGenerating: false, ttsErr: '',
    postProcessedVideoUrl: null, postProcessedB64: null, postProcessing: false,
    coverFrameUrl: null, rewrittenScript: '', extractedScript: '', rewriteSourceExpanded: false,
  });
  try {
    const r = await api.get(`/tasks/${taskId}`);
    if (r.code !== 200) { setState({ extractStep: 0 }); return; }
    const task = r.data;
    setState({ cloneTaskData: task });
    if (task.status === 'extracted') {
      // 先尝试恢复 session（用户可能已经推进到步骤3+）
      const restoredEx = await restoreCloneSession(taskId);
      if (!restoredEx) {
        // 没有 session，从头开始（文案审核）
        setState({ extractStep: 'review', extractedScript: task.result?.transcript || '' });
      } else {
        // session 恢复成功，保证 extractedScript 也有值
        setState({ extractedScript: task.result?.transcript || '' });
      }
    } else if (task.status === 'pending' || task.status === 'running') {
      setState({ extractStep: (task.stage === 'rewrite' || task.stage === 'extracted') ? 'rewriting' : 'cloning' });
      startClonePoller(taskId);
    } else if (task.status === 'done') {
      const rewritten = task.result?.rewritten || task.result?.scripts?.[0]?.content || '';
      // 先恢复 session（有步骤3-6的进度），再设基础字段
      const restored = await restoreCloneSession(taskId);
      if (!restored) {
        setState({ extractStep: 2, rewrittenScript: rewritten, extractedScript: task.result?.transcript || '' });
      }
      // 如果 session 恢复成功，extractStep 已被 session 覆盖，但保证 rewrittenScript 最新
      if (restored) setState({ rewrittenScript: rewritten, extractedScript: task.result?.transcript || '' });
    } else {
      setState({ extractStep: 0 });
    }
  } catch { setState({ extractStep: 0 }); }
}
async function startCloneRewrite(taskId) {
  try {
    const r = await api.post(`/tasks/${taskId}/start-rewrite`, {});
    if (r.code === 200) { loadTasks(); startTasksPolling(); startTasksTickTimer(); }
    else showToast(r.msg || '触发改写失败');
  } catch { showToast('网络错误，请重试'); }
}

function stopExtractTranscribe() {
  if (extractTranscribeController) {
    extractTranscribeController.abort();
    extractTranscribeController = null;
    S.extractTranscribeController = null;
  }
  setState({ extractLoading: false, extractErr: '' });
}
async function handleRewrite() {
  if (!ensureLoggedIn()) return;
  if (!S.extractedScript || S.extractLoading) return;

function onAvatarFile(ev) {
  const f = ev.target.files && ev.target.files[0];
  ev.target.value = '';
  if (!f) return;
  if (f.size > 5 * 1024 * 1024) { showToast('图片需小于 5MB'); return; }
  loadAvatarImage(f).then(({ dataUrl, width, height }) => {
    setState({
      avatarCropOpen: true,
      avatarCropDataUrl: dataUrl,
      avatarCropMeta: { width, height },
      avatarCropScale: 100,
      avatarCropX: 0,
      avatarCropY: 0,
    });
  }).catch(() => showToast('图片处理失败'));
}
function loadAvatarImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => resolve({ dataUrl: String(reader.result || ''), width: img.width, height: img.height });
      img.onerror = () => reject(new Error('bad image'));
      img.src = String(reader.result || '');
    };
    reader.onerror = () => reject(new Error('read fail'));
    reader.readAsDataURL(file);
  });
}
function setAvatarCropScale(v) {
  const percent = Math.max(20, Math.min(220, Number(v) || 100));
  setState({ avatarCropScale: percent });
}
function startAvatarDrag(e) {
  if (!S.avatarCropOpen) return;
  S._avatarDrag = { x: e.clientX, y: e.clientY, ox: S.avatarCropX || 0, oy: S.avatarCropY || 0 };
}
function moveAvatarDrag(e) {
  if (!S._avatarDrag) return;
  const dx = e.clientX - S._avatarDrag.x;
  const dy = e.clientY - S._avatarDrag.y;
  S.avatarCropX = S._avatarDrag.ox + dx;
  S.avatarCropY = S._avatarDrag.oy + dy;
  render();
}
function endAvatarDrag() {
  S._avatarDrag = null;
}
function cancelAvatarCrop() {
  setState({ avatarCropOpen: false, avatarCropDataUrl: '', avatarCropMeta: null, avatarCropScale: 100, avatarCropX: 0, avatarCropY: 0 });
}
async function confirmAvatarCrop() {
  if (!S.avatarCropDataUrl || !S.avatarCropMeta) return;
  const outSize = 420;
  const previewSize = 220;
  const scale = Math.max(0.2, Number(S.avatarCropScale || 100) / 100);
  const x = Number(S.avatarCropX || 0);
  const y = Number(S.avatarCropY || 0);
  const source = new Image();
  source.src = S.avatarCropDataUrl;
  await new Promise((res, rej) => { source.onload = res; source.onerror = rej; });
  const base = Math.max(previewSize / source.width, previewSize / source.height);
  const drawScale = base * scale;
  const drawW = source.width * drawScale;
  const drawH = source.height * drawScale;
  const canvas = document.createElement('canvas');
  canvas.width = outSize;
  canvas.height = outSize;
  const ctx = canvas.getContext('2d');
  const ratio = outSize / previewSize;
  const dx = ((previewSize - drawW) / 2 + x) * ratio;
  const dy = ((previewSize - drawH) / 2 + y) * ratio;
  ctx.drawImage(source, dx, dy, drawW * ratio, drawH * ratio);
  const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
  try {
    const r = await api.put('/auth/profile', { avatar_image: dataUrl });
    if (r.code !== 200) { showToast(r.msg || '上传失败'); return; }
  } catch { showToast('网络错误'); return; }
  setState({ avatarCropOpen: false, avatarCropDataUrl: '', avatarCropMeta: null, avatarCropScale: 1, avatarCropX: 0, avatarCropY: 0 });
  await fetchMe();
  showToast('头像已更新');
}

    const asrUrl = urlR.data.url.replace(/\/$/, '');

function formatAvatarFileSize(size) {
  if (!size) return '';
  if (size >= 1024 * 1024) return `${(size / 1024 / 1024).toFixed(1)} MB`;
  if (size >= 1024) return `${Math.round(size / 1024)} KB`;
  return `${size} B`;
}

function handleAvatarMgmtFileSelect(ev) {
  const file = ev && ev.target && ev.target.files && ev.target.files[0];
  if (!file) return;
  if (file.size > 300 * 1024 * 1024) {
    setState({ avatarMgmtErr: '视频过大，请压缩到 300MB 以内后再上传' });
    return;
  }
  const fallbackName = file.name.replace(/\.[^.]+$/, '');
  setState({
    avatarMgmtPendingFile: file,
    avatarMgmtPendingFileName: file.name,
    avatarMgmtPendingFileSize: file.size || 0,
    avatarMgmtUploadName: S.avatarMgmtUploadName.trim() || fallbackName,
    avatarMgmtErr: '',
  });
}

async function submitAvatarUpload() {
  const u = S.userInfo;
  const file = S.avatarMgmtPendingFile;
  if (!u) return;
  if (!file) { setState({ avatarMgmtErr: '请先选择要上传的视频' }); return; }
  if (S.avatarMgmtUploading) return;
  setState({ avatarMgmtUploading: true, avatarMgmtErr: '' });
  try {
    const urlR = await api.get('/ai/asr-url');
    if (urlR.code !== 200) throw new Error('获取服务地址失败');
    const asrUrl = urlR.data.url.replace(/\/$/, '');
    const fd = new FormData();
    fd.append('user_id', String(u.id));
    fd.append('name', S.avatarMgmtUploadName.trim() || file.name.replace(/\.[^.]+$/, ''));
    fd.append('video', file);
    const r = await fetch(`${asrUrl}/avatar/upload`, { method: 'POST', body: fd, headers: { 'ngrok-skip-browser-warning': '1' } });
    if (!r.ok) { const t = await r.json(); throw new Error(t.detail || r.statusText); }
    setState({
      avatarMgmtUploading: false,
      avatarMgmtUploadName: '',
      avatarMgmtPendingFile: null,
      avatarMgmtPendingFileName: '',
      avatarMgmtPendingFileSize: 0,
    });
    showToast('上传成功 ✓');
    await loadAvatarList();
  } catch(e) {
    setState({ avatarMgmtUploading: false, avatarMgmtErr: '上传失败：' + e.message });

// ===== 任务页视图 =====
function taskCountdown(t) {
  if (t.status !== 'pending' && t.status !== 'running') return '';
  const expectedSecs = { profile_analyze: 180, single_video_analyze: 90, industry_gen: 20, clone_video: 90 };
  const expected = expectedSecs[t.type] || 120;
  const elapsed = Math.floor((Date.now() - new Date(t.created_at).getTime()) / 1000);
  const remaining = Math.max(0, expected - elapsed);
  if (remaining === 0) return `<span style="font-size:11px;color:#E8650A;font-weight:600">即将完成...</span>`;
  const m = Math.floor(remaining / 60), s = remaining % 60;
  const label = m > 0 ? `${m}分${s}秒` : `${s}秒`;
  return `<span style="font-size:11px;color:#A8A49C">预计还需 <b style="color:#E8650A">${label}</b></span>`;
}

// ===== 任务 API 函数 =====
function mergeActiveCloneTaskStep(list) {
  if (!S.cloneTaskId || !Array.isArray(list)) return list;
  const activeStep = currentCloneStepFromState();
  return list.map(t => String(t.id) === String(S.cloneTaskId)
    ? { ...t, clone_step: Math.max(parseInt(t.clone_step) || 1, activeStep) }
    : t);
}

async function loadTasks() {
  if (!getToken()) return;
  try {
    const r = await api.get('/tasks');
    if (r.code === 200) {
      const tasks = mergeActiveCloneTaskStep(r.data);
      setState({ tasksList: tasks, tasksLoaded: true });
      updateHomeDoneSeen();
      const hasRunning = tasks.some(t => t.status === 'pending' || t.status === 'running');
      if (hasRunning) { startTasksPolling(); startTasksTickTimer(); }
      else { stopTasksPolling(); stopTasksTickTimer(); }
    }
  } catch {}
}

function startTasksPolling() {
  if (tasksPollerTimer) return;
  tasksPollerTimer = setInterval(async () => {
    if (S.currentTab !== 'history' && S.currentTab !== 'home') return;
    try {
      const r = await api.get('/tasks');
      if (r.code === 200) {
        const tasks = mergeActiveCloneTaskStep(r.data);
        setState({ tasksList: tasks });
        updateHomeDoneSeen();
        const hasRunning = tasks.some(t => t.status === 'pending' || t.status === 'running');
        if (!hasRunning) { stopTasksPolling(); stopTasksTickTimer(); }
      }
    } catch {}
  }, 2500);
}

function startTasksTickTimer() {
  if (tasksTickTimer) return;
  tasksTickTimer = setInterval(() => {
    if (S.currentTab === 'home' || (S.currentTab === 'history' && S.historyTab === 'inspire')) render();
  }, 1000);
}

function stopTasksTickTimer() {
  if (tasksTickTimer) { clearInterval(tasksTickTimer); tasksTickTimer = null; }
}

function stopTasksPolling() {
  if (tasksPollerTimer) { clearInterval(tasksPollerTimer); tasksPollerTimer = null; }
}

async function openTask(taskId) {
  setState({ tasksView: 'detail', viewingTask: null });
  try {
    const r = await api.get(`/tasks/${taskId}`);
    if (r.code === 200) setState({ viewingTask: r.data });
    else setState({ tasksView: 'list' });
  } catch { setState({ tasksView: 'list' }); }
}

function cpTaskScript(e, taskId, idx) {
  e.stopPropagation();
  const t = S.viewingTask;
  if (!t || !t.result) return;
  const scripts = t.result.scripts || [];
  copyText(scripts[idx]?.content || '');
  setState({ tasksCopiedId: taskId + '_' + idx });
  setTimeout(() => { setState({ tasksCopiedId: '' }); }, 2000);
}

function cpPathBScript(e, idx) {
  e.stopPropagation();
  const s = S.pathBScripts[idx];
  if (!s) return;
  copyText(s.content || '');
  setState({ tasksCopiedId: 'pb_' + idx });
  setTimeout(() => { setState({ tasksCopiedId: '' }); }, 2000);
}

// ===== 路径A 进度轮询 =====
function startPathAPolling(taskId) {
  if (pathAPollerTimer) clearInterval(pathAPollerTimer);
  pathAPollerTimer = setInterval(async () => {
    try {
      const r = await api.get(`/tasks/${taskId}`);
      if (r.code === 200) {
        setState({ pathATaskData: r.data });
        if (r.data.status === 'done' || r.data.status === 'failed') {
          clearInterval(pathAPollerTimer);
          pathAPollerTimer = null;
        }
      }
    } catch {}
  }, 2500);
}

function stopPathAPolling() {
  if (pathAPollerTimer) { clearInterval(pathAPollerTimer); pathAPollerTimer = null; }
}

function cpPathAInlineScript(i) {
  const task = S.pathATaskData;
  if (!task) return;
  let result = {};
  try { result = typeof task.result === 'string' ? JSON.parse(task.result) : (task.result || {}); } catch {}
  const s = (result.scripts || [])[i];
  if (s) { copyText(s.content); showToast('已复制'); }
}

// ===== 路径A 函数 =====
async function pathAResolve() {
  if (!ensureLoggedIn()) return;
  const text = S.pathAText.trim();
  if (!text) { setState({ pathAErr: '请粘贴链接或分享文本' }); return; }
  setState({ pathALoading: true, pathAErr: '' });
  try {
    const r = await api.post('/inspire/resolve', { text });
    if (r.code !== 200) { setState({ pathAErr: r.msg, pathALoading: false }); return; }
    const data = r.data;

    if (data.type === 'video') {
      // 单视频 → 直接建任务
      const r2 = await api.post('/inspire/start-single-video', { aweme_id: data.aweme_id, brand_name: S.pathABrandName });
      if (r2.code !== 200) { setState({ pathAErr: r2.msg, pathALoading: false }); return; }
      setState({ pathALoading: false, pathAState: 'started', pathALastTaskId: r2.data.taskId, pathATaskData: null });
      startPathAPolling(r2.data.taskId);
    } else {
      // 主页 → 拉视频列表
      const r3 = await api.post('/inspire/profile-videos', { sec_user_id: data.sec_user_id });
      if (r3.code !== 200) { setState({ pathAErr: r3.msg, pathALoading: false }); return; }
      const top3 = r3.data.videos.slice(0, 3).map(v => v.aweme_id);
      setState({ pathALoading: false, pathAResolveData: data, pathAProfile: r3.data, pathASelectedIds: top3, pathAState: 'videos' });
    }
  } catch (e) {
    setState({ pathAErr: '网络错误，请重试', pathALoading: false });
  }
}

function pathAToggleVideo(awemeId) {
  const ids = [...S.pathASelectedIds];
  const idx = ids.indexOf(awemeId);
  if (idx >= 0) { ids.splice(idx, 1); setState({ pathASelectedIds: ids }); }
  else if (ids.length < 3) { setState({ pathASelectedIds: [...ids, awemeId] }); }
  else showToast('最多选 3 条视频');
}

async function pathAStartAnalyze() {
  if (!ensureLoggedIn()) return;
  if (S.pathASelectedIds.length === 0) { showToast('请至少选 1 条视频'); return; }
  setState({ pathALoading: true, pathAErr: '' });
  try {
    const r = await api.post('/inspire/start-analyze', {
      sec_user_id: S.pathAResolveData.sec_user_id,
      selected_video_ids: S.pathASelectedIds,
      brand_name: S.pathABrandName,
    });
    if (r.code !== 200) { setState({ pathAErr: r.msg, pathALoading: false }); return; }
    setState({ pathALoading: false, pathAState: 'started', pathALastTaskId: r.data.taskId, pathATaskData: null });
    startPathAPolling(r.data.taskId);
  } catch (e) {
    setState({ pathAErr: '网络错误，请重试', pathALoading: false });
  }
}

// ===== 路径B 函数 =====
function pathBSelectIndustry(id, name) {
  setState({ pathBIndustryId: id, pathBIndustryName: name, pathBCustom: '' });
}

async function pathBNext() {
  if (!ensureLoggedIn()) return;
  const industry = S.pathBIndustryName || S.pathBCustom.trim();
  if (!industry) { setState({ pathBErr: '请选择或输入行业' }); return; }
  setState({ pathBState: 'clarifying', pathBErr: '' });
  try {
    const r = await api.post('/inspire/clarify', { industry });
    if (r.code !== 200) { setState({ pathBState: 'form', pathBErr: r.msg }); return; }
    setState({ pathBState: 'clarify', pathBQuestions: r.data.questions, pathBAnswers: {} });
  } catch {
    setState({ pathBState: 'form', pathBErr: '网络错误，请重试' });
  }
}

function pathBSelectAnswer(questionId, option, type) {
  const answers = { ...S.pathBAnswers };
  if (type === 'multi') {
    const cur = Array.isArray(answers[questionId]) ? answers[questionId] : [];
    answers[questionId] = cur.includes(option) ? cur.filter(o => o !== option) : [...cur, option];
  } else {
    answers[questionId] = option;
  }
  setState({ pathBAnswers: answers });
}

async function pathBGenerate() {
  if (!ensureLoggedIn()) return;
  const industry = S.pathBIndustryName || S.pathBCustom.trim();
  setState({ pathBState: 'generating', pathBErr: '' });
  try {
    const answers = S.pathBQuestions.map(q => ({
      question: q.question,
      answer: S.pathBAnswers[q.id] || '(未选)',
    }));
    const r = await api.post('/inspire/generate-industry', { industry, brand_name: S.pathBBrandName, answers });
    if (r.code !== 200) { setState({ pathBState: 'clarify', pathBErr: r.msg }); return; }
    setState({ pathBState: 'done', pathBScripts: r.data.scripts, pathBTaskId: r.data.taskId });
  } catch {
    setState({ pathBState: 'clarify', pathBErr: '网络错误，请重试' });
  }
}

function scriptCopyText(s) {
  if (!s) return '';
  const hook = String(s.hook || '').trim();
  const body = String(s.content || '').trim();
  if (body && hook && body !== hook) return hook + '\n\n' + body;
  return body || hook;
}

function cpHistoryPage(e, hi, si) {
  e.stopPropagation();
  const it = S.recentHistory[hi];
  if (!it||!it.result) return;
  copyText(scriptCopyText(it.result[si]));
  showToast('已复制');
}

// ===== NICKNAME PROMPT =====
function tNicknamePrompt() {
  return `<div class="nickname-prompt">
    <span class="nickname-prompt-text">你叫什么？设置一个昵称吧 😊</span>
    <div class="nickname-prompt-row">
      <input class="nickname-prompt-input" id="f-nickname" placeholder="输入你的昵称" maxlength="20"
        value="${esc(S.nicknameInput)}" oninput="S.nicknameInput=this.value"/>
      <div class="nickname-prompt-confirm" onclick="confirmNickname()">确认</div>
    </div>
    <div class="nickname-prompt-skip" onclick="dismissNicknamePrompt()">跳过</div>
  </div>`;
}

async function confirmNickname() {
  const name = S.nicknameInput.trim();
  if (!name) { showToast('请输入昵称'); return; }
  try {
    await api.put('/auth/profile', { nickname: name });
  } catch {}
  const user = getUser() || {};
  setUser({ ...user, nickname: name });
  setState({ nicknamePrompt: false, nicknamePromptDismissed: true, userName: name, nicknameInput: '' });
  showToast('昵称已设置');
}

function dismissNicknamePrompt() {
  setState({ nicknamePrompt: false, nicknamePromptDismissed: true });
}

// ===== INIT =====
(function init() {
  const token = getToken();
  if (token) {
    const user = getUser();
    if (user) { S.userName = user.nickname||'创作者'; S.userPhone = user.phone||''; S.userAvatar = user.avatar||0; }
    render(); fetchMe(); loadIndustries(); loadAppH5Settings(); loadTasks(); loadCloneHistory();
  } else { render(); loadIndustries(); }
})();
</script>
