<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>爆款文案工坊</title>
  <style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #F2F0EA; }
body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif; -webkit-font-smoothing: antialiased; }
input, button, textarea { -webkit-appearance: none; appearance: none; font-family: inherit; border: none; outline: none; background: none; }
::-webkit-scrollbar { width: 0; height: 0; }

/* === APP WRAP === */
#app { width: 100%; height: 100%; }
.app-wrap {
  display: flex; flex-direction: column;
  height: 100vh; background: #F2F0EA; overflow: hidden;
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  max-width: 480px; margin: 0 auto;
}

/* === TOP BAR === */
.top-bar {
  display: flex; flex-direction: row; align-items: center;
  padding: calc(env(safe-area-inset-top, 0px) + 16px) 16px 10px;
  background: #F2F0EA; flex-shrink: 0;
}
.app-name { font-size: 17px; font-weight: 700; color: #1A1814; letter-spacing: .5px; }
.top-bar-login { font-size: 14px; font-weight: 600; color: #F97316; padding: 6px 4px; cursor: pointer; user-select: none; flex-shrink: 0; }
.top-bar-sub { justify-content: space-between; align-items: center; }
.back-btn { border: none; background: transparent; padding: 6px 0; margin: 0; font-size: 15px; font-weight: 500; color: #1A1814; cursor: pointer; user-select: none; display: inline-flex; align-items: center; line-height: 1.25; min-width: 56px; font-family: inherit; }
.sub-page-title { font-size: 16px; font-weight: 600; color: #1A1814; text-align: center; flex: 1; }

/* === CONTENT === */
.page-content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; min-height: 0; }
.tab-page { padding: 12px 16px 100px; }

/* === BUTTONS === */
.btn-primary {
  background: #FF6B35; color: #FFFFFF; border-radius: 50px;
  height: 46px; line-height: 46px; text-align: center;
  font-size: 15px; font-weight: 600; cursor: pointer; user-select: none; display: block; width: 100%;
}
.btn-secondary {
  background: #FFFFFF; color: #1A1814; border: 1px solid #E4E2DA;
  border-radius: 50px; height: 46px; line-height: 46px;
  text-align: center; font-size: 15px; flex: 1; margin-right: 8px; cursor: pointer; user-select: none;
}
.btn-disabled { opacity: .5; pointer-events: none; }
.action-row { display: flex; flex-direction: row; align-items: center; margin-top: 10px; }
.action-row .btn-primary { flex: 1.5; }

/* === HOME === */
.welcome-banner { background: linear-gradient(135deg,#FF6B35 0%,#FF8C5A 100%); border-radius: 12px; padding: 20px 18px; margin-bottom: 14px; }
.welcome-hi { display: block; font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 4px; }
.welcome-sub { display: block; font-size: 13px; color: rgba(255,255,255,.85); margin-bottom: 10px; }
.usage-bar { display: inline-flex; flex-direction: row; align-items: center; background: rgba(255,255,255,.2); border-radius: 50px; padding: 5px 10px; }
.usage-text { font-size: 12px; color: #fff; }
.usage-sep { font-size: 12px; color: rgba(255,255,255,.6); margin: 0 4px; }
.usage-empty { color: #FFD4C5; }
.feature-cards { margin-bottom: 14px; }
.feature-card { background: #fff; border-radius: 10px; padding: 14px 16px; margin-bottom: 12px; display: flex; flex-direction: row; align-items: center; box-shadow: 0 1px 8px rgba(0,0,0,.05); cursor: pointer; user-select: none; }
.feature-icon-wrap { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-right: 12px; flex-shrink: 0; }
.feature-icon-blue { background: rgba(99,102,241,.12); }
.feature-icon-orange { background: rgba(255,107,53,.12); }
.feature-icon { font-size: 18px; }
.feature-info { flex: 1; }
.feature-title { display: block; font-size: 15px; font-weight: 600; color: #1A1814; margin-bottom: 3px; }
.feature-desc { display: block; font-size: 12px; color: #A8A49C; line-height: 1.5; }
.feature-arrow { font-size: 22px; color: #CCCCCC; margin-left: 4px; }
.stats-row { display: flex; flex-direction: row; justify-content: space-around; background: #F5F4F1; border-radius: 10px; padding: 14px 8px; }
.stat-pill { display: flex; flex-direction: column; align-items: center; }
.stat-pill-num { font-size: 20px; font-weight: 700; color: #FF6B35; margin-bottom: 2px; }
.stat-pill-label { font-size: 11px; color: #A8A49C; }

/* === EXTRACT === */
.input-card { background: #fff; border-radius: 10px; padding: 16px; margin-bottom: 10px; }
.input-label { display: block; font-size: 12px; color: #A8A49C; margin-bottom: 8px; font-weight: 500; }
.url-textarea { background: #F7F6F2; border: 1px solid #E4E2DA; border-radius: 8px; padding: 12px 14px; font-size: 14px; color: #1A1814; width: 100%; min-height: 60px; margin-bottom: 12px; line-height: 1.6; resize: none; display: block; }
.url-textarea::placeholder { color: #C4C0B8; }
.err-text { display: block; color: #B83060; font-size: 12px; text-align: center; padding: 6px 0; }
.tip-card { background: rgba(99,102,241,.06); border-radius: 8px; padding: 14px 16px; }
.tip-title { display: block; font-size: 13px; font-weight: 600; color: #6366F1; margin-bottom: 8px; }
.tip-line { display: block; font-size: 12px; color: #6B6E99; margin-bottom: 5px; line-height: 1.6; }
.result-card { background: #fff; border-radius: 10px; padding: 14px; margin-bottom: 8px; }
.result-muted { opacity: .7; }
.result-highlight { border: 1px solid #FF6B35; }
.result-header-row { display: flex; flex-direction: row; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.result-label { font-size: 14px; font-weight: 600; color: #1A1814; }
.result-label-sm { display: block; font-size: 11px; color: #A8A49C; margin-bottom: 6px; }
.copy-btn { background: rgba(99,102,241,.1); color: #6366F1; border-radius: 50px; padding: 4px 12px; font-size: 12px; cursor: pointer; user-select: none; flex-shrink: 0; }
.copy-btn-strong { background: #6366F1; color: #fff; }
.thin-divider { height: 1px; background: #ECEAE2; margin-bottom: 10px; }
.script-text { display: block; font-size: 14px; color: #1A1814; line-height: 1.8; white-space: pre-wrap; word-break: break-all; }
.script-text-sm { display: block; font-size: 12px; color: #A8A49C; line-height: 1.7; white-space: pre-wrap; word-break: break-all; }
.editable-script-textarea { width: 100%; min-height: 180px; max-height: 45vh; overflow-y: auto; -webkit-overflow-scrolling: touch; background: #F7F6F2; border: 1px solid #E4E2DA; border-radius: 10px; padding: 12px; font-size: 14px; color: #1A1814; line-height: 1.8; resize: vertical; transition: background .2s ease, color .2s ease; }
.editable-script-textarea:focus { border-color: #F97316; outline: none; }
.editable-script-textarea.editable-disabled { background: #EEEEEA; color: #A8A49C; cursor: not-allowed; }
.result-card.rewrite-generating { position: relative; overflow: hidden; }
.result-card.rewrite-generating::before,
.result-card.rewrite-generating::after {
  content: ''; position: absolute; left: -40%; width: 40%; height: 3px;
  background: linear-gradient(90deg, rgba(249,115,22,0), rgba(249,115,22,.65), rgba(249,115,22,0));
  animation: rewriteWave 1.15s linear infinite;
}
.result-card.rewrite-generating::before { top: 0; }
.result-card.rewrite-generating::after { bottom: 0; animation-delay: .35s; }
@keyframes rewriteWave {
  0% { left: -40%; }
  100% { left: 100%; }
}

/* === INSPIRE === */
.section-card { background: #fff; border-radius: 10px; padding: 14px; margin-bottom: 8px; }
.section-label { display: block; font-size: 13px; font-weight: 600; color: #1A1814; margin-bottom: 10px; }
.industry-grid { display: flex; flex-direction: row; flex-wrap: wrap; }
.industry-item { background: #F7F6F2; color: #1A1814; border: 1px solid #E4E2DA; border-radius: 50px; padding: 6px 14px; font-size: 13px; margin-right: 8px; margin-bottom: 8px; cursor: pointer; user-select: none; }
.industry-active { background: #6366F1; color: #fff; border-color: #6366F1; }
.field-input { background: #F7F6F2; border: 1px solid #E4E2DA; border-radius: 8px; height: 44px; padding: 0 14px; font-size: 14px; color: #1A1814; width: 100%; display: block; }
.field-input::placeholder { color: #C4C0B8; }
.inspire-action-row { display: flex; flex-direction: row; align-items: center; margin-bottom: 8px; }
.inspire-generate-btn { flex: 1; }
.stop-btn { background: #fff; color: #B83060; border: 1px solid #B83060; border-radius: 50px; height: 46px; line-height: 46px; text-align: center; font-size: 14px; padding: 0 18px; margin-left: 8px; flex-shrink: 0; cursor: pointer; user-select: none; }
.section-title-row { display: flex; flex-direction: row; align-items: center; justify-content: space-between; margin-bottom: 8px; margin-top: 4px; }
.section-title-text { font-size: 14px; font-weight: 600; color: #1A1814; }
.matched-tag { font-size: 11px; color: #6366F1; background: rgba(99,102,241,.1); border-radius: 50px; padding: 3px 9px; }
.inspire-card { background: #fff; border-radius: 10px; padding: 14px; margin-bottom: 8px; cursor: pointer; }
.inspire-seq { display: inline-block; background: #6366F1; color: #fff; border-radius: 50%; width: 20px; height: 20px; line-height: 20px; text-align: center; font-size: 11px; font-weight: 600; margin-bottom: 6px; }
.inspire-hook { display: block; font-size: 15px; font-weight: 600; color: #1A1814; line-height: 1.6; margin-bottom: 6px; }
.inspire-tags-row { display: flex; flex-direction: row; flex-wrap: wrap; margin-bottom: 4px; }
.tag { background: rgba(99,102,241,.1); color: #6366F1; border-radius: 50px; padding: 3px 9px; font-size: 11px; margin-right: 6px; margin-bottom: 4px; }
.inspire-expand { margin-top: 2px; }
.inspire-full { display: block; font-size: 13.5px; color: #3A3A3A; line-height: 1.8; white-space: pre-wrap; margin-bottom: 10px; word-break: break-all; }
.inspire-btns { display: flex; flex-direction: row; align-items: center; justify-content: flex-end; }
.expand-btn { background: #FF6B35; color: #fff; border-radius: 50px; padding: 5px 14px; font-size: 12px; margin-left: 8px; cursor: pointer; user-select: none; }
.toggle-hint { display: block; font-size: 11px; color: #A8A49C; text-align: right; margin-top: 6px; }
.history-header-row { display: flex; flex-direction: row; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.history-toggle { color: #A8A49C; font-size: 13px; padding: 8px 0; cursor: pointer; user-select: none; }
.clear-btn { color: #B83060; font-size: 12px; padding: 6px 10px; border: 1px solid #B83060; border-radius: 50px; cursor: pointer; user-select: none; }
.empty-tip { text-align: center; color: #C4C0B8; font-size: 13px; padding: 20px; }
.history-card { background: #fff; border-radius: 8px; padding: 12px 14px; margin-bottom: 6px; cursor: pointer; }
.history-header { display: flex; flex-direction: row; align-items: center; justify-content: space-between; margin-bottom: 4px; }
.history-track { display: block; font-size: 14px; font-weight: 500; color: #1A1814; }
.history-time { display: block; font-size: 11px; color: #A8A49C; }
.history-count { font-size: 11px; color: #A8A49C; background: #F0EEE8; border-radius: 50px; padding: 2px 7px; }
.history-scripts { margin-top: 8px; border-top: 1px solid #F0EEE8; padding-top: 8px; }
.history-script-item { display: flex; flex-direction: row; align-items: flex-start; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #F7F6F2; }
.history-script-hook { flex: 1; font-size: 13px; color: #1A1814; line-height: 1.5; margin-right: 8px; }
.history-script-col { flex: 1; min-width: 0; margin-right: 8px; display: flex; flex-direction: column; align-items: stretch; }
.history-script-col .history-script-hook { flex: none; }
.history-script-content { display: block; font-size: 13px; color: #555; line-height: 1.75; white-space: pre-wrap; word-break: break-word; margin-top: 8px; padding-top: 8px; border-top: 1px dashed #ECEAE2; }

/* === PROFILE === */
.profile-hero { background: linear-gradient(135deg,#6366F1 0%,#818CF8 100%); border-radius: 12px; padding: 18px 16px 16px; margin-bottom: 12px; display: flex; flex-direction: column; align-items: stretch; }
.profile-hero-top { display: flex; flex-direction: row; align-items: center; width: 100%; margin-bottom: 14px; }
.profile-hero-mid { flex: 1; min-width: 0; display: flex; flex-direction: column; align-items: flex-start; justify-content: center; padding: 0 10px 0 12px; }
.profile-phone-inline { display: block; font-size: 12px; color: rgba(255,255,255,.72); margin-top: 4px; }
.avatar-lg { width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 0; position: relative; overflow: hidden; flex-shrink: 0; }
.avatar-type-0 { background: rgba(124,58,237,.55); }
.avatar-type-1 { background: rgba(249,115,22,.55); }
.avatar-type-2 { background: rgba(59,130,246,.55); }
.avatar-type-3 { background: rgba(16,185,129,.55); }
.avatar-lg-text { font-size: 28px; line-height: 1; }
.avatar-lg-img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; display: block; }
.profile-name { display: block; font-size: 17px; font-weight: 700; color: #fff; margin-bottom: 0; user-select: none; line-height: 1.25; word-break: break-all; }
.profile-edit-entry { flex-shrink: 0; align-self: center; font-size: 13px; font-weight: 600; color: #4F46E5; padding: 8px 12px; border-radius: 50px; background: #fff; cursor: pointer; user-select: none; white-space: nowrap; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
.nickname-edit-wrap { display: flex; flex-direction: row; align-items: center; margin-bottom: 12px; gap: 6px; }
.nickname-edit-input { flex: 1; background: rgba(255,255,255,.25); border: 1px solid rgba(255,255,255,.5); border-radius: 8px; height: 36px; padding: 0 10px; font-size: 14px; color: #fff; }
.nickname-edit-input::placeholder { color: rgba(255,255,255,.6); }
.nickname-edit-save { background: #fff; color: #6366F1; border-radius: 8px; height: 36px; line-height: 36px; padding: 0 14px; font-size: 13px; font-weight: 600; cursor: pointer; user-select: none; flex-shrink: 0; }
.nickname-edit-cancel { background: rgba(255,255,255,.2); color: #fff; border-radius: 8px; height: 36px; line-height: 36px; padding: 0 12px; font-size: 13px; cursor: pointer; user-select: none; flex-shrink: 0; }
.usage-stats { display: flex; flex-direction: row; align-items: center; background: rgba(255,255,255,.15); border-radius: 10px; padding: 10px 16px; width: 100%; justify-content: space-around; }
.stat-item { display: flex; flex-direction: column; align-items: center; }
.stat-num { font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 3px; }
.stat-label { font-size: 11px; color: rgba(255,255,255,.75); }
.stat-empty { color: #FFD4C5; }
.stat-divider { width: 1px; height: 30px; background: rgba(255,255,255,.3); }
.avatar-picker { background: #fff; border-radius: 10px; padding: 14px; margin-bottom: 8px; }
.avatar-options { display: flex; flex-direction: row; justify-content: space-around; margin-top: 8px; }
.avatar-option { display: flex; flex-direction: column; align-items: center; padding: 4px; border-radius: 8px; border: 2px solid transparent; cursor: pointer; user-select: none; }
.avatar-option-active { border-color: #6366F1; background: rgba(99,102,241,.06); }
.avatar-opt-circle { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.avatar-opt-0 { background: #7C3AED; }
.avatar-opt-1 { background: #F97316; }
.avatar-opt-2 { background: #3B82F6; }
.avatar-opt-3 { background: #10B981; }
.avatar-opt-emoji { font-size: 22px; }
.profile-section { background: #fff; border-radius: 10px; padding: 14px; margin-bottom: 8px; }
.profile-section-title { display: block; font-size: 12px; color: #A8A49C; font-weight: 500; margin-bottom: 10px; }
.profile-row { display: flex; flex-direction: row; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #F0EEE8; }
.profile-row:last-child { border-bottom: none; }
.profile-key { font-size: 14px; color: #1A1814; }
.profile-val { font-size: 14px; color: #A8A49C; }
.val-green { color: #2D7A3A; font-weight: 500; }
.code-row { display: flex; flex-direction: row; align-items: center; }
.code-input { flex: 1; background: #F7F6F2; border: 1px solid #E4E2DA; border-radius: 6px 0 0 6px; padding: 0 12px; font-size: 14px; color: #1A1814; height: 44px; }
.code-input::placeholder { color: #C4C0B8; }
.code-submit { background: #FFD8C4; color: #9A3412; border-radius: 0 6px 6px 0; padding: 0 16px; height: 44px; line-height: 44px; font-size: 14px; font-weight: 600; cursor: pointer; user-select: none; flex-shrink: 0; }
.code-msg { display: block; font-size: 12px; margin-top: 6px; }
.code-ok { color: #2D7A3A; }
.code-err { color: #B83060; }
.code-activated { background: rgba(45,122,58,.06); border-radius: 6px; padding: 10px; }
.code-activated-text { font-size: 13px; color: #2D7A3A; line-height: 1.6; }
.vip-upgrade-card { background: linear-gradient(135deg,#FF6B35 0%,#FF8C5A 100%); border-radius: 12px; padding: 20px 16px; margin-bottom: 10px; display: flex; flex-direction: row; align-items: center; cursor: pointer; user-select: none; }
.vip-upgrade-left { flex: 1; }
.vip-upgrade-title { display: block; font-size: 17px; font-weight: 700; color: #fff; margin-bottom: 6px; }
.vip-upgrade-sub { display: block; font-size: 13px; color: rgba(255,255,255,.88); line-height: 1.45; }
.vip-upgrade-arrow { font-size: 24px; color: rgba(255,255,255,.85); margin-left: 6px; }
.logout-btn { background: #fff; border: 1px solid #E4E2DA; border-radius: 10px; padding: 14px 16px; text-align: center; margin-top: 18px; margin-bottom: 8px; color: #6B6560; font-size: 15px; font-weight: 500; cursor: pointer; user-select: none; }

/* === VIP === */
.vip-hero { background: linear-gradient(135deg,#1A1814 0%,#3A3530 100%); border-radius: 12px; padding: 28px 18px 24px; margin-bottom: 14px; display: flex; flex-direction: column; align-items: center; }
.vip-hero-icon { font-size: 40px; margin-bottom: 8px; }
.vip-hero-title { display: block; font-size: 20px; font-weight: 700; color: #fff; margin-bottom: 5px; }
.vip-hero-sub { display: block; font-size: 13px; color: rgba(255,255,255,.6); }
.plan-grid { display: flex; flex-direction: row; flex-wrap: wrap; margin: 0 -4px 8px; }
.plan-card { width: calc(50% - 8px); margin: 4px; background: #fff; border: 1px solid #E4E2DA; border-radius: 10px; padding: 14px 12px; position: relative; cursor: pointer; user-select: none; }
.plan-active { border-color: #6366F1; background: rgba(99,102,241,.04); }
.plan-name { display: block; font-size: 14px; font-weight: 600; color: #1A1814; margin-bottom: 3px; }
.plan-duration { display: block; font-size: 11px; color: #A8A49C; margin-bottom: 6px; }
.plan-price { display: block; font-size: 16px; font-weight: 700; color: #FF6B35; }
.plan-badge { position: absolute; top: -1px; right: 8px; background: #FF6B35; color: #fff; font-size: 10px; padding: 2px 7px; border-radius: 0 0 6px 6px; }
.payment-row { display: flex; flex-direction: row; margin-bottom: 14px; }
.payment-item { flex: 1; background: #fff; border: 1px solid #E4E2DA; border-radius: 8px; padding: 12px; display: flex; flex-direction: column; align-items: center; margin-right: 8px; cursor: pointer; user-select: none; }
.payment-item:last-child { margin-right: 0; }
.payment-active { border-color: #6366F1; background: rgba(99,102,241,.04); }
.payment-icon { width: 36px; height: 36px; margin-bottom: 4px; display: flex; align-items: center; justify-content: center; }
.payment-name { font-size: 13px; color: #1A1814; }
.pay-btn { background: #FF6B35; color: #fff; border-radius: 50px; height: 50px; line-height: 50px; text-align: center; font-size: 16px; font-weight: 600; margin-bottom: 12px; cursor: pointer; user-select: none; }

/* === BOTTOM TAB === */
.bottom-tab { display: flex; flex-direction: row; background: #fff; border-top: 1px solid #ECEAE2; padding-bottom: env(safe-area-inset-bottom, 0px); flex-shrink: 0; }
.tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 10px 0 8px; cursor: pointer; user-select: none; }
.tab-icon { font-size: 22px; margin-bottom: 4px; opacity: .35; }
.tab-label { font-size: 11px; color: #A8A49C; }
.tab-active .tab-icon { opacity: 1; }
.tab-active .tab-label { color: #F97316; font-weight: 600; }

/* === PAY MODAL === */
.pay-modal-mask { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; z-index: 100; }
.pay-modal { background: #fff; border-radius: 12px; padding: 24px 20px; width: 280px; display: flex; flex-direction: column; align-items: center; }
.pay-modal-icon { font-size: 36px; margin-bottom: 8px; }
.pay-modal-title { display: block; font-size: 16px; font-weight: 700; color: #1A1814; margin-bottom: 8px; }
.pay-modal-note { display: block; font-size: 13px; color: #A8A49C; text-align: center; margin-bottom: 16px; line-height: 1.6; }
.pay-modal-btn { background: #FF6B35; color: #fff; border-radius: 50px; padding: 0 30px; height: 44px; line-height: 44px; font-size: 15px; font-weight: 600; cursor: pointer; }

/* === AUTH BOTTOM SHEET === */
.auth-sheet-mask {
  position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 220;
  display: flex; align-items: flex-end; justify-content: center;
}
.auth-sheet {
  width: 100%; max-width: 480px; background: #F2F0EA;
  border-radius: 18px 18px 0 0;

function getToken() { return localStorage.getItem('wf_token') || ''; }

async function apiFetch(method, path, data, signal) {
  const token = getToken();
  const opts = { method, headers: { 'Content-Type': 'application/json', ...(token ? { 'Authorization': `Bearer ${token}` } : {}) } };
  if (data) opts.body = JSON.stringify(data);
  if (signal) opts.signal = signal;
  const res = await fetch(API_BASE + path, opts);
  const raw = await res.text();
  if (!raw.trim()) {
    return { code: res.status || 500, msg: res.status >= 500 ? '服务器无响应内容，请稍后重试' : '请求失败' };
  }
  try {
    const j = JSON.parse(raw);
    if (j && typeof j.msg === 'string' && j.msg.length > 200) j.msg = j.msg.slice(0, 200) + '…';
    return j;
  } catch {
    return { code: res.status || 500, msg: `服务器返回非 JSON（${res.status}），请检查网关或部署日志` };

}

function formatDisplayTime(iso) {
  if (iso == null || iso === '') return '';
  const d = new Date(iso);
  if (Number.isNaN(d.getTime())) return String(iso).replace('T', ' ').slice(0, 16);
  const p = (n) => (n < 10 ? '0' : '') + n;
  return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}

// ===== LOGIN HANDLERS =====
function setLoginMode() { setState({ isRegMode: false, authErr: '' }); }
function setRegMode()   { setState({ isRegMode: true,  authErr: '' }); }

async function handleAuth() {
  if (S.loading) return;
  const phone = S.phone.trim(), pwd = S.password;
  if (!phone || !pwd)             { setState({ authErr: '请输入手机号和密码' }); return; }
  if (!/^1[3-9]\d{9}$/.test(phone)) { setState({ authErr: '手机号格式不正确' }); return; }
  if (pwd.length < 6)             { setState({ authErr: '密码至少6位' }); return; }
  setState({ loading: true, authErr: '' });
  try {
    const r = await api.post(S.isRegMode ? '/auth/register' : '/auth/login', { phone, password: pwd });
    if (r.code === 200) {
      setToken(r.data.token); setUser(r.data.user);
      showToast(S.isRegMode ? '注册成功' : '登录成功');
      if (S.showAuthSheet) {
        // 来自底部浮层登录
        setState({
          showAuthSheet: false,
          loading: false,
          authErr: '',
          userName: r.data.user.nickname || '创作者',
          userPhone: r.data.user.phone || '',
          userAvatar: r.data.user.avatar || 0,
        });
        fetchMe(); loadIndustries();
      } else {
        setTimeout(() => {
          Object.assign(S, {
            showAuthSheet: false, loading: false,
            userName: r.data.user.nickname || '创作者',
            userPhone: r.data.user.phone || '',
            userAvatar: r.data.user.avatar || 0,
          });
          render(); fetchMe(); loadIndustries();
        }, 600);
      }
    } else {
      setState({ authErr: r.msg || '操作失败，请重试', loading: false });
    }
  } catch { setState({ authErr: '网络错误，请稍后重试', loading: false }); }
}

function switchTab(tab) {
  const resetProfile = tab !== 'profile';
  setState({
    currentTab: tab,
    nicknamePrompt: false,
    ...(resetProfile ? { profileView: 'main', avatarCropOpen: false, avatarCropDataUrl: '' } : {}),
  });
  if (tab === 'profile') fetchMe();

  if (tab === 'home') {

  if (tab === 'history') {

}

  if (S.currentTab === 'history') {

async function fetchMe() {
  try {
    const r = await api.get('/auth/me');
    if (r.code === 200) {
      const hasNickname = !!(r.data.nickname && r.data.nickname.trim());
      setState({
        userInfo: r.data,
        userName: r.data.nickname || '创作者',
        nicknamePrompt: !hasNickname && !S.nicknamePromptDismissed && S.currentTab === 'home',
      });
    } else if (r.code === 401) { apiUnauthorized(r); }
  } catch {}
  if (!S.recentHistoryLoaded) loadRecentHistory();
  if (!S.homeHistoryLoaded) loadHomeHistory();
}
async function loadIndustries() {
  try {
    const r = await api.get('/config/industries');
    if (r.code === 200) { S.industries = r.data || []; render(); }
  } catch {}
}

// ===== EXTRACT =====
async function handleExtract() {
  if (!ensureLoggedIn()) return;
  if (!S.videoUrl.trim() || S.extractLoading) return;
  extractTranscribeController = new AbortController();
  S.extractTranscribeController = extractTranscribeController;
  setState({ extractLoading: true, extractErr: '' });
  const tid = setTimeout(() => {
    if (extractTranscribeController) extractTranscribeController.abort();
  }, 300000);
  try {
    const r = await api.post('/video/douyin-to-text', { url: S.videoUrl.trim() }, extractTranscribeController.signal);
    clearTimeout(tid);
    extractTranscribeController = null;
    S.extractTranscribeController = null;
    if (apiUnauthorized(r)) setState({ extractLoading: false });
    else if (r.code === 200) setState({ extractedScript: r.data.script, extractStep: 1, extractLoading: false });
    else setState({ extractErr: r.msg || '提取失败，请检查链接是否正确', extractLoading: false });
  } catch(e) {
    clearTimeout(tid);
    extractTranscribeController = null;
    S.extractTranscribeController = null;
    if (e && e.name === 'AbortError') setState({ extractErr: '', extractLoading: false });
    else setState({ extractErr: '网络超时，请重试', extractLoading: false });
  }
}
function stopExtractTranscribe() {
  if (extractTranscribeController) {
    extractTranscribeController.abort();
    extractTranscribeController = null;
    S.extractTranscribeController = null;
  }
  setState({ extractLoading: false, extractErr: '' });
}
async function handleRewrite() {
  if (!ensureLoggedIn()) return;
  if (!S.extractedScript || S.extractLoading) return;
  extractController = new AbortController();
  S.extractController = extractController;
  setState({ extractLoading: true, extractErr: '', rewriteGenerating: true });
  try {
    const body = { text: S.extractedScript };
    if (S.rewriteStyle) body.style = S.rewriteStyle;
    const r = await api.post('/ai/rewrite', body, extractController.signal);
    extractController = null;
    S.extractController = null;
    if (apiUnauthorized(r)) setState({ extractLoading: false, rewriteGenerating: false });
    else if (r.code === 200) { setState({ rewrittenScript: r.data.result, extractStep: 2, extractLoading: false, rewriteGenerating: false }); fetchMe(); refreshHistory(); }
    else setState({ extractErr: r.msg || 'AI改写失败', extractLoading: false, rewriteGenerating: false });
  } catch (e) {
    extractController = null;
    S.extractController = null;
    if (e && e.name === 'AbortError') setState({ extractErr: '', extractLoading: false, rewriteGenerating: false });
    else setState({ extractErr: '网络错误，请稍后重试', extractLoading: false, rewriteGenerating: false });
  }
}
function stopExtractRewrite() {
  if (extractController) {
    extractController.abort();
    extractController = null;
    S.extractController = null;
  }
  setState({ extractLoading: false, rewriteGenerating: false });
}
function rewriteAgain() {
  // 重新基于原始文案（可编辑后的最新值）改写：保持当前文案可视，但进入灰态不可编辑与波纹生成态
  setState({ extractErr: '', rewriteGenerating: true });
  handleRewrite();
}
function resetExtract() {
  if (extractController) {
    extractController.abort();
    extractController = null;
    S.extractController = null;
  }
  if (extractTranscribeController) {
    extractTranscribeController.abort();
    extractTranscribeController = null;
    S.extractTranscribeController = null;
  }
  setState({ extractStep: 0, videoUrl: '', extractedScript: '', rewrittenScript: '', extractErr: '', rewriteStyle: '', rewriteGenerating: false, extractLoading: false });
}
function selectStyle(s) { setState({ rewriteStyle: S.rewriteStyle === s ? '' : s }); }
async function pasteFromClipboard() {
  try {
    const text = await navigator.clipboard.readText();
    setState({ videoUrl: text });
  } catch { showToast('请手动长按粘贴'); }
}
function copyExtracted() { copyText(S.extractedScript); setState({ copiedId: 'extracted' }); setTimeout(()=>setState({copiedId:''}),1500); }
function copyRewritten() { copyText(S.rewrittenScript); setState({ copiedId: 'rewritten' }); setTimeout(()=>setState({copiedId:''}),1500); }

async function handleInspire() {
  if (!ensureLoggedIn()) return;
  const track = S.customTrack.trim() || S.selectedIndustryName;
  if (!track || S.inspireLoading) return;
  inspireController = new AbortController();
  setState({ inspireLoading: true, inspireErr: '', inspireScripts: [], matchedIndustry: '' });
  const body = S.selectedIndustryId
    ? { track: S.selectedIndustryName, industryId: S.selectedIndustryId }
    : { track: S.customTrack.trim() };
  try {

function onAvatarFile(ev) {
  const f = ev.target.files && ev.target.files[0];
  ev.target.value = '';
  if (!f) return;
  if (f.size > 5 * 1024 * 1024) { showToast('图片需小于 5MB'); return; }
  loadAvatarImage(f).then(({ dataUrl, width, height }) => {
    setState({
      avatarCropOpen: true,
      avatarCropDataUrl: dataUrl,
      avatarCropMeta: { width, height },
      avatarCropScale: 100,
      avatarCropX: 0,
      avatarCropY: 0,
    });
  }).catch(() => showToast('图片处理失败'));
}
function loadAvatarImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => resolve({ dataUrl: String(reader.result || ''), width: img.width, height: img.height });
      img.onerror = () => reject(new Error('bad image'));
      img.src = String(reader.result || '');
    };
    reader.onerror = () => reject(new Error('read fail'));
    reader.readAsDataURL(file);
  });
}
function setAvatarCropScale(v) {
  const percent = Math.max(20, Math.min(220, Number(v) || 100));
  setState({ avatarCropScale: percent });
}
function startAvatarDrag(e) {
  if (!S.avatarCropOpen) return;
  S._avatarDrag = { x: e.clientX, y: e.clientY, ox: S.avatarCropX || 0, oy: S.avatarCropY || 0 };
}
function moveAvatarDrag(e) {
  if (!S._avatarDrag) return;
  const dx = e.clientX - S._avatarDrag.x;
  const dy = e.clientY - S._avatarDrag.y;
  S.avatarCropX = S._avatarDrag.ox + dx;
  S.avatarCropY = S._avatarDrag.oy + dy;
  render();
}
function endAvatarDrag() {
  S._avatarDrag = null;
}
function cancelAvatarCrop() {
  setState({ avatarCropOpen: false, avatarCropDataUrl: '', avatarCropMeta: null, avatarCropScale: 100, avatarCropX: 0, avatarCropY: 0 });
}
async function confirmAvatarCrop() {
  if (!S.avatarCropDataUrl || !S.avatarCropMeta) return;
  const outSize = 420;
  const previewSize = 220;
  const scale = Math.max(0.2, Number(S.avatarCropScale || 100) / 100);
  const x = Number(S.avatarCropX || 0);
  const y = Number(S.avatarCropY || 0);
  const source = new Image();
  source.src = S.avatarCropDataUrl;
  await new Promise((res, rej) => { source.onload = res; source.onerror = rej; });
  const base = Math.max(previewSize / source.width, previewSize / source.height);
  const drawScale = base * scale;
  const drawW = source.width * drawScale;
  const drawH = source.height * drawScale;
  const canvas = document.createElement('canvas');
  canvas.width = outSize;
  canvas.height = outSize;
  const ctx = canvas.getContext('2d');
  const ratio = outSize / previewSize;
  const dx = ((previewSize - drawW) / 2 + x) * ratio;
  const dy = ((previewSize - drawH) / 2 + y) * ratio;
  ctx.drawImage(source, dx, dy, drawW * ratio, drawH * ratio);
  const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
  try {
    const r = await api.put('/auth/profile', { avatar_image: dataUrl });
    if (r.code !== 200) { showToast(r.msg || '上传失败'); return; }
  } catch { showToast('网络错误'); return; }
  setState({ avatarCropOpen: false, avatarCropDataUrl: '', avatarCropMeta: null, avatarCropScale: 1, avatarCropX: 0, avatarCropY: 0 });
  await fetchMe();
  showToast('头像已更新');
}

function tHistory() {
  const tabs = `<div class="history-tabs">
    <div class="history-tab-btn ${S.historyTab==='clone'?'history-tab-btn-active':''}" onclick="switchHistoryTab('clone')">📋 文案克隆</div>

  </div>`;

  if (S.historyTab === 'inspire') {
    const items = S.recentHistory;
    if (items.length === 0) return `<div class="tab-page">${tabs}
      <div style="display:flex;flex-direction:column;align-items:center;padding-top:40px">
        <div style="font-size:36px;margin-bottom:10px">✨</div>
        <div style="font-size:14px;color:#A8A49C;margin-bottom:16px">还没有灵感记录</div>
        <div class="btn-primary" style="width:auto;padding:0 28px" onclick="switchTab('inspire')">去创作</div>
      </div></div>`;
    return `<div class="tab-page">${tabs}
      ${items.map((it,i)=>`
        <div class="history-page-card" onclick="toggleHistoryPage(${i})">
          <span class="history-page-track">${esc(it.input||it.track||'历史记录')}</span>
          ${it.result&&it.result[0]?`<div class="history-page-hook">${esc(it.result[0].hook||'')}</div>`:''}
          <div class="history-page-meta">
            <span class="history-page-time">${esc(formatDisplayTime(it.created_at))}</span>
            ${Array.isArray(it.result)?`<span class="history-page-count">${it.result.length}条</span>`:''}
          </div>
          ${S.historyPageExpanded===i&&Array.isArray(it.result)?`
            <div class="history-scripts">
              ${it.result.map((s,si)=>`
                <div class="history-script-item">
                  <div class="history-script-col">
                    ${s.hook?`<span class="history-script-hook">${esc(s.hook)}</span>`:''}
                    ${s.content&&String(s.content).trim()!==String(s.hook||'').trim()?`<span class="history-script-content">${esc(s.content)}</span>`:''}
                    ${!s.hook&&s.content?`<span class="history-script-hook">${esc(s.content)}</span>`:''}
                  </div>
                  <div class="copy-btn" onclick="cpHistoryPage(event,${i},${si})">复制</div>
                </div>`).join('')}
            </div>`:''}
        </div>`).join('')}
    </div>`;
  }

  const citems = S.cloneHistory;
  if (citems.length === 0) return `<div class="tab-page">${tabs}
    <div style="display:flex;flex-direction:column;align-items:center;padding-top:40px">
      <div style="font-size:36px;margin-bottom:10px">📋</div>
      <div style="font-size:14px;color:#A8A49C;margin-bottom:16px">还没有克隆记录</div>
      <div class="btn-primary" style="width:auto;padding:0 28px" onclick="switchTab('extract')">去克隆</div>
    </div></div>`;
  return `<div class="tab-page">${tabs}
    ${citems.map((it,i)=>{
      const text = typeof it.result === 'string' ? it.result : (it.result?.content || it.result?.result || '');
      const expanded = S.historyPageExpanded === ('c'+i);
      return `<div class="history-page-card" onclick="toggleClonePage(${i})">
        <span class="history-page-track" style="font-size:13px;font-weight:400;color:#A8A49C">原文</span>
        <div class="history-page-hook" style="-webkit-line-clamp:1">${esc(it.input||'')}</div>
        <div class="history-page-meta">
          <span class="history-page-time">${esc(formatDisplayTime(it.created_at))}</span>

        </div>

          <div style="margin-top:10px;padding-top:10px;border-top:1px solid #F0EEE8">

            <div style="display:flex;justify-content:flex-end;margin-top:10px">
              <div class="copy-btn" onclick="cpClonePage(event,${i})">复制全文</div>
            </div>
          </div>`:''}
      </div>`;
    }).join('')}
  </div>`;
}

function toggleHistoryPage(i) { setState({ historyPageExpanded: S.historyPageExpanded===i?null:i }); }
function toggleClonePage(i) { const key='c'+i; setState({ historyPageExpanded: S.historyPageExpanded===key?null:key }); }

function scriptCopyText(s) {
  if (!s) return '';
  const hook = String(s.hook || '').trim();
  const body = String(s.content || '').trim();
  if (body && hook && body !== hook) return hook + '\n\n' + body;
  return body || hook;
}
