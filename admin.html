<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>爆款文案工坊 - 后台管理</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F0F2FF; font-family: 'PingFang SC', -apple-system, sans-serif; min-height: 100vh; }
    .header { background: #fff; border-bottom: 1px solid #E8EDFF; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .header h1 { font-size: 18px; font-weight: 800; color: #1E1B4B; }
    .logout-btn { background: rgba(239,68,68,0.08); color: #EF4444; border: none; padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; }
    .main-tabs { display: flex; gap: 0; background: #fff; border-bottom: 2px solid #E8EDFF; padding: 0 32px; }
    .main-tab { padding: 14px 24px; font-size: 14px; font-weight: 600; color: #6B7280; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; border: none; background: none; }
    .main-tab.active { color: #6366F1; border-bottom-color: #6366F1; }
    .container { max-width: 960px; margin: 28px auto; padding: 0 24px; }
    .section { background: #fff; border-radius: 16px; border: 1px solid #E8EDFF; padding: 24px; margin-bottom: 20px; }
    .section h2 { font-size: 15px; font-weight: 700; color: #1E1B4B; margin-bottom: 18px; padding-bottom: 12px; border-bottom: 1px solid #E8EDFF; }
    .form-row { margin-bottom: 14px; }
    .form-row label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 5px; }
    .form-row input, .form-row select, .form-row textarea {
      width: 100%; padding: 10px 13px; border: 2px solid #E8EDFF; border-radius: 10px;
      font-size: 14px; color: #1E1B4B; outline: none; font-family: inherit; transition: border-color 0.2s;
    }
    .form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: #6366F1; }
    .form-row textarea { min-height: 100px; resize: vertical; font-family: 'Menlo','Courier New',monospace; font-size: 13px; line-height: 1.6; }
    .form-row .hint { font-size: 12px; color: #9CA3AF; margin-top: 4px; }
    .btn-primary { background: linear-gradient(135deg,#6366F1,#818CF8); color: #fff; border: none; padding: 10px 24px; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; }
    .btn-secondary { background: #F3F4F6; color: #374151; border: none; padding: 9px 18px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 7px; border: none; cursor: pointer; font-weight: 600; }
    .btn-sm-primary { background: rgba(99,102,241,0.12); color: #6366F1; }
    .btn-sm-danger { background: rgba(239,68,68,0.08); color: #EF4444; }
    .btn-sm-warning { background: rgba(245,158,11,0.1); color: #D97706; }
    .msg { padding: 9px 14px; border-radius: 9px; font-size: 13px; margin-bottom: 14px; display: none; }
    .msg.success { background: rgba(34,197,94,0.1); color: #16A34A; display: block; }
    .msg.error { background: rgba(239,68,68,0.1); color: #DC2626; display: block; }
    .tab-bar { display: flex; gap: 6px; margin-bottom: 18px; }
    .tab { padding: 8px 16px; border-radius: 9px; font-size: 13px; font-weight: 600; cursor: pointer; color: #6B7280; background: #F3F4F6; border: none; }
    .tab.active { background: #6366F1; color: #fff; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
    @media(max-width:600px) { .grid-2,.grid-3 { grid-template-columns: 1fr; } .main-tabs { padding: 0 16px; } .container { padding: 0 16px; } }
    /* Prompt items */
    .prompt-item { border: 1px solid #E8EDFF; border-radius: 10px; overflow: hidden; margin-bottom: 6px; }
    .prompt-item-head { display: flex; align-items: center; padding: 10px 14px; cursor: pointer; gap: 10px; background: #fff; }
    .prompt-item-head:hover { background: #F8F9FF; }
    .prompt-item-body { display: none; border-top: 1px solid #E8EDFF; padding: 12px 14px; background: #FAFBFF; }
    .prompt-item-body.open { display: block; }
    .badge { font-size: 11px; padding: 2px 8px; border-radius: 8px; font-weight: 600; white-space: nowrap; }
    .badge-purple { color: #6366F1; background: rgba(99,102,241,0.08); }
    .badge-yellow { color: #D97706; background: rgba(245,158,11,0.1); }
    /* Auth code table */
    .code-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .code-table th { text-align: left; padding: 8px 12px; font-size: 12px; color: #6B7280; font-weight: 600; border-bottom: 2px solid #E8EDFF; }
    .code-table td { padding: 10px 12px; border-bottom: 1px solid #F3F4F6; vertical-align: middle; }
    .code-table tr:last-child td { border-bottom: none; }
    .code-mono { font-family: 'Menlo','Courier New',monospace; font-size: 13px; letter-spacing: 0.5px; font-weight: 600; color: #1E1B4B; cursor: pointer; }
    .code-mono:hover { color: #6366F1; }
    .status-badge { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; }
    .status-unused { background: rgba(99,102,241,0.1); color: #6366F1; }
    .status-active { background: rgba(16,185,129,0.1); color: #059669; }
    .status-disabled { background: rgba(107,114,128,0.1); color: #6B7280; }
    /* Plan cards */
    .plan-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 16px; }
    @media(max-width:700px) { .plan-grid { grid-template-columns: 1fr 1fr; } }
    .plan-card { border: 2px solid #E8EDFF; border-radius: 12px; padding: 14px 12px; text-align: center; }
    .plan-card .plan-name { font-size: 14px; font-weight: 700; color: #1E1B4B; margin-bottom: 4px; }
    .plan-card .plan-period { font-size: 11px; color: #9CA3AF; margin-bottom: 10px; }
    .plan-card input { width: 100%; padding: 8px; border: 2px solid #E8EDFF; border-radius: 8px; font-size: 15px; font-weight: 700; color: #6366F1; text-align: center; outline: none; }
    .plan-card input:focus { border-color: #6366F1; }
    /* Login */
    .login-box { max-width: 400px; margin: 80px auto; background: #fff; border-radius: 20px; padding: 36px; border: 1px solid #E8EDFF; }
    .login-box h2 { font-size: 20px; font-weight: 800; color: #1E1B4B; margin-bottom: 6px; }
    .login-box p { font-size: 13px; color: #9CA3AF; margin-bottom: 24px; }
    /* Day buttons */
    .day-btns { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
    .day-btn { padding: 5px 14px; border-radius: 7px; border: 2px solid #E8EDFF; background: #fff; font-size: 13px; cursor: pointer; font-weight: 600; color: #374151; }
    .day-btn.active { border-color: #6366F1; color: #6366F1; background: rgba(99,102,241,0.07); }
    /* Modal */
    .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
    .modal-bg.open { display: flex; }
    .modal-box { background: #fff; border-radius: 16px; padding: 24px; width: 90%; max-width: 400px; }
    .modal-box h3 { font-size: 16px; font-weight: 700; color: #1E1B4B; margin-bottom: 16px; }
  </style>
</head>
<body>

<!-- 登录框 -->
<div id="login-view">
  <div class="login-box">
    <h2>后台管理登录</h2>
    <p>请使用管理员账号登录</p>
    <div id="login-msg" class="msg"></div>
    <div class="form-row"><label>手机号</label><input id="adm-phone" type="text" placeholder="管理员手机号" /></div>
    <div class="form-row"><label>密码</label><input id="adm-pwd" type="password" placeholder="密码" onkeydown="if(event.key==='Enter')doLogin()" /></div>
    <button class="btn-primary" style="width:100%;margin-top:8px" onclick="doLogin()">登录</button>
  </div>
</div>

<!-- 管理界面 -->
<div id="admin-view" style="display:none">
  <div class="header">
    <h1>爆款文案工坊 · 后台管理</h1>
    <div style="display:flex;align-items:center;gap:16px">
      <span id="admin-name" style="font-size:13px;color:#6B7280"></span>
      <button class="logout-btn" onclick="doLogout()">退出登录</button>
    </div>
  </div>

  <!-- 主 Tab 栏 -->
  <div class="main-tabs">
    <button class="main-tab active" onclick="switchMainTab('config',this)">基础配置</button>
    <button class="main-tab" onclick="switchMainTab('prompts',this)">提示词配置</button>
  </div>

  <!-- ========== Tab 1: 基础配置 ========== -->
  <div id="tab-config" class="container">

    <!-- 模型配置 -->
    <div class="section">
      <h2>🔑 模型配置</h2>
      <div id="key-msg" class="msg"></div>
      <div class="grid-2">
        <div class="form-row">
          <label>API Key</label>
          <input id="openai_api_key" type="password" placeholder="sk-..." />
        </div>
        <div class="form-row">
          <label>模型名称</label>
          <input id="openai_model" placeholder="gpt-5.4" />
        </div>
      </div>
      <div class="form-row">
        <label>Base URL（兼容接口填写，OpenAI 官方可留空）</label>
        <input id="openai_base_url" placeholder="https://api.xxx.com/v1" />
        <div class="hint">示例：https://api.xcode.best/v1</div>
      </div>
      <div class="form-row" style="padding-top:14px;border-top:1px solid #E8EDFF;margin-top:4px">
        <label>🎵 Tikhub API Key（抖音文案提取）</label>
        <input id="tikhub_api_key" type="password" placeholder="注册 tikhub.io 获取" />
        <div class="hint">注册 tikhub.io 可获得免费额度</div>
      </div>
      <button class="btn-primary" onclick="saveKeys()">保存配置</button>
    </div>

    <!-- 授权码配置 -->
    <div class="section">
      <h2>🎫 授权码管理</h2>
      <div id="code-msg" class="msg"></div>

      <!-- 生成表单 -->
      <div style="background:#F8F9FF;border-radius:12px;padding:16px;margin-bottom:16px">
        <div style="font-size:13px;font-weight:700;color:#1E1B4B;margin-bottom:12px">批量生成授权码</div>
        <div class="grid-3">
          <div class="form-row" style="margin-bottom:0">
            <label>生成数量</label>
            <input id="gen-count" type="number" value="1" min="1" max="100" />
          </div>
          <div class="form-row" style="margin-bottom:0">
            <label>有效天数</label>
            <input id="gen-days" type="number" value="30" min="1" />
          </div>
          <div class="form-row" style="margin-bottom:0">
            <label>每日次数上限</label>
            <input id="gen-limit" type="number" value="30" min="1" max="999" />
          </div>
        </div>
        <div style="margin-top:12px;display:flex;gap:8px;align-items:center">
          <button class="btn-primary" onclick="generateCodes()">生成授权码</button>
          <span style="font-size:12px;color:#9CA3AF">生成后可复制给用户在个人中心激活</span>
        </div>
      </div>

      <!-- 授权码列表 -->
      <div id="code-list-wrap" style="overflow-x:auto">
        <table class="code-table">
          <thead>
            <tr>
              <th>授权码</th><th>天数</th><th>每日次数</th><th>状态</th><th>激活用户</th><th>激活时间</th><th>操作</th>
            </tr>
          </thead>
          <tbody id="code-tbody"><tr><td colspan="7" style="text-align:center;color:#9CA3AF;padding:24px">加载中...</td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- 会员配置 -->
    <div class="section">
      <h2>👑 会员套餐配置</h2>
      <div id="member-msg" class="msg"></div>
      <div class="plan-grid">
        <div class="plan-card">
          <div class="plan-name">日会员</div>
          <div class="plan-period">有效期 1 天</div>
          <input id="plan-day" type="number" step="0.01" placeholder="9.90" />
          <div style="font-size:11px;color:#9CA3AF;margin-top:4px">元</div>
        </div>
        <div class="plan-card">
          <div class="plan-name">周会员</div>
          <div class="plan-period">有效期 7 天</div>
          <input id="plan-week" type="number" step="0.01" placeholder="29.90" />
          <div style="font-size:11px;color:#9CA3AF;margin-top:4px">元</div>
        </div>
        <div class="plan-card">
          <div class="plan-name">月会员</div>
          <div class="plan-period">有效期 30 天</div>
          <input id="plan-month" type="number" step="0.01" placeholder="69.90" />
          <div style="font-size:11px;color:#9CA3AF;margin-top:4px">元</div>
        </div>
        <div class="plan-card">
          <div class="plan-name">永久会员</div>
          <div class="plan-period">永久有效</div>
          <input id="plan-forever" type="number" step="0.01" placeholder="199.00" />
          <div style="font-size:11px;color:#9CA3AF;margin-top:4px">元</div>
        </div>
      </div>
      <div class="form-row">
        <label>支付页备注文案（红色加粗展示在支付按钮下方）</label>
        <textarea id="member-note" rows="3" style="font-family:inherit;font-size:14px" placeholder="请添加客服微信：Yu975196416"></textarea>
      </div>
      <button class="btn-primary" onclick="saveMemberPlans()">保存会员配置</button>
    </div>

  </div>

  <!-- ========== Tab 2: 提示词配置 ========== -->
  <div id="tab-prompts" class="container" style="display:none">
    <div class="section">
      <h2>📝 提示词配置</h2>
      <div id="prompt-msg" class="msg"></div>
      <div class="tab-bar">
        <button class="tab active" onclick="switchPromptTab('all',this)">全部</button>
        <button class="tab" onclick="switchPromptTab('rewrite',this)">改写</button>
        <button class="tab" onclick="switchPromptTab('industry',this)">行业热点</button>
      </div>

      <!-- 全部 / 改写 的提示词列表 -->
      <div id="prompt-content">
        <div id="prompt-list"></div>
      </div>

      <!-- 行业热点内容（隐藏时 display:none） -->
      <div id="industry-content" style="display:none">
        <!-- 行业标签管理 -->
        <div style="margin-bottom:20px">
          <div style="font-size:14px;font-weight:700;color:#1E1B4B;margin-bottom:10px">行业标签</div>
          <div id="ind-msg" class="msg"></div>
          <div id="ind-list" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px"></div>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <input id="new-ind-name" style="padding:8px 12px;border:2px solid #E8EDFF;border-radius:9px;font-size:13px;outline:none;width:160px" placeholder="新行业名称" />
            <button class="btn-primary" style="padding:8px 18px" onclick="addIndustry()">添加</button>
          </div>
        </div>

        <div style="border-top:1px solid #E8EDFF;padding-top:16px">
          <div style="font-size:14px;font-weight:700;color:#1E1B4B;margin-bottom:4px">行业提示词</div>
          <div style="font-size:12px;color:#9CA3AF;margin-bottom:12px">为每个行业设置专属风格提示词，留空则使用通用风格。支持换行和代码格式书写。</div>
          <div id="ind-prompt-list"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 编辑授权码弹窗 -->
<div class="modal-bg" id="edit-code-modal">
  <div class="modal-box">
    <h3>编辑授权码</h3>
    <input type="hidden" id="edit-code-id" />
    <div class="form-row">
      <label>有效天数</label>
      <div class="day-btns">
        <button class="day-btn" onclick="setDays(1)">1天</button>
        <button class="day-btn" onclick="setDays(7)">7天</button>
        <button class="day-btn" onclick="setDays(30)">30天</button>
        <button class="day-btn" onclick="setDays(0)">关闭授权</button>
      </div>
      <input id="edit-days" type="number" placeholder="自定义天数" min="0" />
    </div>
    <div class="form-row">
      <label>每日次数上限</label>
      <input id="edit-limit" type="number" value="30" min="1" max="999" />
    </div>
    <div class="form-row">
      <label>状态</label>
      <select id="edit-status">
        <option value="unused">未激活</option>
        <option value="active">已激活</option>
        <option value="disabled">已关闭</option>
      </select>
    </div>
    <div style="display:flex;gap:10px;margin-top:4px">
      <button class="btn-primary" onclick="saveCodeEdit()">保存</button>
      <button class="btn-secondary" onclick="closeCodeModal()">取消</button>
    </div>
    <div id="edit-code-msg" class="msg" style="margin-top:10px;margin-bottom:0"></div>
  </div>
</div>

<script>
const API = '/api';
let token = localStorage.getItem('wf_token');

async function req(path, opts={}) {
  const r = await fetch(API + path, {
    ...opts,
    headers: { 'Content-Type':'application/json', ...(token?{'Authorization':`Bearer ${token}`}:{}), ...(opts.headers||{}) }
  });
  return r.json();
}

function showMsg(id, text, type='success') {
  const el = document.getElementById(id);
  el.textContent = text; el.className = `msg ${type}`;
  setTimeout(() => el.className = 'msg', 3500);
}

function escapeHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ---- 登录 ----
async function doLogin() {
  const phone = document.getElementById('adm-phone').value;
  const password = document.getElementById('adm-pwd').value;
  const r = await req('/auth/login', { method:'POST', body: JSON.stringify({phone,password}) });
  if (r.code === 200) {
    if (r.data.user.role !== 'admin') { showMsg('login-msg','无管理员权限','error'); return; }
    token = r.data.token;
    localStorage.setItem('wf_token', token);
    localStorage.setItem('wf_user', JSON.stringify(r.data.user));
    document.getElementById('admin-name').textContent = r.data.user.nickname || r.data.user.phone;
    showAdmin();
  } else { showMsg('login-msg', r.msg||'登录失败','error'); }
}

function doLogout() {
  localStorage.removeItem('wf_token'); localStorage.removeItem('wf_user'); token = null;
  document.getElementById('login-view').style.display = '';
  document.getElementById('admin-view').style.display = 'none';
}

async function showAdmin() {
  document.getElementById('login-view').style.display = 'none';
  document.getElementById('admin-view').style.display = '';
  await loadKeys(); await loadMemberPlans(); await loadCodes(); await loadPrompts();
}

// ---- 主 Tab ----
function switchMainTab(tab, el) {
  document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-config').style.display = tab==='config' ? '' : 'none';
  document.getElementById('tab-prompts').style.display = tab==='prompts' ? '' : 'none';
}

// ---- 模型配置 ----
async function loadKeys() {
  const r = await req('/config/ai-keys');
  if (r.code !== 200) return;
  const d = r.data;
  document.getElementById('openai_api_key').value = d.openai_api_key || '';
  document.getElementById('openai_base_url').value = d.openai_base_url || '';
  document.getElementById('openai_model').value = d.openai_model || '';
  document.getElementById('tikhub_api_key').value = d.tikhub_api_key || '';
}

async function saveKeys() {
  const body = {
    ai_provider: 'openai',
    openai_api_key: document.getElementById('openai_api_key').value,
    openai_base_url: document.getElementById('openai_base_url').value,
    openai_model: document.getElementById('openai_model').value,
    tikhub_api_key: document.getElementById('tikhub_api_key').value,
  };
  const r = await req('/config/ai-keys', { method:'POST', body: JSON.stringify(body) });
  if (r.code===200) showMsg('key-msg','配置已保存'); else showMsg('key-msg',r.msg||'保存失败','error');
}

// ---- 会员套餐 ----
async function loadMemberPlans() {
  const r = await req('/config/member-plans');
  if (r.code !== 200) return;
  const d = r.data;
  document.getElementById('plan-day').value = d.member_plan_day_price || '';
  document.getElementById('plan-week').value = d.member_plan_week_price || '';
  document.getElementById('plan-month').value = d.member_plan_month_price || '';
  document.getElementById('plan-forever').value = d.member_plan_forever_price || '';
  document.getElementById('member-note').value = d.member_note || '';
}

async function saveMemberPlans() {
  const body = {
    member_plan_day_price: document.getElementById('plan-day').value,
    member_plan_week_price: document.getElementById('plan-week').value,
    member_plan_month_price: document.getElementById('plan-month').value,
    member_plan_forever_price: document.getElementById('plan-forever').value,
    member_note: document.getElementById('member-note').value,
  };
  const r = await req('/config/member-plans', { method:'POST', body: JSON.stringify(body) });
  if (r.code===200) showMsg('member-msg','保存成功'); else showMsg('member-msg',r.msg||'保存失败','error');
}

// ---- 授权码 ----
async function loadCodes() {
  const r = await req('/codes');
  const tbody = document.getElementById('code-tbody');
  if (r.code !== 200 || !r.data.length) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#9CA3AF;padding:24px">暂无授权码，请生成</td></tr>'; return;
  }
  const statusLabel = {unused:'未激活',active:'已激活',disabled:'已关闭'};
  const statusClass = {unused:'status-unused',active:'status-active',disabled:'status-disabled'};
  tbody.innerHTML = r.data.map(c => `
    <tr>
      <td><span class="code-mono" onclick="copyCode('${c.code}')" title="点击复制">${c.code}</span></td>
      <td>${c.days > 0 ? c.days+'天' : '已关闭'}</td>
      <td>${c.daily_limit} 次</td>
      <td><span class="status-badge ${statusClass[c.status]||'status-unused'}">${statusLabel[c.status]||c.status}</span></td>
      <td style="font-size:12px;color:#374151">${c.nickname||c.phone||'-'}</td>
      <td style="font-size:12px;color:#6B7280">${c.activated_at?c.activated_at.slice(0,10):'-'}</td>
      <td>
        <button class="btn-sm btn-sm-warning" style="margin-right:4px" onclick="openCodeEdit(${c.id},${c.days},${c.daily_limit},'${c.status}')">编辑</button>
        <button class="btn-sm btn-sm-danger" onclick="deleteCode(${c.id})">删除</button>
      </td>
    </tr>`).join('');
}

function copyCode(code) {
  navigator.clipboard?.writeText(code);
  showMsg('code-msg', `已复制授权码：${code}`);
}

async function generateCodes() {
  const count = document.getElementById('gen-count').value;
  const days = document.getElementById('gen-days').value;
  const daily_limit = document.getElementById('gen-limit').value;
  const r = await req('/codes/batch', { method:'POST', body: JSON.stringify({count,days,daily_limit}) });
  if (r.code === 200) {
    showMsg('code-msg', r.msg + '：' + r.data.join(' / '));
    loadCodes();
  } else showMsg('code-msg', r.msg||'生成失败','error');
}

function openCodeEdit(id, days, limit, status) {
  document.getElementById('edit-code-id').value = id;
  document.getElementById('edit-days').value = days;
  document.getElementById('edit-limit').value = limit;
  document.getElementById('edit-status').value = status;
  document.getElementById('edit-code-modal').classList.add('open');
}

function closeCodeModal() { document.getElementById('edit-code-modal').classList.remove('open'); }

function setDays(n) {
  document.getElementById('edit-days').value = n;
  document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

async function saveCodeEdit() {
  const id = document.getElementById('edit-code-id').value;
  const days = document.getElementById('edit-days').value;
  const daily_limit = document.getElementById('edit-limit').value;
  const status = document.getElementById('edit-status').value;
  const r = await req(`/codes/${id}`, { method:'PUT', body: JSON.stringify({days,daily_limit,status}) });
  if (r.code===200) { closeCodeModal(); loadCodes(); showMsg('code-msg','更新成功'); }
  else { showMsg('edit-code-msg', r.msg||'更新失败','error'); }
}

async function deleteCode(id) {
  if (!confirm('确认删除此授权码？')) return;
  const r = await req(`/codes/${id}`, { method:'DELETE' });
  if (r.code===200) { loadCodes(); showMsg('code-msg','已删除'); }
  else showMsg('code-msg', r.msg||'删除失败','error');
}

// ---- 提示词 Tab ----
let currentPromptTab = 'all';
const _promptCache = {};
const _indCache = {};

function switchPromptTab(tab, el) {
  currentPromptTab = tab;
  document.querySelectorAll('.tab-bar .tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  const isIndustry = tab === 'industry';
  document.getElementById('prompt-content').style.display = isIndustry ? 'none' : '';
  document.getElementById('industry-content').style.display = isIndustry ? '' : 'none';
  if (isIndustry) { loadIndustries(); }
  else { loadPrompts(tab === 'all' ? null : tab); }
}

async function loadPrompts(type) {
  const url = type ? `/config/prompts?type=${type}` : '/config/prompts?type=rewrite';
  const r = await req(url);
  const list = document.getElementById('prompt-list');
  const filtered = (r.data || []).filter(p => p.type !== 'inspire' || currentPromptTab === 'all');
  // For 'all' tab, show rewrite prompts only (inspire handled under 行业热点)
  const show = currentPromptTab === 'all'
    ? (r.data || []).filter(p => p.type === 'rewrite')
    : (r.data || []);
  if (!show.length) { list.innerHTML = '<div style="color:#9CA3AF;font-size:13px;padding:12px 0">暂无提示词</div>'; return; }
  const typeLabel = {rewrite:'改写', inspire:'灵感', extract:'提取分析'};
  show.forEach(p => _promptCache[p.id] = p);
  list.innerHTML = show.map(p => `
    <div class="prompt-item" id="pi-${p.id}">
      <div class="prompt-item-head" onclick="togglePrompt('pb-${p.id}')">
        <span style="font-size:13px;font-weight:600;color:#1E1B4B;flex:1">${escapeHtml(p.name)}</span>
        <span class="badge badge-purple">${typeLabel[p.type]||p.type}</span>
        ${p.is_default?'<span class="badge badge-yellow">默认</span>':''}
        <span style="color:#9CA3AF;font-size:12px">▾</span>
      </div>
      <div class="prompt-item-body" id="pb-${p.id}">
        <div id="pv-${p.id}">
          <pre style="white-space:pre-wrap;font-size:12px;color:#555;line-height:1.7;margin-bottom:10px;font-family:'Menlo','Courier New',monospace">${escapeHtml(p.content)}</pre>
          <div style="display:flex;gap:8px">
            <button class="btn-sm btn-sm-primary" onclick="startInlineEdit(${p.id})">编辑</button>
            ${!p.is_default?`<button class="btn-sm btn-sm-danger" onclick="deletePrompt(${p.id})">删除</button>`:''}
          </div>
        </div>
        <div id="pe-${p.id}" style="display:none">
          <input id="pename-${p.id}" style="width:100%;padding:8px 10px;border:2px solid #6366F1;border-radius:8px;font-size:13px;margin-bottom:8px;font-family:inherit" />
          <textarea id="pecontent-${p.id}" style="width:100%;min-height:180px;padding:10px;border:2px solid #6366F1;border-radius:8px;font-size:13px;resize:vertical;font-family:'Menlo','Courier New',monospace;line-height:1.7"></textarea>
          <div style="display:flex;gap:8px;margin-top:8px">
            <button class="btn-sm btn-sm-primary" onclick="saveInlineEdit(${p.id})">保存</button>
            <button class="btn-sm" style="background:#F3F4F6;color:#374151" onclick="cancelInlineEdit(${p.id})">取消</button>
          </div>
          <div id="pe-msg-${p.id}" style="font-size:12px;margin-top:6px;display:none"></div>
        </div>
      </div>
    </div>`).join('');
}

function togglePrompt(id) { document.getElementById(id).classList.toggle('open'); }

function startInlineEdit(id) {
  const p = _promptCache[id];
  document.getElementById(`pb-${id}`).classList.add('open');
  document.getElementById(`pv-${id}`).style.display = 'none';
  document.getElementById(`pe-${id}`).style.display = 'block';
  document.getElementById(`pename-${id}`).value = p.name;
  document.getElementById(`pecontent-${id}`).value = p.content;
}

function cancelInlineEdit(id) {
  document.getElementById(`pv-${id}`).style.display = 'block';
  document.getElementById(`pe-${id}`).style.display = 'none';
}

async function saveInlineEdit(id) {
  const p = _promptCache[id];
  const name = document.getElementById(`pename-${id}`).value.trim();
  const content = document.getElementById(`pecontent-${id}`).value.trim();
  const msgEl = document.getElementById(`pe-msg-${id}`);
  if (!name||!content) { msgEl.style.display='block';msgEl.style.color='#EF4444';msgEl.textContent='不能为空';return; }
  const r = await req('/config/prompts', {method:'POST', body:JSON.stringify({id,name,type:p.type,content})});
  if (r.code===200) {
    msgEl.style.display='block';msgEl.style.color='#10B981';msgEl.textContent='保存成功';
    setTimeout(()=>{ cancelInlineEdit(id); loadPrompts(currentPromptTab==='all'?null:currentPromptTab); },800);
  } else { msgEl.style.display='block';msgEl.style.color='#EF4444';msgEl.textContent=r.msg||'保存失败'; }
}

async function deletePrompt(id) {
  if (!confirm('确认删除？')) return;
  const r = await req(`/config/prompts/${id}`,{method:'DELETE'});
  if (r.code===200) { showMsg('prompt-msg','删除成功'); loadPrompts(currentPromptTab==='all'?null:currentPromptTab); }
  else showMsg('prompt-msg',r.msg,'error');
}

// ---- 行业配置 ----
async function loadIndustries() {
  const r = await req('/config/industries');
  if (r.code !== 200) return;
  r.data.forEach(i => _indCache[i.id] = i);

  // 标签区
  const indList = document.getElementById('ind-list');
  indList.innerHTML = r.data.map(ind => `
    <div style="display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:#F3F4F6;border-radius:20px;font-size:13px;font-weight:600;color:#374151">
      <span>${escapeHtml(ind.name)}</span>
      <span style="cursor:pointer;color:#9CA3AF;font-size:12px" onclick="deleteIndustry(${ind.id})">✕</span>
    </div>`).join('');

  // 提示词区（每个行业的 style_hint 可编辑）
  const promptList = document.getElementById('ind-prompt-list');
  promptList.innerHTML = r.data.map(ind => `
    <div style="border:1px solid #E8EDFF;border-radius:10px;padding:14px;margin-bottom:8px">
      <div style="font-size:13px;font-weight:700;color:#1E1B4B;margin-bottom:8px">${escapeHtml(ind.name)}</div>
      <textarea id="ihint-${ind.id}" style="width:100%;min-height:80px;padding:10px;border:2px solid #E8EDFF;border-radius:8px;font-size:13px;resize:vertical;font-family:'Menlo','Courier New',monospace;line-height:1.6;outline:none" placeholder="输入该行业的风格提示词，留空使用通用风格..."
        onfocus="this.style.borderColor='#6366F1'" onblur="this.style.borderColor='#E8EDFF'"
      >${escapeHtml(ind.style_hint||'')}</textarea>
      <div style="display:flex;gap:8px;margin-top:8px;align-items:center">
        <button class="btn-sm btn-sm-primary" onclick="saveIndHint(${ind.id})">保存</button>
        <span id="ihint-msg-${ind.id}" style="font-size:12px;display:none"></span>
      </div>
    </div>`).join('');
}

async function saveIndHint(id) {
  const ind = _indCache[id];
  const style_hint = document.getElementById(`ihint-${id}`).value.trim();
  const msgEl = document.getElementById(`ihint-msg-${id}`);
  const r = await req('/config/industries', {method:'POST', body:JSON.stringify({id, name:ind.name, style_hint})});
  if (r.code===200) {
    msgEl.style.display='inline'; msgEl.style.color='#10B981'; msgEl.textContent='✓ 已保存';
    setTimeout(()=>msgEl.style.display='none', 2000);
  } else { msgEl.style.display='inline'; msgEl.style.color='#EF4444'; msgEl.textContent=r.msg||'失败'; }
}

async function addIndustry() {
  const name = document.getElementById('new-ind-name').value.trim();
  if (!name) { showMsg('ind-msg','请输入行业名称','error'); return; }
  const r = await req('/config/industries',{method:'POST',body:JSON.stringify({name})});
  if (r.code===200) { document.getElementById('new-ind-name').value=''; loadIndustries(); }
  else showMsg('ind-msg',r.msg||'添加失败','error');
}

async function deleteIndustry(id) {
  if (!confirm('确认删除此行业？')) return;
  const r = await req(`/config/industries/${id}`,{method:'DELETE'});
  if (r.code===200) loadIndustries();
  else showMsg('ind-msg',r.msg||'删除失败','error');
}

// ---- 初始化 ----
(async () => {
  if (token) {
    const r = await req('/auth/me');
    if (r.code === 200 && r.data.role === 'admin') {
      const stored = localStorage.getItem('wf_user');
      if (stored) { const u=JSON.parse(stored); document.getElementById('admin-name').textContent=u.nickname||u.phone; }
      showAdmin(); return;
    }
  }
})();
</script>
