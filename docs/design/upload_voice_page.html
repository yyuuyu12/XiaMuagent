<h2 class="sr-only">上传声音页面</h2>
<div style="background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 16px;">
<div style="max-width: 375px; margin: 0 auto; background: #fff; border-radius: 24px; overflow: hidden; font-family: var(--font-sans); border: 0.5px solid var(--color-border-tertiary);">

<div style="padding: 16px 20px; border-bottom: 0.5px solid var(--color-border-tertiary);">
  <div style="display: flex; justify-content: space-between; align-items: center;">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--color-text-primary)" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
    <p style="font-size: 16px; font-weight: 500; color: var(--color-text-primary); margin: 0;">上传声音</p>
    <span style="width: 20px;"></span>
  </div>
</div>

<div style="padding: 24px 16px;">
  
  <div style="margin-bottom: 24px;">
    <p style="font-size: 14px; font-weight: 500; color: var(--color-text-primary); margin: 0 0 10px;">声音名称</p>
    <div style="background: var(--color-background-secondary); border-radius: 12px; padding: 14px 16px;">
      <input type="text" placeholder="例如：夏木-温柔" style="border: none; background: transparent; width: 100%; font-size: 14px; color: var(--color-text-primary); outline: none;" />
    </div>
  </div>
  
  <div style="margin-bottom: 24px;">
    <p style="font-size: 14px; font-weight: 500; color: var(--color-text-primary); margin: 0 0 10px;">上传方式</p>
    <div style="display: flex; gap: 12px;">
      <div style="flex: 1; background: #FAECE7; border: 2px solid #FF6B35; border-radius: 12px; padding: 16px; text-align: center;">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#FF6B35" stroke-width="2" style="display: block; margin: 0 auto 8px;"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        <p style="font-size: 13px; color: #712B13; font-weight: 500; margin: 0;">录音上传</p>
      </div>
      <div style="flex: 1; background: var(--color-background-secondary); border: 2px solid transparent; border-radius: 12px; padding: 16px; text-align: center;">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#888780" stroke-width="2" style="display: block; margin: 0 auto 8px;"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <p style="font-size: 13px; color: var(--color-text-secondary); margin: 0;">文件上传</p>
      </div>
    </div>
  </div>
  
  <div style="background: #FAECE7; border-radius: 16px; padding: 32px 20px; text-align: center; margin-bottom: 20px;">
    <div style="width: 80px; height: 80px; background: #FF6B35; border-radius: 50%; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center;">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="#fff" stroke="#fff" stroke-width="1.5"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/></svg>
    </div>
    <p style="font-size: 16px; color: #712B13; font-weight: 500; margin: 0 0 6px;">按住录音</p>
    <p style="font-size: 13px; color: #993C1D; margin: 0;">录音时长需要 7-15 秒</p>
  </div>
  
  <div style="background: var(--color-background-secondary); border-radius: 12px; padding: 14px 16px; margin-bottom: 20px;">
    <p style="font-size: 13px; color: var(--color-text-secondary); margin: 0 0 10px;">推荐朗读以下文字：</p>
    <p style="font-size: 14px; color: var(--color-text-primary); margin: 0; line-height: 1.6;">"大家好，欢迎来到我的频道。今天我想和大家分享一些关于学习和成长的心得体会，希望对你们有所帮助。"</p>
  </div>
  
  <div style="background: #FAECE7; border-radius: 12px; padding: 14px 16px;">
    <div style="display: flex; gap: 10px;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#FF6B35" stroke-width="2" style="flex-shrink: 0; margin-top: 2px;"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
      <div>
        <p style="font-size: 13px; color: #712B13; font-weight: 500; margin: 0 0 4px;">录音小贴士</p>
        <p style="font-size: 12px; color: #993C1D; margin: 0; line-height: 1.5;">请在安静环境录音，保持语速平稳，避免背景噪音，以获得最佳克隆效果。</p>
      </div>
    </div>
  </div>
  
</div>

<div style="padding: 0 16px 28px;">
  <div style="background: #D3D1C7; border-radius: 12px; padding: 16px; text-align: center;">
    <span style="color: #fff; font-size: 15px; font-weight: 500;">完成录音后保存</span>
  </div>
</div>

</div>
</div>
